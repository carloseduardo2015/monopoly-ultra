<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Brasil Digital Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffa3; --secondary: #00d1ff; --bg: #050a0f;
            --card-bg: rgba(255, 255, 255, 0.08); --gold: #ffcc00;
            --danger: #ff4757; --text: #f0f0f0; --board-white: #e8f5ed;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at top, #1a2a3a 0%, var(--bg) 100%);
            color: var(--text); min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* --- SETUP SCREEN --- */
        #setup-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .glass-panel {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 32px;
            padding: 30px; width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .input-group {
            display: flex; gap: 10px; margin-bottom: 12px; background: rgba(0,0,0,0.4);
            padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
        }
        .input-group input {
            flex: 1; background: transparent; border: none; color: white; font-weight: 600; outline: none; font-size: 14px;
        }
        .input-group select {
            background: #222; color: white; border: none; border-radius: 8px; font-size: 20px; cursor: pointer; outline: none;
        }

        /* --- BOARD --- */
        .game-layout { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; padding: 10px; animation: fadeIn 0.8s ease; }
        
        #board-container {
            position: relative; width: 96vw; height: 96vw; max-width: 580px; max-height: 580px;
            background: var(--board-white); border: 10px solid #111; border-radius: 24px;
            display: grid; grid-template-columns: 1.5fr repeat(9, 1fr) 1.5fr;
            grid-template-rows: 1.5fr repeat(9, 1fr) 1.5fr; box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }
        
        .tile {
            border: 0.5px solid rgba(0,0,0,0.12); font-size: 7px; font-weight: 800; color: #111;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            position: relative; text-align: center; line-height: 1;
        }
        .bar { width: 100%; height: 18%; border-bottom: 1.5px solid rgba(0,0,0,0.2); }
        .build-area { position: absolute; top: 20%; font-size: 10px; display: flex; gap: 1px; z-index: 5; }

        /* --- BUTTONS --- */
        .btn { border: none; border-radius: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; padding: 18px; box-shadow: 0 10px 25px rgba(0,255,163,0.3); width: 100%;
        }
        .btn-main:active { transform: scale(0.96); }
        .btn-loan { background: rgba(255,255,255,0.08); color: #888; font-size: 10px; padding: 6px; border-radius: 10px; margin-top: 8px; width: 100%; }
        .btn-loan:hover { background: var(--danger); color: white; }

        /* --- UI ELEMENTS --- */
        .players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 15px; }
        .player-card {
            background: var(--card-bg); padding: 15px; border-radius: 24px;
            border: 2px solid transparent; transition: 0.3s;
        }
        .player-card.active { border-color: var(--primary); background: rgba(0, 255, 163, 0.05); }
        
        #overlay-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; background: white; color: #000; padding: 30px;
            border-radius: 28px; z-index: 3000; text-align: center;
            box-shadow: 0 0 120px rgba(0,0,0,0.9); display: none; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop { from { transform: translate(-50%, -40%) scale(0.7); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .pawn { font-size: 18px; transition: 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045); z-index: 50; }
        .pawn-grid { position: absolute; inset: 0; display: grid; grid-template-columns: 1fr 1fr; align-items: center; justify-items: center; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="glass-panel">
            <h1 style="margin:0 0 10px 0; font-size:32px; background: linear-gradient(to right, #00ffa3, #00d1ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">MONOPOLY</h1>
            <p style="opacity:0.5; margin-bottom:25px; font-size: 14px;">Brasil Digital Edition</p>
            <div id="player-inputs"></div>
            <button onclick="addPlayerField()" class="btn" style="background:none; color:var(--secondary); margin-bottom:20px; font-size:12px; font-weight: 600;">+ Adicionar Amigo</button>
            <button onclick="iniciarJogo()" class="btn btn-main">COMEÇAR PARTIDA</button>
        </div>
    </div>

    <div class="game-layout" id="game-ui">
        <div id="board-container">
            <div id="overlay-card">
                <div id="card-content"></div>
                <button class="btn btn-main" style="margin-top:25px; font-size:14px; padding:12px;" onclick="fecharCarta()">FECHAR</button>
            </div>
            <div style="grid-column: 2/11; grid-row: 2/11; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.03); border-radius:15px; margin:5px;">
                <div id="dice-view" style="font-size:55px; margin-bottom:15px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));">🎲</div>
                <button id="roll-btn" class="btn btn-main" style="width:160px; font-size: 14px;" onclick="rolarDados()">ROLAR</button>
                <button id="buy-btn" class="btn" style="display:none; width:160px; margin-top:10px; background:#111; color:white; padding:15px; font-size:11px;" onclick="comprarProp()"></button>
            </div>
        </div>
        <div class="players-grid" id="sidebar"></div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const EMOJIS = ["🏎️", "🎩", "🐕", "🦖", "🚢", "🐈", "🦆", "🛵", "🚀", "🍕"];
        const CORES = ["#ff4757", "#1e90ff", "#2ed573", "#ffa502", "#a29bfe", "#fd79a8"];

        const TABULEIRO = [
            {n:"PARTIDA"}, {n:"AV. SUMARÉ", c:"#955436", p:60, b:50, r:[2, 10, 30, 90, 160, 250]}, {n:"COFRE"}, 
            {n:"PRAÇA DA SÉ", c:"#955436", p:60, b:50, r:[4, 20, 60, 180, 320, 450]}, {n:"IMPOSTO", p:200}, 
            {n:"METRÔ MARACANÃ", p:200}, {n:"25 DE MARÇO", c:"#aae0fa", p:100, b:50, r:[6, 30, 90, 270, 400, 550]}, 
            {n:"SORTE"}, {n:"AV. SÃO JOÃO", c:"#aae0fa", p:100, b:50, r:[6, 30, 90, 270, 400, 550]}, 
            {n:"AV. PAULISTA", c:"#aae0fa", p:120, b:50, r:[8, 40, 100, 300, 450, 600]}, {n:"PRISÃO"}, 
            {n:"VIEIRA SOUTO", c:"#d93a96", p:140, b:100, r:[10, 50, 150, 450, 625, 750]}, {n:"CIA ELÉTRICA", p:150}, 
            {n:"NITEROI", c:"#d93a96", p:140, b:100, r:[10, 50, 150, 450, 625, 750]}, {n:"ATLÂNTICA", c:"#d93a96", p:160, b:100, r:[12, 60, 180, 500, 700, 900]}, 
            {n:"METRÔ CARIOCA", p:200}, {n:"JK", c:"#f7941d", p:180, b:100, r:[14, 70, 200, 550, 750, 950]}, {n:"COFRE"}, 
            {n:"BERRINI", c:"#f7941d", p:180, b:100, r:[14, 70, 200, 550, 750, 950]}, {n:"FARIA LIMA", c:"#f7941d", p:200, b:100, r:[16, 80, 220, 600, 800, 1000]},
            {n:"ESTAC. GRÁTIS"}, {n:"IPANEMA", c:"#ed1c24", p:220, b:150, r:[18, 90, 250, 700, 875, 1050]}, {n:"SORTE"}, 
            {n:"LEBLON", c:"#ed1c24", p:220, b:150, r:[18, 90, 250, 700, 875, 1050]}, {n:"COPACABANA", c:"#ed1c24", p:240, b:150, r:[20, 100, 300, 750, 925, 1100]}, 
            {n:"METRÔ CONSOLAÇÃO", p:200}, {n:"CIDADE JARDIM", c:"#fef200", p:260, b:150, r:[22, 110, 330, 800, 975, 1150]}, 
            {n:"PACAEMBU", c:"#fef200", p:260, b:150, r:[22, 110, 330, 800, 975, 1150]}, {n:"ÁGUA", p:150}, 
            {n:"IBIRAPUERA", c:"#fef200", p:280, b:150, r:[24, 120, 360, 850, 1025, 1200]}, {n:"VÁ PRISÃO"}, 
            {n:"BARRA", c:"#19a05e", p:300, b:200, r:[26, 130, 390, 900, 1100, 1275]}, {n:"BOTÂNICO", c:"#19a05e", p:300, b:200, r:[26, 130, 390, 900, 1100, 1275]}, 
            {n:"COFRE"}, {n:"LAGOA", c:"#19a05e", p:320, b:200, r:[28, 150, 450, 1000, 1200, 1400]}, 
            {n:"METRÔ REPÚBLICA", p:200}, {n:"SORTE"}, 
            {n:"MORUMBI", c:"#0068a7", p:350, b:200, r:[35, 175, 500, 1100, 1300, 1500]}, {n:"TAXA RIQUEZA", p:100}, 
            {n:"OSCAR FREIRE", c:"#0068a7", p:400, b:200, r:[50, 200, 600, 1400, 1700, 2000]}
        ];

        let jogo = { jogadores: [], turno: 0, props: {} };

        function addPlayerField() {
            const container = document.getElementById('player-inputs');
            const id = container.children.length; if(id >= 6) return;
            const div = document.createElement('div'); div.className = "input-group";
            div.innerHTML = `
                <input type="text" id="name-${id}" placeholder="Nome do Jogador ${id+1}">
                <select id="avatar-${id}">${EMOJIS.map(e => `<option>${e}</option>`).join('')}</select>
            `;
            container.appendChild(div);
        }
        addPlayerField(); addPlayerField();

        function playSfx(freq, dur) {
            try {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
                o.start(); o.stop(audioCtx.currentTime + dur);
            } catch(e){}
        }

        function iniciarJogo() {
            const inputs = document.getElementById('player-inputs').children;
            for(let i=0; i<inputs.length; i++) {
                const n = document.getElementById(`name-${i}`).value || `JOGADOR ${i+1}`;
                const a = document.getElementById(`avatar-${i}`).value;
                jogo.jogadores.push({ id:i, nome:n, avatar:a, saldo:1500, pos:0, cor:CORES[i] });
            }
            document.getElementById('setup-screen').style.display = "none";
            document.getElementById('game-ui').style.display = "flex";
            if (audioCtx.state === 'suspended') audioCtx.resume();
            desenharBoard(); render();
        }

        function desenharBoard() {
            const container = document.getElementById('board-container');
            TABULEIRO.forEach((casa, i) => {
                const el = document.createElement('div'); el.className = 'tile'; el.id = `tile-${i}`;
                if(i <= 10) el.style.gridRow = "11";
                else if(i <= 20) el.style.gridColumn = "1";
                else if(i <= 30) el.style.gridRow = "1";
                else el.style.gridColumn = "11";
                if(i > 0 && i < 10) el.style.gridColumn = 11 - i;
                if(i > 10 && i < 20) el.style.gridRow = 21 - i;
                if(i > 20 && i < 30) el.style.gridColumn = i - 19;
                if(i > 30) el.style.gridRow = i - 29;
                el.innerHTML = `${casa.c ? `<div class="bar" style="background:${casa.c}"></div>`:''}<div class="build-area" id="build-${i}"></div><span style="padding:2px">${casa.n}</span><div class="pawn-grid" id="pg-${i}"></div>`;
                container.appendChild(el);
            });
        }

        async function rolarDados() {
            const btn = document.getElementById('roll-btn'); btn.disabled = true;
            let total = (Math.floor(Math.random()*6)+1) + (Math.floor(Math.random()*6)+1);
            document.getElementById('dice-view').innerText = "🎲 " + total;
            playSfx(200, 0.2);
            let j = jogo.jogadores[jogo.turno];
            for(let s=0; s<total; s++) {
                j.pos = (j.pos + 1) % 40;
                if(j.pos === 0) { j.saldo += 200; playSfx(800, 0.3); }
                render(); playSfx(400, 0.05);
                await new Promise(r => setTimeout(r, 200));
            }
            processarCasa(j);
            btn.disabled = false; btn.innerText = "PASSAR VEZ"; btn.onclick = passarVez;
        }

        function processarCasa(j) {
            const casa = TABULEIRO[j.pos]; const prop = jogo.props[j.pos];
            if(casa.n === "SORTE" || casa.n === "COFRE") {
                const v = Math.random() > 0.5 ? 150 : -100;
                j.saldo += v; mostrarCarta(casa.n, `${v > 0 ? '🤑 Bônus especial de' : '💸 Taxa bancária de'} $${Math.abs(v)}`);
            } else if(prop && prop.dono !== j.id) {
                let aluguel = casa.r ? casa.r[prop.nivel] : 50;
                j.saldo -= aluguel; jogo.jogadores[prop.dono].saldo += aluguel; playSfx(150, 0.5);
            } else if(casa.p && !prop) {
                const b = document.getElementById('buy-btn'); b.style.display = "block";
                b.innerText = `COMPRAR POR $${casa.p}`;
            } else if(prop && prop.dono === j.id && prop.nivel < 5 && casa.b) {
                const b = document.getElementById('buy-btn'); b.style.display = "block";
                b.innerText = prop.nivel < 4 ? `CONSTRUIR CASA ($${casa.b})` : `CONSTRUIR HOTEL ($${casa.b})`;
            }
            render();
        }

        function comprarProp() {
            let j = jogo.jogadores[jogo.turno]; let casa = TABULEIRO[j.pos]; let prop = jogo.props[j.pos];
            if(!prop && j.saldo >= casa.p) { j.saldo -= casa.p; jogo.props[j.pos] = { dono: j.id, nivel: 0 }; playSfx(600, 0.2); }
            else if(prop && j.saldo >= casa.b) { j.saldo -= casa.b; prop.nivel++; playSfx(900, 0.2); }
            document.getElementById('buy-btn').style.display = "none"; render();
        }

        function mostrarCarta(tit, txt) {
            document.getElementById('card-content').innerHTML = `<h2 style="color:var(--bg); margin:0 0 10px 0;">${tit}</h2><p style="font-size:18px; line-height:1.4;">${txt}</p>`;
            document.getElementById('overlay-card').style.display = "block";
        }

        function fecharCarta() { document.getElementById('overlay-card').style.display = "none"; }

        function passarVez() {
            fecharCarta(); jogo.turno = (jogo.turno + 1) % jogo.jogadores.length;
            const btn = document.getElementById('roll-btn'); btn.innerText = "ROLAR DADOS"; btn.onclick = rolarDados;
            document.getElementById('buy-btn').style.display = "none"; render();
        }

        function emprestimo(idx) { jogo.jogadores[idx].saldo += 500; playSfx(1000, 0.1); render(); }

        function render() {
            document.querySelectorAll('.pawn-grid').forEach(g => g.innerHTML = "");
            document.querySelectorAll('.build-area').forEach(g => g.innerHTML = "");
            jogo.jogadores.forEach(j => {
                const p = document.createElement('div'); p.className = "pawn"; p.innerHTML = j.avatar;
                document.getElementById(`pg-${j.pos}`).appendChild(p);
            });
            Object.keys(jogo.props).forEach(idx => {
                const pr = jogo.props[idx];
                document.getElementById(`build-${idx}`).innerHTML = pr.nivel === 5 ? "🏨" : "🏠".repeat(pr.nivel);
                document.getElementById(`tile-${idx}`).style.boxShadow = `inset 0 0 0 3px ${jogo.jogadores[pr.dono].cor}`;
                document.getElementById(`tile-${idx}`).style.background = "#fff";
            });
            document.getElementById('sidebar').innerHTML = jogo.jogadores.map((j, i) => `
                <div class="player-card ${jogo.turno === i ? 'active' : ''}">
                    <div style="font-weight:800; font-size:13px; margin-bottom:5px;">${j.avatar} ${j.nome}</div>
                    <div style="color:var(--primary); font-size:20px; font-weight:800">$${j.saldo}</div>
                    <button class="btn-loan" onclick="emprestimo(${i})">PEDIR $500</button>
                </div>`).join('');
        }
    </script>
</body>
</html>
