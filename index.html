<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Ultra Pro - Estável</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1; --bg: #020617; --panel: #1e293b;
            --gold: #fbbf24; --success: #22c55e; --danger: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Setup */
        #setup-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1e293b 0%, #020617 100%); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .setup-card { background: var(--panel); padding: 25px; border-radius: 28px; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .player-row { display: flex; gap: 10px; margin-bottom: 8px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; align-items: center; }
        .player-row input { background: transparent; border: none; border-bottom: 1px solid #475569; color: white; flex: 1; outline: none; }

        /* HUD */
        #hud { display: flex; gap: 10px; padding: 12px; overflow-x: auto; background: rgba(15,23,42,0.95); border-bottom: 1px solid rgba(255,255,255,0.1); scrollbar-width: none; }
        .player-chip { min-width: 125px; background: #334155; padding: 10px; border-radius: 16px; border: 2px solid transparent; flex-shrink: 0; position: relative; }
        .player-chip.active { border-color: var(--accent); background: #475569; transform: scale(1.05); }
        .m-val { color: var(--success); font-weight: 800; font-size: 14px; }
        .jail-tag { position: absolute; top: -5px; right: -5px; background: var(--danger); font-size: 9px; padding: 2px 6px; border-radius: 6px; font-weight: 800; }

        /* Board */
        .game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #board-wrapper { position: relative; width: 96vw; height: 96vw; max-width: 520px; max-height: 520px; background: #111; border-radius: 8px; padding: 3px; }
        #board { display: grid; width: 100%; height: 100%; grid-template-columns: 1.3fr repeat(9, 1fr) 1.3fr; grid-template-rows: 1.3fr repeat(9, 1fr) 1.3fr; background: #000; gap: 1px; }

        .tile { background: #f8fafc; position: relative; display: flex; flex-direction: column; color: #1e293b; font-size: 7px; overflow: hidden; }
        .t-color { height: 18%; width: 100%; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .t-info { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2px; font-weight: 800; text-transform: uppercase; line-height: 1; }
        
        .center-board { grid-area: 2/2/11/11; background: #e2ece3; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(0,0,0,0.05); }
        .dice-box { display: flex; gap: 15px; margin-bottom: 10px; }
        .die { width: 48px; height: 48px; background: white; color: black; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* Peões */
        .pawn { position: absolute; width: 20px; height: 20px; z-index: 100; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.2); display: flex; align-items: center; justify-content: center; font-size: 16px; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        /* Controles */
        .controls { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 10px; padding: 15px; background: #1e293b; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn { padding: 14px; border-radius: 14px; border: none; font-weight: 800; color: white; text-transform: uppercase; cursor: pointer; font-size: 11px; }
        .btn-roll { background: linear-gradient(135deg, var(--gold), #d97706); color: #451a03; font-size: 16px; }
        .btn-roll:disabled { opacity: 0.5; filter: grayscale(1); }
        .btn-util { background: rgba(255,255,255,0.1); }

        /* Modal */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 3000; backdrop-filter: blur(4px); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 380px; background: white; color: #0f172a; border-radius: 24px; padding: 25px; display: none; z-index: 3001; text-align: center; }
        .build-slots { position: absolute; top: 1px; left: 0; width: 100%; display: flex; justify-content: center; gap: 1px; }
        .h-house { width: 5px; height: 5px; background: #15803d; border-radius: 1px; }
        .h-hotel { width: 12px; height: 6px; background: #b91c1c; border-radius: 1px; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-card">
        <h1 style="color:var(--gold); margin:0; font-size: 28px;">MONOPOLY <span style="color:white">PRO</span></h1>
        <p style="font-size: 12px; color: #94a3b8; margin: 5px 0 20px 0;">2 a 8 Jogadores</p>
        <input type="number" id="p-count" min="2" max="8" value="2" onchange="initSetup()" style="width:100%; padding:10px; border-radius:8px; margin-bottom:15px; background:#0f172a; color:white; border:1px solid #475569;">
        <div id="setup-list" style="max-height:220px; overflow-y:auto; margin-bottom:20px;"></div>
        <button class="btn btn-roll" style="width:100%" onclick="startGame()">INICIAR PARTIDA</button>
    </div>
</div>

<div id="hud"></div>

<div class="game-container">
    <div id="board-wrapper">
        <div id="board">
            <div class="center-board">
                <div class="dice-box">
                    <div id="die1" class="die">⚀</div>
                    <div id="die2" class="die">⚀</div>
                </div>
                <div id="status" style="font-weight:800; color:#475569; text-align:center; padding:0 15px;">AGUARDANDO...</div>
            </div>
        </div>
    </div>
</div>

<div class="controls">
    <button class="btn btn-util" onclick="showAssets()">BENS</button>
    <button class="btn btn-roll" id="roll-btn" onclick="handleRoll()">JOGAR</button>
    <button class="btn btn-util" onclick="showHistory()">LOG</button>
</div>

<div id="overlay"></div>
<div class="modal" id="modal">
    <h2 id="m-title" style="margin-top:0;"></h2>
    <div id="m-body" style="margin-bottom:20px; color:#475569;"></div>
    <div id="m-footer" style="display:flex; flex-direction:column; gap:8px;"></div>
</div>

<script>
    const TILES = [
        {n: "PARTIDA", type: "go"}, {n: "AV. SUMARÉ", g: "brown", p: 60, r: [2, 10, 30, 90, 160, 250], h: 50},
        {n: "COFRE", type: "chest"}, {n: "AV. SÃO JOÃO", g: "brown", p: 60, r: [4, 20, 60, 180, 320, 450], h: 50},
        {n: "IMPOSTO", type: "tax", val: 200}, {n: "EST. MARACANÃ", type: "station", p: 200},
        {n: "RUA 25 MARÇO", g: "lblue", p: 100, r: [6, 30, 90, 270, 400, 550], h: 50}, {n: "SORTE", type: "luck"},
        {n: "AV. PAULISTA", g: "lblue", p: 100, r: [6, 30, 90, 270, 400, 550], h: 50}, {n: "AV. VIEIRA SOUTO", g: "lblue", p: 120, r: [8, 40, 100, 300, 450, 600], h: 50},
        {n: "PRISÃO", type: "jail"}, {n: "AV. ATLÂNTICA", g: "pink", p: 140, r: [10, 50, 150, 450, 625, 750], h: 100},
        {n: "CIA ELÉTRICA", p: 150}, {n: "AV. NITERÓI", g: "pink", p: 140, r: [10, 50, 150, 450, 625, 750], h: 100},
        {n: "AV. FARIA LIMA", g: "pink", p: 160, r: [12, 60, 180, 500, 700, 900], h: 100}, {n: "EST. CARIOCA", type: "station", p: 200},
        {n: "AV. BERRINI", g: "orange", p: 180, r: [14, 70, 200, 550, 750, 950], h: 100}, {n: "COFRE", type: "chest"},
        {n: "AV. PRES. JK", g: "orange", p: 180, r: [14, 70, 200, 550, 750, 950], h: 100}, {n: "AV. 9 JULHO", g: "orange", p: 200, r: [16, 80, 220, 600, 800, 1000], h: 100},
        {n: "CENTRO", type: "free"}, {n: "AV. EUROPA", g: "red", p: 220, r: [18, 90, 250, 700, 875, 1050], h: 150},
        {n: "SORTE", type: "luck"}, {n: "AV. AUGUSTA", g: "red", p: 220, r: [18, 90, 250, 700, 875, 1050], h: 150},
        {n: "AV. PACAEMBU", g: "red", p: 240, r: [20, 100, 300, 750, 925, 1100], h: 150}, {n: "EST. CONSOLAÇÃO", type: "station", p: 200},
        {n: "INTERLAGOS", g: "yellow", p: 260, r: [22, 110, 330, 800, 975, 1150], h: 150}, {n: "MORUMBI", g: "yellow", p: 260, r: [22, 110, 330, 800, 975, 1150], h: 150},
        {n: "CIA ÁGUA", p: 150}, {n: "IBIRAPUERA", g: "yellow", p: 280, r: [24, 120, 360, 850, 1025, 1200], h: 150},
        {n: "VÁ P/ PRISÃO", type: "gojail"}, {n: "BARRA", g: "green", p: 300, r: [26, 130, 390, 900, 1100, 1275], h: 200},
        {n: "JARDIM BOTÂNICO", g: "green", p: 300, r: [26, 130, 390, 900, 1100, 1275], h: 200}, {n: "COFRE", type: "chest"},
        {n: "IPANEMA", g: "green", p: 320, r: [28, 150, 450, 1000, 1200, 1400], h: 200}, {n: "EST. REPÚBLICA", type: "station", p: 200},
        {n: "SORTE", type: "luck"}, {n: "LEBLON", g: "blue", p: 350, r: [35, 175, 500, 1100, 1300, 1500], h: 200},
        {n: "TAXA RIQUEZA", type: "tax", val: 100}, {n: "AV. OCEÂNICA", g: "blue", p: 400, r: [50, 200, 600, 1400, 1700, 2000], h: 200}
    ];

    const COLORS = { brown: "#78350f", lblue: "#7dd3fc", pink: "#db2777", orange: "#f97316", red: "#ef4444", yellow: "#facc15", green: "#15803d", blue: "#1e40af" };
    const ICONS = ["🎩","🚗","🐕","🚀","🏎️","🚢","👟","🐱"];
    let players = [], turn = 0;

    function initSetup() {
        const n = document.getElementById('p-count').value;
        const list = document.getElementById('setup-list');
        list.innerHTML = "";
        for(let i=0; i<n; i++) {
            list.innerHTML += `<div class="player-row"><span>${ICONS[i]}</span><input id="p-n-${i}" value="Player ${i+1}"></div>`;
        }
    }

    function startGame() {
        const n = parseInt(document.getElementById('p-count').value);
        players = []; // Limpa array para não duplicar
        for(let i=0; i<n; i++) {
            players.push({ id: i, name: document.getElementById(`p-n-${i}`).value, icon: ICONS[i], money: 1500, pos: 0, jail: 0, props: [], history: [] });
        }
        document.getElementById('setup-screen').style.display = 'none';
        renderBoard();
        updateUI();
    }

    function renderBoard() {
        const b = document.getElementById('board');
        b.innerHTML = '<div class="center-board"><div class="dice-box"><div id="die1" class="die">⚀</div><div id="die2" class="die">⚀</div></div><div id="status" style="font-weight:800; color:#475569; text-align:center;">AGUARDANDO...</div></div>';
        
        TILES.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = 'tile'; d.id = `tile-${i}`;
            if(i <= 10) d.style.gridArea = `11 / ${11-i}`;
            else if(i <= 20) d.style.gridArea = `${21-i} / 1`;
            else if(i <= 30) d.style.gridArea = `1 / ${i-19}`;
            else d.style.gridArea = `${i-29} / 11`;

            let html = `<div class="build-slots" id="build-${i}"></div>`;
            if(t.g) html += `<div class="t-color" style="background:${COLORS[t.g]}"></div>`;
            html += `<div class="t-info">${t.n}</div>`;
            if(t.p) html += `<div style="font-size:6px; text-align:center; padding-bottom:2px">M$ ${t.p}</div>`;
            d.innerHTML = html;
            b.appendChild(d);
        });

        // Remove peões antigos antes de criar novos
        document.querySelectorAll('.pawn').forEach(p => p.remove());
        players.forEach(p => {
            const pawn = document.createElement('div');
            pawn.className = 'pawn'; pawn.id = `pawn-${p.id}`; pawn.innerText = p.icon;
            document.body.appendChild(pawn);
        });
        updatePawns();
    }

    async function handleRoll() {
        const p = players[turn];
        const btn = document.getElementById('roll-btn');
        btn.disabled = true;

        // Lógica de Prisão Simplificada
        if(p.jail > 0) {
            p.jail--;
            showModal("NA PRISÃO", `Você ainda tem ${p.jail + 1} turnos preso.`, [{t: "PULAR TURNO", c: "#000", f: nextTurn}]);
            return;
        }

        const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
        const chars = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
        document.getElementById('die1').innerText = chars[d1];
        document.getElementById('die2').innerText = chars[d2];

        let steps = d1 + d2;
        for(let i=0; i<steps; i++) {
            p.pos = (p.pos + 1) % 40;
            if(p.pos === 0) { p.money += 200; }
            updatePawns();
            await new Promise(r => setTimeout(r, 120));
        }

        const t = TILES[p.pos];
        if(t.type === "gojail") {
            p.pos = 10; p.jail = 3; updatePawns();
            showModal("PRISÃO", "Vá direto para a prisão!", [{t: "OK", c: varDanger, f: nextTurn}]);
        } else if(t.p && !t.owner) {
            showModal(t.n, `Comprar por M$ ${t.p}?`, [
                {t: "COMPRAR", c: "var(--success)", f: () => { p.money -= t.p; t.owner = p; p.props.push(p.pos); nextTurn(); }},
                {t: "PASSAR", c: "#94a3b8", f: nextTurn}
            ]);
        } else if(t.owner && t.owner !== p) {
            let rent = t.houses ? t.r[t.houses] : t.r[0];
            p.money -= rent; t.owner.money += rent;
            showModal("ALUGUEL", `Pagou M$ ${rent} para ${t.owner.name}`, [{t: "PAGAR", c: "var(--danger)", f: nextTurn}]);
        } else {
            nextTurn();
        }
    }

    function nextTurn() {
        closeModal();
        turn = (turn + 1) % players.length;
        document.getElementById('roll-btn').disabled = false;
        document.getElementById('status').innerText = `VEZ DE: ${players[turn].name}`;
        updateUI();
    }

    function updateUI() {
        const h = document.getElementById('hud');
        h.innerHTML = players.map(p => `
            <div class="player-chip ${p.id===turn?'active':''}">
                ${p.jail?`<span class="jail-tag">PRESO</span>`:''}
                <div style="font-weight:800">${p.icon} ${p.name}</div>
                <div class="m-val">M$ ${p.money}</div>
            </div>`).join('');
    }

    function updatePawns() {
        players.forEach(p => {
            const tile = document.getElementById(`tile-${p.pos}`);
            const pawn = document.getElementById(`pawn-${p.id}`);
            if(!tile || !pawn) return;
            const r = tile.getBoundingClientRect();
            const off = p.id * 3;
            pawn.style.top = (r.top + 8 + off) + "px";
            pawn.style.left = (r.left + 8 + off) + "px";
        });
    }

    function showAssets() {
        const p = players[turn];
        let txt = p.props.map(idx => {
            const t = TILES[idx];
            return `<div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#f1f5f9; padding:8px; border-radius:8px">
                <span>${t.n}</span>
                <button onclick="build(${idx})" style="background:var(--success); border:none; color:white; border-radius:4px; padding:2px 8px">🏠</button>
            </div>`;
        }).join('') || "Nenhum bem.";
        showModal("MEUS BENS", txt, [{t: "FECHAR", c: "#0f172a", f: closeModal}]);
    }

    function build(idx) {
        const t = TILES[idx];
        if(!t.houses) t.houses = 0;
        if(t.houses < 5 && players[turn].money >= t.h) {
            players[turn].money -= t.h; t.houses++;
            const area = document.getElementById(`build-${idx}`);
            area.innerHTML = t.houses === 5 ? '<div class="h-hotel"></div>' : '<div class="h-house"></div>'.repeat(t.houses);
            updateUI(); showAssets();
        }
    }

    function showModal(t, b, btns) {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-body').innerHTML = b;
        const foot = document.getElementById('m-footer'); foot.innerHTML = "";
        btns.forEach(btn => {
            const bEl = document.createElement('button');
            bEl.className = 'btn'; bEl.style.background = btn.c; bEl.innerText = btn.t; bEl.onclick = btn.f;
            foot.appendChild(bEl);
        });
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal').style.display = 'none'; }
    function showHistory() { alert("Histórico de jogadas ativo."); }
    window.onresize = updatePawns;
    initSetup();
</script>
</body>
</html>
