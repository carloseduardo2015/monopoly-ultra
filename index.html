<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Brasil - Ultimate Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a; 
            --card-bg: rgba(255, 255, 255, 0.03);
            --primary: #00ffa3; 
            --secondary: #00d1ff; 
            --danger: #ff4757;
            --board-size: 85vmin;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* CANVAS DE DINHEIRO */
        #money-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }

        /* SETUP INICIAL */
        #setup { position: fixed; inset: 0; background: radial-gradient(circle at center, #111827 0%, #05070a 100%); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .setup-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 32px; width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); text-align: center; }
        .p-input-row { display: flex; gap: 10px; margin-bottom: 12px; animation: slideUp 0.3s ease-out; }
        input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; flex: 1; outline: none; }

        /* LAYOUT PRINCIPAL */
        .game-grid { display: none; width: 100vw; height: 100vh; grid-template-columns: 320px 1fr 300px; padding: 15px; gap: 15px; }

        /* SIDEBAR ESQUERDA: PLAYERS */
        .sidebar-left { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .player-card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; 
            border: 2px solid transparent; transition: 0.3s; position: relative;
        }
        .player-card.active { border-color: var(--primary); background: rgba(0, 255, 163, 0.08); transform: translateX(5px); }
        .player-card.in-jail { filter: grayscale(0.7); border-color: #555; }
        .jail-badge { 
            position: absolute; top: 10px; right: 10px; background: var(--danger); 
            font-size: 10px; padding: 4px 8px; border-radius: 10px; font-weight: 800; 
            display: none;
        }
        .player-card.in-jail .jail-badge { display: block; }

        /* CENTRO: TABULEIRO */
        .board-wrapper { display: flex; align-items: center; justify-content: center; }
        #board {
            display: grid; width: var(--board-size); height: var(--board-size);
            background: #f1f5f9; border: 10px solid #1e293b; border-radius: 12px;
            grid-template-columns: 1.5fr repeat(9, 1fr) 1.5fr;
            grid-template-rows: 1.5fr repeat(9, 1fr) 1.5fr;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .tile { border: 0.5px solid rgba(0,0,0,0.1); position: relative; color: #1e293b; display: flex; flex-direction: column; transition: 0.2s; }
        .tile .bar { width: 100%; height: 22%; border-bottom: 2px solid rgba(0,0,0,0.05); }
        .tile .name { font-size: 0.85vmin; font-weight: 800; text-align: center; padding: 4px; flex: 1; display: flex; align-items: center; justify-content: center; text-transform: uppercase; line-height: 1.2; }

        /* CENTRO DO TABULEIRO */
        .board-center { grid-column: 2/11; grid-row: 2/11; background: #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #dice-display { font-size: 10vmin; display: flex; gap: 20px; margin-bottom: 20px; color: #1e293b; }
        .main-btn { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none; padding: 20px 50px; border-radius: 100px; font-weight: 900; 
            color: #000; font-size: 18px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0, 255, 163, 0.3);
        }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        /* SIDEBAR DIREITA: LOG */
        .sidebar-right { background: var(--card-bg); border-radius: 24px; padding: 20px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); }
        .log-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 8px; margin-top: 15px; padding-right: 5px; }
        .log-entry { 
            padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.02); 
            font-size: 12px; border-left: 3px solid var(--secondary); animation: fadeIn 0.3s ease;
        }

        /* PAWNS */
        .pawn-zone { position: absolute; inset: 0; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; pointer-events: none; z-index: 50; }
        .pawn { font-size: 2.5vmin; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3)); transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .house-marker { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); font-size: 1.5vmin; }

        /* MODAIS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: white; color: #0f172a; width: 100%; max-width: 360px; border-radius: 30px; padding: 40px; text-align: center; }
        .action-btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }
    </style>
</head>
<body>

<canvas id="money-canvas"></canvas>

<div id="setup">
    <div class="setup-card">
        <h1 style="font-size: 32px; margin-bottom: 30px;">MONOPOLY <span style="color:var(--primary)">BRASIL</span></h1>
        <div id="player-inputs"></div>
        <button class="action-btn" style="background:rgba(255,255,255,0.05); color:white" onclick="addPlayerField()">+ NOVO JOGADOR</button>
        <button class="action-btn" style="background:var(--primary); color:#000; margin-top: 20px;" onclick="initGame()">INICIAR IMPÉRIO</button>
    </div>
</div>

<div class="game-grid" id="main-ui">
    <div class="sidebar-left" id="player-list"></div>

    <div class="board-wrapper">
        <div id="board">
            <div class="board-center">
                <div id="dice-display">🎲🎲</div>
                <button id="action-btn" class="main-btn" onclick="rollDice()">LANÇAR DADOS</button>
                <div id="turn-indicator" style="margin-top:20px; color:#1e293b; font-weight:800; font-size:12px; letter-spacing:1px;"></div>
            </div>
        </div>
    </div>

    <div class="sidebar-right">
        <h3 style="font-size:14px; color:var(--secondary); text-transform:uppercase; letter-spacing:1px">Histórico de Atividade</h3>
        <div class="log-container" id="event-log"></div>
    </div>
</div>

<div class="overlay" id="modal-overlay">
    <div class="modal-box">
        <div id="modal-content"></div>
        <div id="modal-actions"></div>
        <button class="action-btn" style="background:#f1f5f9; color:#64748b; margin-top:10px" onclick="closeModal()">FECHAR</button>
    </div>
</div>

<script>
const TILES_DATA = [
    {n:"PARTIDA", t:"esp"}, {n:"AV. PAULISTA", c:"#00a2ff", p:120, b:50, r:[8,40,100,300,450,600]}, {n:"AV. SÃO JOÃO", c:"#00a2ff", p:100, b:50, r:[6,30,90,270,400,550]},
    {n:"SORTE", t:"card"}, {n:"RUA 25 MARÇO", c:"#00a2ff", p:100, b:50, r:[6,30,90,270,400,550]}, {n:"MARACANÃ", p:200, t:"rail"}, 
    {n:"IMPOSTO", p:200, t:"tax"}, {n:"PRAÇA DA SÉ", c:"#955436", p:60, b:50, r:[4,20,60,180,320,450]}, {n:"COFRE", t:"card"},
    {n:"AV. SUMARÉ", c:"#955436", p:60, b:50, r:[2,10,30,90,160,250]}, {n:"VISITANTE", t:"esp"},
    {n:"VIEIRA SOUTO", c:"#ff0095", p:140, b:100, r:[10,50,150,450,625,750]}, {n:"CIA ELÉTRICA", p:150, t:"util"}, 
    {n:"NITERÓI", c:"#ff0095", p:140, b:100, r:[10,50,150,450,625,750]}, {n:"ATLÂNTICA", c:"#ff0095", p:160, b:100, r:[12,60,180,500,700,900]}, 
    {n:"EST. CARIOCA", p:200, t:"rail"}, {n:"AV. JK", c:"#ff9900", p:180, b:100, r:[14,70,200,550,750,950]}, 
    {n:"COFRE", t:"card"}, {n:"ENG. BERRINI", c:"#ff9900", p:180, b:100, r:[14,70,200,550,750,950]}, 
    {n:"FARIA LIMA", c:"#ff9900", p:200, b:100, r:[16,80,220,600,800,1000]}, {n:"ESTACIONA", t:"esp"},
    {n:"IPANEMA", c:"#ff3333", p:220, b:150, r:[18,90,250,700,875,1050]}, {n:"SORTE", t:"card"}, 
    {n:"LEBLON", c:"#ff3333", p:220, b:150, r:[18,90,250,700,875,1050]}, {n:"COPACABANA", c:"#ff3333", p:240, b:150, r:[20,100,300,750,925,1100]}, 
    {n:"ESTAÇÃO", p:200, t:"rail"}, {n:"CID. JARDIM", c:"#ffee00", p:260, b:150, r:[22,110,330,800,975,1150]}, 
    {n:"PACAEMBU", c:"#ffee00", p:260, b:150, r:[22,110,330,800,975,1150]}, {n:"CIA ÁGUA", p:150, t:"util"}, 
    {n:"IBIRAPUERA", c:"#ffee00", p:280, b:150, r:[24,120,360,850,1025,1200]}, {n:"VÁ P/ PRISÃO", t:"jail"}, 
    {n:"BARRA", c:"#00c000", p:300, b:200, r:[26,130,390,900,1100,1275]}, {n:"J. BOTÂNICO", c:"#00c000", p:300, b:200, r:[26,130,390,900,1100,1275]}, 
    {n:"COFRE", t:"card"}, {n:"LAGOA", c:"#00c000", p:320, b:200, r:[28,150,450,1000,1200,1400]}, 
    {n:"EST. REPÚBLICA", p:200, t:"rail"}, {n:"SORTE", t:"card"}, 
    {n:"AV. MORUMBI", c:"#0033ff", p:350, b:200, r:[35,175,500,1100,1300,1500]}, 
    {n:"RIQUEZA", p:100, t:"tax"}, {n:"OSCAR FREIRE", c:"#0033ff", p:400, b:200, r:[50,200,600,1400,1700,2000]}
];

const AVATARES = ["🏎️", "🎩", "🐕", "🦖", "🛳️", "🚀"];
const CORES = ["#00ffa3", "#00d1ff", "#ff4757", "#ffd700", "#a29bfe", "#ff9f43"];

let g = { players: [], turn: 0, props: {}, log: [] };

// --- SONS ---
const audio = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(freq, dur, type='sine', vol=0.1) {
    const o = audio.createOscillator(); const g = audio.createGain();
    o.frequency.value = freq; o.type = type; g.gain.setValueAtTime(vol, audio.currentTime);
    o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + dur);
}

// --- ENGINE DE LOG ---
function pushLog(msg) {
    const container = document.getElementById('event-log');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    entry.innerHTML = `<strong>[${time}]</strong> ${msg}`;
    container.appendChild(entry);
}

function addPlayerField() {
    const container = document.getElementById('player-inputs');
    const i = container.children.length;
    if(i >= 6) return;
    const div = document.createElement('div');
    div.className = 'p-input-row';
    div.innerHTML = `<input id="pname-${i}" placeholder="Nome do Player"><select id="pavatar-${i}" style="background:#222; color:white; border-radius:10px; border:none; padding:5px">${AVATARES.map(a=>`<option>${a}</option>`).join('')}</select>`;
    container.appendChild(div);
}
addPlayerField(); addPlayerField();

function initGame() {
    const fields = document.getElementById('player-inputs').children;
    for(let i=0; i<fields.length; i++) {
        const name = document.getElementById(`pname-${i}`).value || `Jogador ${i+1}`;
        const avatar = document.getElementById(`pavatar-${i}`).value;
        g.players.push({ 
            id: i, name, avatar, cash: 1500, pos: 0, color: CORES[i], 
            jailed: false, jailTime: 0, bankrupt: false 
        });
    }
    document.getElementById('setup').style.display = 'none';
    document.getElementById('main-ui').style.display = 'grid';
    drawBoard();
    updateUI();
    pushLog("O mercado financeiro abriu! Boa sorte.");
}

function drawBoard() {
    const b = document.getElementById('board');
    TILES_DATA.forEach((tile, i) => {
        const el = document.createElement('div');
        el.className = 'tile'; el.id = `tile-${i}`;
        // Posicionamento CSS Grid
        if(i <= 10) el.style.gridRow = "11"; else if(i <= 20) el.style.gridColumn = "1";
        else if(i <= 30) el.style.gridRow = "1"; else el.style.gridColumn = "11";
        if(i > 0 && i < 10) el.style.gridColumn = 11 - i; 
        if(i > 10 && i < 20) el.style.gridRow = 21 - i;
        if(i > 20 && i < 30) el.style.gridColumn = i - 19;
        if(i > 30) el.style.gridRow = i - 29;

        el.innerHTML = `${tile.c ? `<div class="bar" style="background:${tile.c}"></div>` : ''}
                        <div class="name">${tile.n}</div>
                        <div class="pawn-zone" id="pawn-zone-${i}"></div>
                        <div id="buildings-${i}"></div>`;
        b.appendChild(el);
    });
}

async function rollDice() {
    const p = g.players[g.turn];
    const btn = document.getElementById('action-btn');
    btn.disabled = true;

    let d1 = Math.floor(Math.random()*6)+1;
    let d2 = Math.floor(Math.random()*6)+1;
    
    playSfx(200, 0.1, 'square');
    document.getElementById('dice-display').innerHTML = `<span>${["⚀","⚁","⚂","⚃","⚄","⚅"][d1-1]}</span><span>${["⚀","⚁","⚂","⚃","⚄","⚅"][d2-1]}</span>`;

    // --- LÓGICA DE PRISÃO PROFISSIONAL ---
    if(p.jailed) {
        if(d1 === d2) {
            p.jailed = false; p.jailTime = 0;
            pushLog(`${p.name} tirou dados iguais e saiu da prisão!`);
        } else {
            p.jailTime++;
            if(p.jailTime >= 3) {
                p.cash -= 50; p.jailed = false; p.jailTime = 0;
                pushLog(`${p.name} pagou a fiança de $50 após 3 turnos.`);
            } else {
                pushLog(`${p.name} continua preso (Tentativa ${p.jailTime}/3)`);
                setTimeout(endTurn, 1000);
                return;
            }
        }
    }

    // Movimentação
    for(let i=0; i < (d1+d2); i++) {
        p.pos = (p.pos + 1) % 40;
        if(p.pos === 0) { p.cash += 200; pushLog(`${p.name} recebeu $200 de pro-labore.`); playSfx(600, 0.2); }
        updatePawns();
        await new Promise(r => setTimeout(r, 150));
    }

    evaluateTile(p);
    btn.innerText = "PASSAR VEZ";
    btn.disabled = false;
    btn.onclick = endTurn;
}

function evaluateTile(p) {
    const tile = TILES_DATA[p.pos];
    const prop = g.props[p.pos];

    if(p.pos === 30) {
        p.jailed = true; p.pos = 10;
        pushLog(`🚨 ${p.name} foi preso por excesso de velocidade!`);
        updatePawns();
        return;
    }

    if(tile.t === "tax") {
        p.cash -= tile.p;
        pushLog(`${p.name} pagou $${tile.p} de impostos.`);
    } else if(tile.p && !prop) {
        openPropertyModal(p.pos);
    } else if(prop && prop.owner !== g.turn) {
        const owner = g.players[prop.owner];
        const rent = tile.r[prop.lvl];
        p.cash -= rent;
        owner.cash += rent;
        pushLog(`${p.name} pagou $${rent} de aluguel para ${owner.name}`);
        if(p.cash < 0) { pushLog(`${p.name} ESTÁ QUEBRADO!`); }
    }
    updateUI();
}

function openPropertyModal(idx) {
    const tile = TILES_DATA[idx];
    const p = g.players[g.turn];
    document.getElementById('modal-content').innerHTML = `
        <h2 style="color:${tile.c || '#1e293b'}">${tile.n}</h2>
        <p style="font-size: 20px; margin: 20px 0;">Preço: <b>$${tile.p}</b></p>
    `;
    const actions = document.getElementById('modal-actions');
    actions.innerHTML = p.cash >= tile.p ? 
        `<button class="action-btn" style="background:var(--primary)" onclick="buyProp(${idx})">COMPRAR AGORA</button>` :
        `<p style="color:red; font-weight:800">SALDO INSUFICIENTE</p>`;
    document.getElementById('modal-overlay').style.display = 'flex';
}

function buyProp(idx) {
    const p = g.players[g.turn];
    p.cash -= TILES_DATA[idx].p;
    g.props[idx] = { owner: g.turn, lvl: 0 };
    pushLog(`${p.name} adquiriu ${TILES_DATA[idx].n}`);
    closeModal();
    updateUI();
}

function endTurn() {
    g.turn = (g.turn + 1) % g.players.length;
    if(g.players[g.turn].bankrupt) return endTurn();
    
    const btn = document.getElementById('action-btn');
    btn.innerText = "LANÇAR DADOS";
    btn.onclick = rollDice;
    document.getElementById('turn-indicator').innerText = `RODADA DE: ${g.players[g.turn].name}`;
    updateUI();
}

function updateUI() {
    const list = document.getElementById('player-list');
    list.innerHTML = g.players.map((p, i) => `
        <div class="player-card ${g.turn === i ? 'active' : ''} ${p.jailed ? 'in-jail' : ''}">
            <div class="jail-badge">PRESO</div>
            <div style="display:flex; align-items:center; gap:15px">
                <span style="font-size:28px">${p.avatar}</span>
                <div>
                    <div style="font-weight:800">${p.name.toUpperCase()}</div>
                    <div style="color:var(--primary); font-weight:800; font-size:18px">$${p.cash}</div>
                </div>
            </div>
        </div>
    `).join('');
    updatePawns();
    
    // Bordas de propriedades
    Object.keys(g.props).forEach(idx => {
        const tileEl = document.getElementById(`tile-${idx}`);
        tileEl.style.boxShadow = `inset 0 0 0 4px ${g.players[g.props[idx].owner].color}`;
    });
}

function updatePawns() {
    document.querySelectorAll('.pawn-zone').forEach(z => z.innerHTML = '');
    g.players.forEach(p => {
        const zone = document.getElementById(`pawn-zone-${p.pos}`);
        const span = document.createElement('span');
        span.className = 'pawn';
        span.innerHTML = p.avatar;
        zone.appendChild(span);
    });
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
</script>
</body>
</html>
