<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Brasil - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00eb84; --bg: #0b0e14; --card: #1c222d; --text: #ffffff; --sub: #94a3b8;
            --gold: linear-gradient(45deg, #f1c40f, #f39c12); --board-bg: #cee6d5;
        }
        
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); padding: 10px; min-height: 100vh; overflow-x: hidden; }

        /* --- SETUP --- */
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .setup-container { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .input-name { background: rgba(0,0,0,0.3); border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; width: 100%; font-size: 1rem; }

        /* --- BOARD --- */
        .game-layout { display: flex; flex-direction: column; align-items: center; gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        #board-container {
            position: relative; width: 380px; height: 380px; background: var(--board-bg);
            border: 4px solid #333; display: grid;
            grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr);
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
        }

        .tile { 
            border: 0.2px solid rgba(0,0,0,0.3); font-size: 6px; font-weight: 800; color: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; position: relative; text-transform: uppercase;
        }

        .board-center {
            grid-column: 2 / 11; grid-row: 2 / 11; background: var(--board-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        .logo-center { transform: rotate(-45deg); font-size: 2.2rem; font-weight: 900; color: #e74c3c; border: 4px solid #e74c3c; padding: 2px 15px; margin-bottom: 30px; }

        /* --- COLORS --- */
        .c-brown { border-top: 8px solid #955436; } .c-lblue { border-top: 8px solid #aae0fa; }
        .c-pink { border-left: 8px solid #d93a96; } .c-orange { border-left: 8px solid #f7941d; }
        .c-red { border-bottom: 8px solid #ed1c24; } .c-yellow { border-bottom: 8px solid #fef200; }
        .c-green { border-right: 8px solid #19a05e; } .c-dblue { border-right: 8px solid #0068a7; }

        .pawn { 
            width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; 
            position: absolute; z-index: 100; transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        /* --- UI --- */
        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; width: 100%; margin-top: 20px; }
        .player-card { background: var(--card); border-radius: 20px; padding: 15px; border: 2px solid transparent; position: relative; }
        .player-card.active { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,235,132,0.2); }
        .balance-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; text-align: center; margin: 10px 0; }
        
        .btn-roll { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 0 #b7950b; }
        .btn-roll:active { transform: translateY(2px); box-shadow: 0 2px 0 #b7950b; }
        .btn-roll:disabled { filter: grayscale(1); opacity: 0.5; }

        .action-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; }
        .history-list { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 8px; margin-top: 10px; height: 70px; overflow-y: auto; font-size: 0.65rem; color: var(--sub); }

        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); width: 90%; max-width: 350px; padding: 30px; border-radius: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-container">
            <h1 style="color:var(--primary); font-size: 2.5rem;">MONOPOLY</h1>
            <p style="color:var(--sub); margin-bottom:20px;">BANCO DIGITAL BRASIL</p>
            <input type="number" id="cfg-money" class="input-name" value="1500" placeholder="Saldo Inicial">
            <div id="name-inputs">
                <input type="text" class="input-name" placeholder="Jogador 1" id="name-0" value="Jogador 1">
                <input type="text" class="input-name" placeholder="Jogador 2" id="name-1" value="Jogador 2">
            </div>
            <button class="action-btn" style="width:100%; margin-bottom:10px" onclick="addField()">+ ADICIONAR JOGADOR</button>
            <button class="btn-roll" style="width:100%" onclick="iniciarJogo()">COMEÇAR JOGO</button>
        </div>
    </div>

    <div id="game-ui" style="display:none" class="game-layout">
        <div id="board-container">
            <div class="board-center">
                <div class="logo-center">MONOPOLY</div>
                <button id="main-btn" class="btn-roll" onclick="executarTurno()">LANÇAR DADOS</button>
                <div id="turn-display" style="color:#000; font-weight:800; margin-top:15px; font-size:0.8rem">AGUARDANDO...</div>
                <button class="action-btn" style="margin-top:20px; opacity:0.5" onclick="resetarJogo()">RECOMEÇAR</button>
            </div>
        </div>
        <div id="players-grid" class="players-grid"></div>
    </div>

    <div id="modal"><div class="modal-content" id="modal-content"></div></div>

    <script>
        const CORES_P = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#a29bfe', '#747d8c'];
        const TABULEIRO_DATA = [
            {n:"INÍCIO", p:0, c:""}, {n:"Sumaré", p:60, c:"c-brown"}, {n:"SORTE", p:0, c:""}, {n:"Sé", p:60, c:"c-brown"}, {n:"IMPOSTO", p:200, c:""}, {n:"M. Maracanã", p:200, c:"c-station"}, {n:"25 Março", p:100, c:"c-lblue"}, {n:"SORTE", p:0, c:""}, {n:"São João", p:100, c:"c-lblue"}, {n:"Paulista", p:120, c:"c-lblue"},
            {n:"PRISÃO", p:0, c:""}, {n:"Vieira Souto", p:140, c:"c-pink"}, {n:"LUZ", p:150, c:""}, {n:"Niterói", p:160, c:"c-pink"}, {n:"Atlântica", p:160, c:"c-pink"}, {n:"M. Carioca", p:200, c:"c-station"}, {n:"J.K.", p:180, c:"c-orange"}, {n:"SORTE", p:0, c:""}, {n:"Berrini", p:180, c:"c-orange"}, {n:"Faria Lima", p:200, c:"c-orange"},
            {n:"PARADA", p:0, c:""}, {n:"Ipanema", p:220, c:"c-red"}, {n:"SORTE", p:0, c:""}, {n:"Leblon", p:220, c:"c-red"}, {n:"Copacabana", p:240, c:"c-red"}, {n:"M. Consolação", p:200, c:"c-station"}, {n:"C. Jardim", p:260, c:"c-yellow"}, {n:"Pacaembu", p:260, c:"c-yellow"}, {n:"ÁGUA", p:150, c:""}, {n:"Ibirapuera", p:280, c:"c-yellow"},
            {n:"VÁ PRISÃO", p:0, c:""}, {n:"Barra", p:300, c:"c-green"}, {n:"J. Botânico", p:300, c:"c-green"}, {n:"SORTE", p:0, c:""}, {n:"Lagoa", p:320, c:"c-green"}, {n:"M. Repúb.", p:200, c:"c-station"}, {n:"SORTE", p:0, c:""}, {n:"Morumbi", p:350, c:"c-dblue"}, {n:"TAXA LUXO", p:100, c:""}, {n:"Oscar Freire", p:400, c:"c-dblue"}
        ];

        let jogo = { jogadores: [], turno: 0, count: 2, propriedades: {} };

        // --- SISTEMA DE PERSISTÊNCIA ---
        function salvar() { localStorage.setItem('monopoly_save', JSON.stringify(jogo)); }
        
        window.onload = () => {
            const save = localStorage.getItem('monopoly_save');
            if(save) {
                jogo = JSON.parse(save);
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                criarTabuleiro();
                // Recuperar visual das propriedades
                Object.keys(jogo.propriedades).forEach(pos => {
                    const dono = jogo.jogadores[jogo.propriedades[pos]];
                    document.getElementById(`tile-${pos}`).style.boxShadow = `inset 0 0 0 4px ${dono.cor}`;
                });
                render();
            }
        };

        function criarTabuleiro() {
            const container = document.getElementById("board-container");
            let positions = {};
            for(let i=0; i<=10; i++) positions[i] = {r: 11, c: 11-i};
            for(let i=11; i<=20; i++) positions[i] = {r: 11-(i-10), c: 1};
            for(let i=21; i<=30; i++) positions[i] = {r: 1, c: i-19};
            for(let i=31; i<=39; i++) positions[i] = {r: i-29, c: 11};

            TABULEIRO_DATA.forEach((data, i) => {
                let t = document.createElement("div");
                t.className = "tile " + data.c;
                t.id = `tile-${i}`;
                t.style.gridRow = positions[i].r;
                t.style.gridColumn = positions[i].c;
                t.innerHTML = `<span>${data.n}</span>${data.p > 0 ? `<b>$${data.p}</b>` : ''}`;
                container.appendChild(t);
            });
        }

        function iniciarJogo() {
            const saldo = parseInt(document.getElementById('cfg-money').value) || 1500;
            for(let i=0; i<jogo.count; i++) {
                jogo.jogadores.push({
                    id: i, nome: document.getElementById(`name-${i}`).value || `J${i+1}`,
                    saldo: saldo, pos: 0, cor: CORES_P[i], historico: ["Iniciou"], preso: false, divida: 0
                });
            }
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            criarTabuleiro(); render(); salvar();
        }

        function render() {
            document.querySelectorAll(".pawn").forEach(p => p.remove());
            jogo.jogadores.forEach(j => {
                let p = document.createElement("div");
                p.className = "pawn"; p.style.background = j.cor;
                document.getElementById(`tile-${j.pos}`).appendChild(p);
                p.style.transform = `translate(${j.id*3}px, ${j.id*3}px)`;
            });

            document.getElementById('players-grid').innerHTML = jogo.jogadores.map((j, i) => `
                <div class="player-card ${jogo.turno === i ? 'active' : ''}">
                    <div style="display:flex; justify-content:space-between">
                        <b style="color:${j.cor}">${j.nome.toUpperCase()}</b>
                        <span>${j.preso ? '⛓️ PRESO' : '📍 CASA '+j.pos}</span>
                    </div>
                    <div class="balance-box">
                        <div style="font-size:1.6rem; font-weight:800; color:var(--primary)">M$ ${j.saldo.toLocaleString()}</div>
                        ${j.divida > 0 ? `<div style="color:#ff4757; font-size:0.7rem">DÍVIDA: M$ ${j.divida}</div>` : ''}
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px">
                        <button class="action-btn" onclick="abrirPagar(${i})">PAGAR</button>
                        <button class="action-btn" onclick="abrirComprar(${i})">COMPRAR</button>
                        <button class="action-btn" onclick="emprestimo(${i})">BANCO</button>
                        <button class="action-btn" onclick="quitar(${i})">QUITAR</button>
                    </div>
                    <div class="history-list">${j.historico.map(h => `<div>• ${h}</div>`).join('')}</div>
                </div>
            `).join('');
            
            const atual = jogo.jogadores[jogo.turno];
            document.getElementById('turn-display').innerText = `VEZ DE: ${atual.nome.toUpperCase()}`;
            document.getElementById('turn-display').style.color = atual.cor;
            salvar();
        }

        async function executarTurno() {
            const btn = document.getElementById('main-btn');
            btn.disabled = true;
            let j = jogo.jogadores[jogo.turno];
            
            const d1 = Math.floor(Math.random()*6)+1;
            const d2 = Math.floor(Math.random()*6)+1;
            const total = d1 + d2;

            abrirModal(`<h2>🎲🎲</h2><h1 style="font-size:3.5rem; margin:10px 0">${total}</h1><p>${j.nome} está andando...</p>`);
            await new Promise(r => setTimeout(r, 1000));
            fecharModal();

            if(j.preso && d1 !== d2) {
                j.historico.unshift("Tentou sair da prisão e falhou.");
            } else {
                j.preso = false;
                for(let s=0; s<total; s++) {
                    j.pos = (j.pos + 1) % 40;
                    if(j.pos === 0) { j.saldo += 200; j.historico.unshift("Passou no Início (+200)"); }
                    render();
                    await new Promise(r => setTimeout(r, 150));
                }
                processarCasa(j);
            }

            jogo.turno = (jogo.turno + 1) % jogo.jogadores.length;
            btn.disabled = false;
            render();
        }

        function processarCasa(j) {
            const t = TABULEIRO_DATA[j.pos];
            const donoId = jogo.propriedades[j.pos];

            // 1. Cobrança de Aluguel Automática
            if(donoId !== undefined && donoId !== j.id) {
                const aluguel = Math.floor(t.p * 0.15); // 15% do valor da casa
                j.saldo -= aluguel;
                jogo.jogadores[donoId].saldo += aluguel;
                alert(`ALUGUEL! Você pagou M$ ${aluguel} para ${jogo.jogadores[donoId].nome}`);
                j.historico.unshift(`Pagou aluguel de M$ ${aluguel}`);
                return;
            }

            // 2. Eventos Especiais
            if(t.n === "VÁ PRISÃO") { j.pos = 10; j.preso = true; alert("POLÍCIA! Vá direto para a prisão."); }
            if(t.n === "IMPOSTO" || t.n === "TAXA LUXO") { j.saldo -= 200; alert("FISCO: Você pagou M$ 200 em impostos."); }
            if(t.n === "SORTE") {
                const sorteio = [
                    {m:"Herança recebida! +100", v:100},
                    {m:"Multa de trânsito! -50", v:-50},
                    {m:"Restituição de IR! +200", v:200},
                    {m:"Reforma na casa! -150", v:-150}
                ][Math.floor(Math.random()*4)];
                j.saldo += sorteio.v;
                alert(sorteio.m);
            }
        }

        function abrirComprar(id) {
            const pos = jogo.jogadores[id].pos;
            const t = TABULEIRO_DATA[pos];
            if(jogo.propriedades[pos] !== undefined) return alert("Já tem dono!");
            if(t.p > 0) {
                if(confirm(`Comprar ${t.n} por M$ ${t.p}?`)) {
                    if(jogo.jogadores[id].saldo >= t.p) {
                        jogo.jogadores[id].saldo -= t.p;
                        jogo.propriedades[pos] = id;
                        document.getElementById(`tile-${pos}`).style.boxShadow = `inset 0 0 0 4px ${jogo.jogadores[id].cor}`;
                        jogo.jogadores[id].historico.unshift("Comprou " + t.n);
                        render();
                    } else alert("Saldo insuficiente!");
                }
            } else alert("Esta casa não pode ser comprada.");
        }

        function abrirPagar(id) {
            let h = `<h3>TRANSFERIR</h3><input type="number" id="val-p" class="input-name" placeholder="Valor M$">
            <select id="dest-p" class="input-name"><option value="b">BANCO</option>`;
            jogo.jogadores.forEach(p => { if(p.id !== id) h += `<option value="${p.id}">${p.nome}</option>`; });
            h += `</select><button class="btn-roll" style="width:100%" onclick="confPagar(${id})">PAGAR AGORA</button>`;
            abrirModal(h);
        }

        function confPagar(de) {
            const v = parseInt(document.getElementById('val-p').value);
            const para = document.getElementById('dest-p').value;
            if(v > 0 && jogo.jogadores[de].saldo >= v) {
                jogo.jogadores[de].saldo -= v;
                if(para !== 'b') {
                    jogo.jogadores[para].saldo += v;
                    jogo.jogadores[para].historico.unshift(`Recebeu M$ ${v} de ${jogo.jogadores[de].nome}`);
                }
                jogo.jogadores[de].historico.unshift(`Pagou M$ ${v}`);
                fecharModal(); render();
            }
        }

        function emprestimo(id) { 
            jogo.jogadores[id].saldo += 500; 
            jogo.jogadores[id].divida += 550; 
            jogo.jogadores[id].historico.unshift("Pegou empréstimo bancário");
            render(); 
        }

        function quitar(id) { 
            if(jogo.jogadores[id].saldo >= jogo.jogadores[id].divida && jogo.jogadores[id].divida > 0) { 
                jogo.jogadores[id].saldo -= jogo.jogadores[id].divida; 
                jogo.jogadores[id].divida = 0; 
                render(); 
            } 
        }

        function addField() { if(jogo.count < 6) { let i = document.createElement('input'); i.className='input-name'; i.id=`name-${jogo.count}`; i.placeholder=`Jogador ${jogo.count+1}`; document.getElementById('name-inputs').appendChild(i); jogo.count++; } }
        function abrirModal(h) { document.getElementById('modal-content').innerHTML = h; document.getElementById('modal').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal').style.display = 'none'; }
        function resetarJogo() { if(confirm("Apagar progresso e recomeçar?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
