<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly GO! Remake ULTRA PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --board-green: #CDE6D0;
            /* Cores dos 10 Jogadores */
            --p0: #2ecc71; --p1: #e91e63; --p2: #3498db; --p3: #f1c40f; 
            --p4: #9b59b6; --p5: #e67e22; --p6: #1abc9c; --p7: #ecf0f1;
            --p8: #34495e; --p9: #ff7675;
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0f0f0f; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; color: white; }

        /* BARRA DE JOGADORES - MODERNA COM SCROLL */
        .players-container {
            width: 100%; max-width: 600px; display: flex; overflow-x: auto; gap: 10px;
            padding: 15px; scroll-behavior: smooth; scrollbar-width: none;
        }
        .players-container::-webkit-scrollbar { display: none; }

        .player-card {
            background: rgba(255,255,255,0.05); min-width: 110px; padding: 12px;
            border-radius: 15px; border: 2px solid transparent; text-align: center;
            transition: 0.4s; flex-shrink: 0; backdrop-filter: blur(5px);
        }
        .player-card.active { border-color: var(--gold); background: rgba(255,215,0,0.15); transform: translateY(-5px); }
        .player-card.bankrupt { opacity: 0.3; filter: grayscale(1); }
        .money { color: #2ecc71; font-weight: 900; font-size: 14px; }

        /* TABULEIRO */
        .game-wrapper { position: relative; width: 95vw; height: 95vw; max-width: 480px; max-height: 480px; padding: 8px; background: #222; border-radius: 15px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        #board { display: grid; width: 100%; height: 100%; background: var(--board-green); grid-template-columns: 1.3fr repeat(9, 1fr) 1.3fr; grid-template-rows: 1.3fr repeat(9, 1fr) 1.3fr; border: 3px solid #1a1a1a; }

        .tile { border: 0.2px solid rgba(0,0,0,0.15); position: relative; display: flex; flex-direction: column; font-size: 5px; color: #1e272e; font-weight: 800; text-align: center; cursor: pointer; }
        .tile .bar { width: 100%; height: 22%; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .tile .name { padding: 1px; flex-grow: 1; display: flex; align-items: center; justify-content: center; text-transform: uppercase; line-height: 1.1; }
        .owner-indicator { position: absolute; bottom: 0; width: 100%; height: 5px; transition: 0.3s; }
        .houses { position: absolute; top: 22%; width: 100%; font-size: 7px; text-shadow: 0 0 2px white; }

        /* PEÕES */
        .pawn { position: absolute; font-size: 20px; z-index: 100; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* BOTÃO E DADOS */
        .controls { display: flex; align-items: center; gap: 20px; margin-top: 10px; }
        .btn-go { width: 80px; height: 80px; background: linear-gradient(135deg, #00f2fe, #4facfe); border: 5px solid white; border-radius: 50%; color: white; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 6px 0 #007bb0; }
        .btn-go:active { transform: translateY(4px); box-shadow: 0 2px 0 #007bb0; }
        .btn-go:disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }

        .die { width: 45px; height: 45px; background: white; border-radius: 10px; color: #222; font-size: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #bbb; }

        /* MODAL */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 1000; backdrop-filter: blur(8px); }
        #modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #1a1a1a; padding: 25px; border-radius: 25px; width: 85%; max-width: 340px; text-align: center; display: none; z-index: 1001; }
        .m-btn { padding: 12px 20px; border-radius: 50px; border: none; font-weight: 900; cursor: pointer; margin: 5px; min-width: 100px; }
        
        .shake { animation: shake 0.4s infinite; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(2px, -2px); } 50% { transform: translate(-2px, 2px); } }
    </style>
</head>
<body>

<div class="players-container" id="players-list">
    </div>

<div class="game-wrapper">
    <div id="board">
        <div class="dice-box" style="grid-column: 4/9; grid-row: 5/8; display: flex; gap: 15px; justify-content: center; align-items: center; z-index: 5;">
            <div id="d1" class="die">⚀</div>
            <div id="d2" class="die">⚀</div>
        </div>
    </div>
    <div id="pawns-container"></div>
</div>

<div class="controls">
    <button id="btn-roll" class="btn-go" onclick="rollDice()">GO!</button>
</div>

<div id="overlay"></div>
<div id="modal">
    <h2 id="m-title" style="margin:0; color: #333;">Ação</h2>
    <p id="m-body" style="font-size: 14px; line-height: 1.5;"></p>
    <div id="m-footer"></div>
</div>

<script>
    const TILES = [
        {n: "PARTIDA", c: null, p: 0}, {n: "Sumaré", c: "#955436", p: 60}, {n: "Cofre", c: null, p: 0}, 
        {n: "Praça da Sé", c: "#955436", p: 60}, {n: "Imposto", c: null, p: 0}, {n: "Maracanã", c: "#333", p: 200},
        {n: "25 de Março", c: "#87CEEB", p: 100}, {n: "Sorte", c: null, p: 0}, {n: "São João", c: "#87CEEB", p: 100},
        {n: "Paulista", c: "#87CEEB", p: 120}, {n: "Prisão", c: null, p: 0}, {n: "Vieira Souto", c: "#D93A96", p: 140},
        {n: "Cia Luz", c: "#ffce00", p: 150}, {n: "Niterói", c: "#D93A96", p: 140}, {n: "Atlântica", c: "#D93A96", p: 160},
        {n: "Carioca", c: "#333", p: 200}, {n: "Av. JK", c: "#F7941D", p: 180}, {n: "Cofre", c: null, p: 0},
        {n: "Berrini", c: "#F7941D", p: 180}, {n: "Faria Lima", c: "#F7941D", p: 200}, {n: "Parada", c: null, p: 0},
        {n: "Ipanema", c: "#ED1C24", p: 220}, {n: "Sorte", c: null, p: 0}, {n: "Leblon", c: "#ED1C24", p: 220},
        {n: "Copacabana", c: "#ED1C24", p: 240}, {n: "Consolação", c: "#333", p: 200}, {n: "Cid. Jardim", c: "#FFF200", p: 260},
        {n: "Pacaembu", c: "#FFF200", p: 260}, {n: "Cia Água", c: "#ffce00", p: 150}, {n: "Ibirapuera", c: "#FFF200", p: 280},
        {n: "Vá Preso", c: null, p: 0}, {n: "Barra", c: "#1FB25A", p: 300}, {n: "J. Botânico", c: "#1FB25A", p: 300},
        {n: "Cofre", c: null, p: 0}, {n: "Lagoa", c: "#1FB25A", p: 320}, {n: "República", c: "#333", p: 200},
        {n: "Sorte", c: null, p: 0}, {n: "Morumbi", c: "#006AB3", p: 350}, {n: "Riqueza", c: null, p: 0}, {n: "Oscar Freire", c: "#006AB3", p: 400}
    ];

    const ICONS = ["🦆", "🏎️", "🚢", "🦖", "🐕", "🎩", "🐱", "🚀", "🍕", "💎"];
    let players = Array.from({length: 10}, (_, i) => ({
        id: i, name: `P${i+1}`, icon: ICONS[i], money: 1500, pos: 0, active: true
    }));
    
    // Customizar nomes dos primeiros conforme pedido
    players[0].name = "K"; players[1].name = "J";

    let turn = 0;
    const diceIcons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
    const audio = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(f, t, d) {
        const o = audio.createOscillator(); const g = audio.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audio.currentTime);
        g.gain.setValueAtTime(0.1, audio.currentTime); o.connect(g); g.connect(audio.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d); o.stop(audio.currentTime + d);
    }

    function init() {
        const board = document.getElementById('board');
        const list = document.getElementById('players-list');
        const pawns = document.getElementById('pawns-container');

        TILES.forEach((tile, i) => {
            const div = document.createElement('div');
            div.className = 'tile'; div.id = `tile-${i}`;
            if(i <= 10) { div.style.gridRow = "11"; div.style.gridColumn = 11 - i; }
            else if(i <= 20) { div.style.gridColumn = "1"; div.style.gridRow = 21 - i; }
            else if(i <= 30) { div.style.gridRow = "1"; div.style.gridColumn = i - 19; }
            else { div.style.gridColumn = "11"; div.style.gridRow = i - 29; }

            div.innerHTML = `
                ${tile.c ? `<div class="bar" style="background:${tile.c}"></div>` : ''}
                <div class="houses" id="h-${i}"></div>
                <div class="name">${tile.n}</div>
                <div class="owner-indicator" id="own-${i}"></div>
            `;
            div.onclick = () => showInfo(i);
            board.appendChild(div);
        });

        players.forEach(p => {
            const card = document.createElement('div');
            card.className = 'player-card'; card.id = `card-${p.id}`;
            card.innerHTML = `<div>${p.icon} ${p.name}</div><div class="money" id="m-${p.id}">$${p.money}</div>`;
            list.appendChild(card);

            const pawn = document.createElement('div');
            pawn.className = 'pawn'; pawn.id = `pawn-${p.id}`; pawn.innerText = p.icon;
            pawns.appendChild(pawn);
        });

        updateUI();
    }

    function updateUI() {
        players.forEach(p => {
            const card = document.getElementById(`card-${p.id}`);
            card.className = p.active ? (turn === p.id ? 'player-card active' : 'player-card') : 'player-card bankrupt';
            document.getElementById(`m-${p.id}`).innerText = `$${p.money}`;
            
            const tile = document.getElementById(`tile-${p.pos}`);
            const pawn = document.getElementById(`pawn-${p.id}`);
            pawn.style.top = (tile.offsetTop + 5 + (p.id * 2)) + 'px';
            pawn.style.left = (tile.offsetLeft + 5 + (p.id * 2)) + 'px';
            pawn.style.display = p.active ? 'block' : 'none';
        });
        document.getElementById(`card-${turn}`).scrollIntoView({inline: 'center'});
    }

    async function rollDice() {
        document.getElementById('btn-roll').disabled = true;
        playSound(440, 'square', 0.1);
        const d1 = Math.floor(Math.random() * 6) + 1;
        const d2 = Math.floor(Math.random() * 6) + 1;
        
        const el1 = document.getElementById('d1'); const el2 = document.getElementById('d2');
        el1.classList.add('shake'); el2.classList.add('shake');

        setTimeout(async () => {
            el1.classList.remove('shake'); el2.classList.remove('shake');
            el1.innerText = diceIcons[d1-1]; el2.innerText = diceIcons[d2-1];
            await move(d1 + d2);
        }, 600);
    }

    async function move(steps) {
        const p = players[turn];
        for(let i=0; i<steps; i++) {
            p.pos = (p.pos + 1) % 40;
            if(p.pos === 0) { p.money += 200; playSound(800, 'sine', 0.2); }
            updateUI();
            playSound(150, 'triangle', 0.05);
            await new Promise(r => setTimeout(r, 200));
        }
        processTile();
    }

    function processTile() {
        const p = players[turn];
        const tile = TILES[p.pos];

        if(tile.n === "Sorte" || tile.n === "Cofre") {
            const val = (Math.floor(Math.random() * 20) - 10) * 10;
            const msg = val >= 0 ? `Ganhou $${val}!` : `Perdeu $${Math.abs(val)}!`;
            p.money += val;
            showModal(tile.n, msg, [{t: "OK", c: "#4facfe", f: closeModal}]);
            return;
        }

        if(p.pos === 30) {
            showModal("POLÍCIA!", "Vá para a prisão!", [{t: "FUUU...", c: "#e91e63", f: () => { p.pos = 10; closeModal(); }}]);
            return;
        }

        if(tile.p > 0) {
            if(!tile.owner) {
                showModal(tile.n, `Terreno por $${tile.p}. Comprar?`, [
                    {t: "SIM", c: "#2ecc71", f: () => buy(p.pos)},
                    {t: "NÃO", c: "#ccc", f: closeModal}
                ]);
            } else if(tile.owner.id !== p.id) {
                const rent = Math.floor(tile.p * 0.1) + (tile.houses || 0) * 50;
                payRent(p, tile.owner, rent, tile.n);
            }
        }

        if(!document.getElementById('modal').style.display.includes('block')) nextTurn();
    }

    function buy(pos) {
        const p = players[turn]; const tile = TILES[pos];
        if(p.money >= tile.p) {
            p.money -= tile.p; tile.owner = p; tile.houses = 0;
            document.getElementById(`own-${pos}`).style.background = `var(--p${p.id})`;
            playSound(1000, 'sine', 0.2);
            closeModal();
        } else { alert("Sem saldo!"); closeModal(); }
    }

    function payRent(from, to, val, name) {
        from.money -= val; to.money += val;
        playSound(200, 'sawtooth', 0.3);
        showModal("ALUGUEL", `Pagou $${val} para ${to.name} em ${name}`, [{t: "PAGAR", c: "#f44336", f: checkBankrupt}]);
    }

    function checkBankrupt() {
        const p = players[turn];
        if(p.money < 0) {
            p.active = false;
            p.money = 0;
            // Libera propriedades
            TILES.forEach((t, i) => { if(t.owner === p) { t.owner = null; t.houses = 0; document.getElementById(`own-${i}`).style.background = 'none'; } });
            showModal("FALÊNCIA", `${p.name} saiu do jogo!`, [{t: "OK", c: "#333", f: closeModal}]);
        } else closeModal();
    }

    function nextTurn() {
        do { turn = (turn + 1) % 10; } while(!players[turn].active);
        document.getElementById('btn-roll').disabled = false;
        updateUI();
    }

    function showInfo(pos) {
        const t = TILES[pos]; const p = players[turn];
        if(t.owner === p && t.houses < 5) {
            const cost = 100;
            showModal(t.n, `Deseja construir por $${cost}?`, [
                {t: "CONSTRUIR", c: "#2ecc71", f: () => {
                    if(p.money >= cost) { 
                        p.money -= cost; t.houses = (t.houses || 0) + 1;
                        document.getElementById(`h-${pos}`).innerText = t.houses == 5 ? "🏨" : "🏠".repeat(t.houses);
                        closeModal();
                    } else alert("Sem saldo!");
                }},
                {t: "FECHAR", c: "#ccc", f: closeModal}
            ]);
        }
    }

    function showModal(t, b, btns) {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-body').innerText = b;
        const f = document.getElementById('m-footer'); f.innerHTML = "";
        btns.forEach(x => {
            const btn = document.createElement('button'); btn.className = "m-btn";
            btn.innerText = x.t; btn.style.background = x.c; btn.style.color = "white";
            btn.onclick = x.f; f.appendChild(btn);
        });
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('modal').style.display = 'none';
        nextTurn();
    }

    window.onload = init;
</script>
</body>
</html>
