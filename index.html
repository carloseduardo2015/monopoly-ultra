<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Brasil - Versão Estável</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00eb84; --bg: #0b0e14; --card: #1c222d; --text: #ffffff; --board-bg: #cee6d5; --edge: #222; --gold: #f1c40f; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 5px; overflow-x: hidden; }
        
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .setup-container { width: 100%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 25px; text-align: center; border: 1px solid #333; }
        .player-config-grid { display: grid; grid-template-columns: 1fr; gap: 10px; max-height: 300px; overflow-y: auto; margin: 15px 0; }
        .player-config-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; display: flex; gap: 10px; align-items: center; }
        .player-config-card input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 8px; }

        .game-layout { display: none; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        #board-container {
            position: relative; width: 98vw; height: 98vw; max-width: 600px; max-height: 600px;
            background: var(--board-bg); border: 6px solid var(--edge); display: grid;
            grid-template-columns: 1.5fr repeat(9, 1fr) 1.5fr; grid-template-rows: 1.5fr repeat(9, 1fr) 1.5fr;
        }
        .tile { border: 0.2px solid rgba(0,0,0,0.15); font-size: 6px; font-weight: 800; color: #000; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; text-align: center; }
        .bar { width: 100%; height: 12px; border-bottom: 1px solid #000; }
        .pawn-grid { position: absolute; bottom: 2px; width: 100%; height: 50%; display: grid; grid-template-columns: repeat(4, 1fr); align-items: center; justify-items: center; }
        .pawn { font-size: 14px; transition: 0.2s; z-index: 5; }
        .board-center { grid-column: 2 / 11; grid-row: 2 / 11; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* CARTA QUE TRAVAVA - AGORA COM CLICK PARA FECHAR */
        #overlay-card { 
            position: absolute; width: 90%; background: white; color: black; padding: 20px; 
            border-radius: 15px; border: 5px solid var(--gold); display: none; z-index: 1000; 
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); cursor: pointer;
        }
        #overlay-card::after { content: "Pressione para continuar"; display: block; font-size: 10px; margin-top: 15px; color: #666; font-weight: bold; }

        .players-sidebar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 98vw; max-width: 600px; margin-top: 10px; }
        .p-card { background: var(--card); padding: 10px; border-radius: 15px; border: 3px solid transparent; }
        .p-card.active { border-color: var(--primary); }
        .btn { border: none; border-radius: 50px; font-weight: 800; cursor: pointer; }
        .btn-main { background: var(--gold); color: #000; padding: 12px 25px; box-shadow: 0 4px 0 #b7950b; }
        .btn-action { background: var(--primary); color: #000; padding: 10px; margin-top: 5px; width: 100%; font-size: 12px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-container">
            <h1 style="color:var(--primary)">MONOPOLY BRASIL</h1>
            <p>Jogadores (2-8):</p>
            <input type="number" id="qty" value="2" min="2" max="8" onchange="gerarConfig()" style="padding:10px; width:60px;">
            <div id="config-area" class="player-config-grid"></div>
            <button onclick="iniciarJogo()" class="btn btn-main" style="width:100%">JOGAR</button>
        </div>
    </div>

    <div class="game-layout" id="game-ui">
        <div id="board-container">
            <div id="overlay-card" onclick="fecharCarta()"></div>
            <div class="board-center">
                <div id="dice-view" style="font-size:35px; margin-bottom:10px;">🎲</div>
                <button id="roll-btn" class="btn btn-main" onclick="rolarDados()">ROLAR DADOS</button>
                <button id="buy-btn" class="btn btn-action" style="display:none" onclick="comprarProp()"></button>
            </div>
        </div>
        <div class="players-sidebar" id="sidebar"></div>
    </div>

    <script>
        const AVATARES = ["🏎️", "🎩", "🐕", "🦖", "🚢", "🐈", "🦆", "🛵"];
        const CORES = ["#ff4757", "#1e90ff", "#2ed573", "#ffa502", "#a29bfe", "#fd79a8", "#fab1a0", "#00cec9"];

        const TABULEIRO = [
            {n:"PARTIDA"}, {n:"AV. SUMARÉ", c:"#955436", p:60, b:50, r:[2, 10, 30, 90, 160, 250]}, {n:"COFRE"}, 
            {n:"PRAÇA DA SÉ", c:"#955436", p:60, b:50, r:[4, 20, 60, 180, 320, 450]}, {n:"IMPOSTO", p:200}, 
            {n:"METRÔ MARACANÃ", p:200, tipo:"metro"}, {n:"25 DE MARÇO", c:"#aae0fa", p:100, b:50, r:[6, 30, 90, 270, 400, 550]}, 
            {n:"SORTE"}, {n:"AV. SÃO JOÃO", c:"#aae0fa", p:100, b:50, r:[6, 30, 90, 270, 400, 550]}, 
            {n:"AV. PAULISTA", c:"#aae0fa", p:120, b:50, r:[8, 40, 100, 300, 450, 600]}, {n:"PRISÃO"}, 
            {n:"VIEIRA SOUTO", c:"#d93a96", p:140, b:100, r:[10, 50, 150, 450, 625, 750]}, {n:"CIA ELÉTRICA", p:150, tipo:"util"}, 
            {n:"NITEROI", c:"#d93a96", p:140, b:100, r:[10, 50, 150, 450, 625, 750]}, {n:"ATLÂNTICA", c:"#d93a96", p:160, b:100, r:[12, 60, 180, 500, 700, 900]}, 
            {n:"METRÔ CARIOCA", p:200, tipo:"metro"}, {n:"JK", c:"#f7941d", p:180, b:100, r:[14, 70, 200, 550, 750, 950]}, {n:"COFRE"}, 
            {n:"BERRINI", c:"#f7941d", p:180, b:100, r:[14, 70, 200, 550, 750, 950]}, {n:"FARIA LIMA", c:"#f7941d", p:200, b:100, r:[16, 80, 220, 600, 800, 1000]},
            {n:"ESTAC. GRÁTIS"}, {n:"IPANEMA", c:"#ed1c24", p:220, b:150, r:[18, 90, 250, 700, 875, 1050]}, {n:"SORTE"}, 
            {n:"LEBLON", c:"#ed1c24", p:220, b:150, r:[18, 90, 250, 700, 875, 1050]}, {n:"COPACABANA", c:"#ed1c24", p:240, b:150, r:[20, 100, 300, 750, 925, 1100]}, 
            {n:"METRÔ CONSOLAÇÃO", p:200, tipo:"metro"}, {n:"CIDADE JARDIM", c:"#fef200", p:260, b:150, r:[22, 110, 330, 800, 975, 1150]}, 
            {n:"PACAEMBU", c:"#fef200", p:260, b:150, r:[22, 110, 330, 800, 975, 1150]}, {n:"ÁGUA", p:150, tipo:"util"}, 
            {n:"IBIRAPUERA", c:"#fef200", p:280, b:150, r:[24, 120, 360, 850, 1025, 1200]}, {n:"VÁ PRISÃO"}, 
            {n:"BARRA", c:"#19a05e", p:300, b:200, r:[26, 130, 390, 900, 1100, 1275]}, {n:"BOTÂNICO", c:"#19a05e", p:300, b:200, r:[26, 130, 390, 900, 1100, 1275]}, 
            {n:"COFRE"}, {n:"LAGOA", c:"#19a05e", p:320, b:200, r:[28, 150, 450, 1000, 1200, 1400]}, 
            {n:"METRÔ REPÚBLICA", p:200, tipo:"metro"}, {n:"SORTE"}, 
            {n:"MORUMBI", c:"#0068a7", p:350, b:200, r:[35, 175, 500, 1100, 1300, 1500]}, {n:"TAXA RIQUEZA", p:100}, 
            {n:"OSCAR FREIRE", c:"#0068a7", p:400, b:200, r:[50, 200, 600, 1400, 1700, 2000]}
        ];

        let jogo = { jogadores: [], turno: 0, props: {} };

        function gerarConfig() {
            let n = document.getElementById('qty').value;
            let html = "";
            for(let i=0; i<n; i++) html += `<div class="player-config-card"><input type="text" id="n-${i}" value="Jogador ${i+1}"></div>`;
            document.getElementById('config-area').innerHTML = html;
        }
        gerarConfig();

        function iniciarJogo() {
            let n = document.getElementById('qty').value;
            for(let i=0; i<n; i++) jogo.jogadores.push({ id:i, nome:document.getElementById(`n-${i}`).value, avatar:AVATARES[i], saldo:1500, pos:0, cor:CORES[i] });
            document.getElementById('setup-screen').style.display = "none";
            document.getElementById('game-ui').style.display = "flex";
            desenharBoard(); render();
        }

        function desenharBoard() {
            const container = document.getElementById('board-container');
            TABULEIRO.forEach((casa, i) => {
                const el = document.createElement('div'); el.className = 'tile'; el.id = `tile-${i}`;
                if(i <= 10) el.style.gridRow = "11";
                if(i >= 10 && i <= 20) el.style.gridColumn = "1";
                if(i >= 20 && i <= 30) el.style.gridRow = "1";
                if(i >= 30) el.style.gridColumn = "11";
                if(i > 0 && i < 10) el.style.gridColumn = 11 - i;
                if(i > 10 && i < 20) el.style.gridRow = 21 - i;
                if(i > 20 && i < 30) el.style.gridColumn = i - 19;
                if(i > 30) el.style.gridRow = i - 29;
                el.innerHTML = `${casa.c ? `<div class="bar" style="background:${casa.c}"></div>`:''}<span>${casa.n}</span><div class="pawn-grid" id="pg-${i}"></div><div id="build-${i}" style="font-size:8px"></div>`;
                container.appendChild(el);
            });
        }

        function rolarDados() {
            let total = (Math.floor(Math.random()*6)+1) + (Math.floor(Math.random()*6)+1);
            document.getElementById('dice-view').innerText = "🎲 " + total;
            let j = jogo.jogadores[jogo.turno];
            j.pos = (j.pos + total) % 40;
            processarCasa(j);
        }

        function processarCasa(j) {
            const casa = TABULEIRO[j.pos];
            const prop = jogo.props[j.pos];

            if(casa.n === "SORTE" || casa.n === "COFRE") {
                const sorte = Math.random() > 0.5 ? 100 : -100;
                j.saldo += sorte;
                mostrarCarta(`${casa.n}`, `${sorte > 0 ? 'Recebeu' : 'Pagou'} $${Math.abs(sorte)} por sorte!`);
            } else if(prop && prop.dono !== j.id) {
                let aluguel = casa.r ? casa.r[prop.nivel] : 50;
                j.saldo -= aluguel; jogo.jogadores[prop.dono].saldo += aluguel;
            } else if(casa.p && !prop) {
                const b = document.getElementById('buy-btn'); b.style.display = "block";
                b.innerText = `COMPRAR ${casa.n} ($${casa.p})`;
            }
            
            document.getElementById('roll-btn').innerText = "PASSAR VEZ";
            document.getElementById('roll-btn').onclick = passarVez;
            render();
        }

        function mostrarCarta(titulo, texto) {
            const card = document.getElementById('overlay-card');
            card.innerHTML = `<h2>${titulo}</h2><p>${texto}</p>`;
            card.style.display = "block";
        }

        function fecharCarta() {
            document.getElementById('overlay-card').style.display = "none";
        }

        function passarVez() {
            fecharCarta();
            jogo.turno = (jogo.turno + 1) % jogo.jogadores.length;
            document.getElementById('roll-btn').innerText = "ROLAR DADOS";
            document.getElementById('roll-btn').onclick = rolarDados;
            document.getElementById('buy-btn').style.display = "none";
            render();
        }

        function comprarProp() {
            let j = jogo.jogadores[jogo.turno]; let casa = TABULEIRO[j.pos];
            if(j.saldo >= casa.p) { j.saldo -= casa.p; jogo.props[j.pos] = { dono: j.id, nivel: 0 }; }
            document.getElementById('buy-btn').style.display = "none"; render();
        }

        function render() {
            document.querySelectorAll('.pawn-grid').forEach(g => g.innerHTML = "");
            jogo.jogadores.forEach((j, i) => {
                const p = document.createElement('div'); p.className = "pawn"; p.innerHTML = j.avatar;
                document.getElementById(`pg-${j.pos}`).appendChild(p);
            });
            Object.keys(jogo.props).forEach(idx => {
                document.getElementById(`tile-${idx}`).style.boxShadow = `inset 0 0 0 3px ${jogo.jogadores[jogo.props[idx].dono].cor}`;
            });
            document.getElementById('sidebar').innerHTML = jogo.jogadores.map((j, i) => `
                <div class="p-card ${jogo.turno === i ? 'active' : ''}">
                    <b>${j.avatar} ${j.nome}</b><br>$${j.saldo}
                </div>`).join('');
        }
    </script>
</body>
</html>
