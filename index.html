<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monopoly Ultra 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
:root{
--gold:#FFD700;
--glass:rgba(255,255,255,0.08);
}

*{box-sizing:border-box;font-family:Montserrat}

body{
margin:0;
background:radial-gradient(circle,#1a1a2e,#0f0f0f);
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* BOARD 3D */
.board{
width:95vw;
height:95vw;
max-width:420px;
max-height:420px;
display:grid;
grid-template-columns:repeat(10,1fr);
background:#cde6d0;
border-radius:20px;
transform:perspective(900px) rotateX(25deg);
box-shadow:0 40px 80px rgba(0,0,0,.7);
overflow:hidden;
}

/* TILE 3D */
.tile{
border:1px solid rgba(0,0,0,.1);
font-size:6px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
transition:.3s;
background:linear-gradient(#fff,#ddd);
}
.tile:hover{
transform:translateZ(20px) scale(1.2);
z-index:2;
box-shadow:0 0 15px white;
}

/* OWNER */
.owner{
position:absolute;
bottom:0;
height:5px;
width:100%;
}

/* PEÃO */
.pawn{
position:absolute;
font-size:18px;
transition:.3s;
animation:float 2s infinite;
}
@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

/* PLAYERS */
.players{
display:flex;
flex-wrap:wrap;
gap:5px;
justify-content:center;
}
.player{
background:var(--glass);
padding:6px;
border-radius:10px;
font-size:10px;
text-align:center;
}
.player.active{
border:2px solid var(--gold);
box-shadow:0 0 10px gold;
}

/* BUTTON */
button{
margin:5px;
padding:10px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#00f2fe,#4facfe);
color:white;
font-weight:bold;
}

/* DICE */
#dice{
font-size:28px;
margin-top:10px;
}

/* MODAL */
#modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:15px;
border-radius:15px;
display:none;
z-index:10;
}
</style>
</head>

<body>

<div id="setup">
<h3>Jogadores</h3>
<div id="setup-list"></div>
<button onclick="startGame()">Iniciar</button>
</div>

<div class="players" id="players"></div>
<div class="board" id="board"></div>

<div id="dice">🎲</div>
<button onclick="rollDice()">Jogar</button>
<button onclick="bank()">Banco</button>

<div id="modal"></div>

<script>
const icons=["🦆","🚗","🐱","🚀","🍕","👻","🎩","⚽","🍦","💎"];

const PROPERTY={
1:{price:60,rent:[2,10,30,90,160,250]},
3:{price:60,rent:[4,20,60,180,320,450]},
6:{price:100,rent:[6,30,90,270,400,550]},
8:{price:100,rent:[6,30,90,270,400,550]}
};

let players=[];
let turn=0;

/* INIT */
for(let i=0;i<10;i++){
players.push({
id:i,name:"P"+(i+1),icon:icons[i],
money:1500,pos:0,props:[],debt:0,
houses:{},inJail:false,jail:0
});
document.getElementById("setup-list").innerHTML+=`
<input value="P${i+1}" onchange="players[${i}].name=this.value"><br>
`;
}

/* START */
function startGame(){
setup.style.display="none";

for(let i=0;i<40;i++){
const t=document.createElement("div");
t.className="tile";
t.id="t"+i;

if(i===10)t.innerText="PRISÃO";
else if(i===30)t.innerText="VÁ PRESO";
else t.innerText=i;

const o=document.createElement("div");
o.className="owner";
o.id="o"+i;
t.appendChild(o);

t.onclick=()=>build(i);

board.appendChild(t);
}

players.forEach(p=>{
const pawn=document.createElement("div");
pawn.className="pawn";
pawn.id="p"+p.id;
pawn.innerText=p.icon;
document.body.appendChild(pawn);
});

render();
update();
}

/* RENDER */
function render(){
players.innerHTML="";
players.forEach(p=>{
players.innerHTML+=`
<div class="player ${turn===p.id?"active":""}">
${p.icon}<br>${p.name}<br>💰${p.money}
</div>`;
});
}

/* DICE */
async function rollDice(){
let p=players[turn];

if(p.inJail){
p.jail++;
if(p.jail>=3){
p.inJail=false;
show("Saiu da prisão");
}else{
show("Preso!");
next();
return;
}
}

let d1=Math.ceil(Math.random()*6);
let d2=Math.ceil(Math.random()*6);

dice.innerText=d1+"+"+d2;

await move(d1+d2);

if(d1===d2){
show("🎲 Duplo!");
}else next();
}

/* MOVE */
async function move(s){
let p=players[turn];

for(let i=0;i<s;i++){
p.pos=(p.pos+1)%40;
update();
await new Promise(r=>setTimeout(r,120));
}

if(p.pos===30){
p.pos=10;
p.inJail=true;
show("🚔 Preso!");
}
else tileAction(p);
}

/* TILE */
function tileAction(p){
let t=p.pos;

if(PROPERTY[t]){
let owner=players.find(x=>x.props.includes(t));

if(!owner){
if(confirm("Comprar por "+PROPERTY[t].price)){
p.money-=PROPERTY[t].price;
p.props.push(t);
setOwner(t,p.id);
}
}else if(owner.id!==p.id){
let lvl=p.houses[t]||0;
let rent=PROPERTY[t].rent[lvl];
p.money-=rent;
owner.money+=rent;
show("💸 "+rent);
}
}
}

/* BUILD */
function build(pos){
let p=players[turn];
if(p.props.includes(pos)){
p.houses[pos]=(p.houses[pos]||0)+1;
show("🏠 Construído");
}
}

/* OWNER */
function setOwner(i,id){
document.getElementById("o"+i).style.background=
["#2ecc71","#e91e63","#3498db","#f1c40f","#9b59b6","#e67e22","#1abc9c","#ecf0f1","#34495e","#ff7675"][id];
}

/* BANK */
function bank(){
let p=players[turn];
p.money+=500;
p.debt+=600;
show("🏦 +500");
update();
}

/* UPDATE */
function update(){
players.forEach(p=>{
let tile=document.getElementById("t"+p.pos);
let pawn=document.getElementById("p"+p.id);
pawn.style.top=(tile.offsetTop+p.id*2)+"px";
pawn.style.left=(tile.offsetLeft+p.id*2)+"px";
});
render();
}

/* TURN */
function next(){
turn=(turn+1)%players.length;
render();
}

/* MODAL */
function show(t){
modal.innerText=t;
modal.style.display="block";
setTimeout(()=>modal.style.display="none",1200);
}
</script>

</body>
</html>
