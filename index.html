<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Brasil Pro - Estável</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --gold: #fbbf24;
            --board-green: #cde6d0; --white: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Tela de Setup */
        #setup-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .setup-card { background: var(--panel); padding: 25px; border-radius: 24px; width: 100%; max-width: 400px; border: 2px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
        .setup-list { max-height: 250px; overflow-y: auto; margin: 15px 0; }
        .player-input { display: flex; gap: 10px; margin-bottom: 10px; background: #334155; padding: 10px; border-radius: 12px; align-items: center; }
        .player-input input { background: transparent; border: none; color: white; border-bottom: 1px solid #64748b; flex: 1; outline: none; }

        /* HUD Superior */
        #hud { display: flex; gap: 8px; padding: 10px; overflow-x: auto; background: #0f172a; border-bottom: 1px solid #334155; height: 80px; }
        .player-chip { min-width: 100px; background: #1e293b; padding: 8px; border-radius: 12px; border: 2px solid transparent; transition: 0.3s; flex-shrink: 0; }
        .player-chip.active { border-color: var(--gold); transform: translateY(2px); background: #334155; }
        .money-text { color: #4ade80; font-weight: 900; font-size: 13px; }

        /* Tabuleiro */
        .game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #board-wrapper { position: relative; width: 98vw; height: 98vw; max-width: 500px; max-height: 500px; background: #000; padding: 2px; border-radius: 4px; }
        #board { display: grid; width: 100%; height: 100%; grid-template-columns: 1.3fr repeat(9, 1fr) 1.3fr; grid-template-rows: 1.3fr repeat(9, 1fr) 1.3fr; gap: 1px; }

        .tile { background: #f8fafc; position: relative; display: flex; flex-direction: column; color: #000; font-size: 6px; overflow: hidden; }
        .t-color { height: 20%; width: 100%; border-bottom: 1px solid #000; }
        .t-info { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-weight: 700; padding: 1px; }
        .t-price { font-size: 5px; font-weight: 900; margin-bottom: 1px; text-align: center; }

        /* Container de Peças dentro da casa */
        .pawn-slot { position: absolute; inset: 0; display: flex; flex-wrap: wrap; align-items: flex-end; justify-content: center; pointer-events: none; padding: 2px; gap: 1px; }
        .pawn-mini { font-size: 12px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        /* Controles Inferiores */
        .controls { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 8px; padding: 12px; background: #1e293b; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-roll { background: var(--gold); color: #000; font-size: 16px; }
        .btn-roll:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-util { background: #475569; color: white; font-size: 9px; }

        /* Dados */
        .dice-area { grid-area: 2/2/11/11; background: var(--board-green); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dice-box { display: flex; gap: 10px; margin-bottom: 8px; }
        .die { width: 35px; height: 35px; background: white; color: black; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 3px 0 #cbd5e1; }

        /* Modal */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; backdrop-filter: blur(3px); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; background: white; color: #0f172a; border-radius: 20px; padding: 20px; display: none; z-index: 1001; text-align: center; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-card">
        <h2 style="color:var(--gold)">MONOPOLY BRASIL</h2>
        <p>Quantos jogadores?</p>
        <input type="number" id="p-count" min="2" max="6" value="2" onchange="initSetup()" style="width: 60px; padding: 8px; border-radius: 8px; text-align: center;">
        <div id="setup-list" class="setup-list"></div>
        <button class="btn btn-roll" style="width:100%" onclick="startGame()">COMEÇAR JOGO</button>
    </div>
</div>

<div id="hud"></div>

<div class="game-container">
    <div id="board-wrapper">
        <div id="board">
            <div class="dice-area">
                <div class="dice-box">
                    <div id="die1" class="die">⚀</div>
                    <div id="die2" class="die">⚀</div>
                </div>
                <div id="status" style="color:#1e293b; font-weight:800; font-size:12px;">AGUARDANDO...</div>
            </div>
        </div>
    </div>
</div>

<div class="controls">
    <button class="btn btn-util" onclick="alert('Funcionalidade em breve!')">BENS</button>
    <button class="btn btn-roll" id="roll-btn" onclick="handleRoll()">JOGAR DADOS</button>
    <button class="btn btn-util" onclick="location.reload()">REINICIAR</button>
</div>

<div id="overlay"></div>
<div class="modal" id="modal">
    <h3 id="m-title"></h3>
    <div id="m-body"></div>
    <div id="m-footer"></div>
</div>

<script>
    const TILES = [
        {n: "PARTIDA", type: "go"},
        {n: "AV. SUMARÉ", type: "prop", g: "brown", p: 60, r: [2, 10, 30, 90, 160, 250], h: 50},
        {n: "COFRE", type: "chest"},
        {n: "AV. SÃO JOÃO", type: "prop", g: "brown", p: 60, r: [4, 20, 60, 180, 320, 450], h: 50},
        {n: "IMPOSTO", type: "tax", val: 200},
        {n: "EST. MARACANÃ", type: "station", p: 200, icon: "🚆"},
        {n: "RUA 25 MARÇO", type: "prop", g: "lblue", p: 100, r: [6, 30, 90, 270, 400, 550], h: 50},
        {n: "SORTE", type: "luck"},
        {n: "AV. PAULISTA", type: "prop", g: "lblue", p: 100, r: [6, 30, 90, 270, 400, 550], h: 50},
        {n: "AV. V. SOUTO", type: "prop", g: "lblue", p: 120, r: [8, 40, 100, 300, 450, 600], h: 50},
        {n: "PRISÃO", type: "jail"},
        {n: "AV. ATLÂNTICA", type: "prop", g: "pink", p: 140, r: [10, 50, 150, 450, 625, 750], h: 100},
        {n: "CIA ELÉTRICA", type: "util", p: 150, icon: "💡"},
        {n: "AV. NITERÓI", type: "prop", g: "pink", p: 140, r: [10, 50, 150, 450, 625, 750], h: 100},
        {n: "BRIG. F. LIMA", type: "prop", g: "pink", p: 160, r: [12, 60, 180, 500, 700, 900], h: 100},
        {n: "EST. CARIOCA", type: "station", p: 200, icon: "🚆"},
        {n: "L. BERRINI", type: "prop", g: "orange", p: 180, r: [14, 70, 200, 550, 750, 950], h: 100},
        {n: "COFRE", type: "chest"},
        {n: "AV. PRES. JK", type: "prop", g: "orange", p: 180, r: [14, 70, 200, 550, 750, 950], h: 100},
        {n: "AV. 9 JULHO", type: "prop", g: "orange", p: 200, r: [16, 80, 220, 600, 800, 1000], h: 100},
        {n: "PARADA", type: "free"},
        {n: "AV. EUROPA", type: "prop", g: "red", p: 220, r: [18, 90, 250, 700, 875, 1050], h: 150},
        {n: "SORTE", type: "luck"},
        {n: "AV. AUGUSTA", type: "prop", g: "red", p: 220, r: [18, 90, 250, 700, 875, 1050], h: 150},
        {n: "PACAEMBU", type: "prop", g: "red", p: 240, r: [20, 100, 300, 750, 925, 1100], h: 150},
        {n: "EST. CONSOLAÇÃO", type: "station", p: 200, icon: "🚆"},
        {n: "INTERLAGOS", type: "prop", g: "yellow", p: 260, r: [22, 110, 330, 800, 975, 1150], h: 150},
        {n: "MORUMBI", type: "prop", g: "yellow", p: 260, r: [22, 110, 330, 800, 975, 1150], h: 150},
        {n: "CIA ÁGUA", type: "util", p: 150, icon: "🚰"},
        {n: "IBIRAPUERA", type: "prop", g: "yellow", p: 280, r: [24, 120, 360, 850, 1025, 1200], h: 150},
        {n: "VÁ P/ PRISÃO", type: "gojail"},
        {n: "B. TIJUCA", type: "prop", g: "green", p: 300, r: [26, 130, 390, 900, 1100, 1275], h: 200},
        {n: "J. BOTÂNICO", type: "prop", g: "green", p: 300, r: [26, 130, 390, 900, 1100, 1275], h: 200},
        {n: "COFRE", type: "chest"},
        {n: "IPANEMA", type: "prop", g: "green", p: 320, r: [28, 150, 450, 1000, 1200, 1400], h: 200},
        {n: "EST. REPÚBLICA", type: "station", p: 200, icon: "🚆"},
        {n: "SORTE", type: "luck"},
        {n: "LEBLON", type: "prop", g: "blue", p: 350, r: [35, 175, 500, 1100, 1300, 1500], h: 200},
        {n: "RIQUEZA", type: "tax", val: 100},
        {n: "AV. OCEÂNICA", type: "prop", g: "blue", p: 400, r: [50, 200, 600, 1400, 1700, 2000], h: 200}
    ];

    const COLORS = { brown: "#78350f", lblue: "#7dd3fc", pink: "#db2777", orange: "#f97316", red: "#ef4444", yellow: "#facc15", green: "#15803d", blue: "#1e40af" };
    let players = [], turn = 0, doubles = 0;

    function initSetup() {
        const n = document.getElementById('p-count').value;
        const list = document.getElementById('setup-list');
        const icons = ["🎩","🚗","🐕","🚀","🏎️","🚢"];
        list.innerHTML = "";
        for(let i=0; i<Math.min(n, 6); i++) {
            list.innerHTML += `<div class="player-input"><span>${icons[i]}</span><input id="p-name-${i}" value="Jogador ${i+1}"></div>`;
        }
    }

    function startGame() {
        const n = parseInt(document.getElementById('p-count').value);
        const icons = ["🎩","🚗","🐕","🚀","🏎️","🚢"];
        for(let i=0; i<n; i++) {
            players.push({ id: i, name: document.getElementById(`p-name-${i}`).value, icon: icons[i], money: 1500, pos: 0, jail: 0, props: [] });
        }
        document.getElementById('setup-screen').style.display = 'none';
        renderBoard();
        updateUI();
    }

    function renderBoard() {
        const b = document.getElementById('board');
        TILES.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = 'tile'; d.id = `tile-${i}`;
            if(i <= 10) { d.style.gridRow = 11; d.style.gridColumn = 11 - i; }
            else if(i <= 20) { d.style.gridColumn = 1; d.style.gridRow = 21 - i; }
            else if(i <= 30) { d.style.gridRow = 1; d.style.gridColumn = i - 19; }
            else { d.style.gridColumn = 11; d.style.gridRow = i - 29; }

            d.innerHTML = `
                ${t.g ? `<div class="t-color" style="background:${COLORS[t.g]}"></div>` : ''}
                <div class="t-info">${t.n}</div>
                ${t.p ? `<div class="t-price">M$ ${t.p}</div>` : ''}
                <div class="pawn-slot" id="slot-${i}"></div>
            `;
            b.appendChild(d);
        });
        updatePawns();
    }

    async function handleRoll() {
        const p = players[turn];
        document.getElementById('roll-btn').disabled = true;

        const d1 = Math.ceil(Math.random()*6), d2 = Math.ceil(Math.random()*6);
        const diceChars = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
        document.getElementById('die1').innerText = diceChars[d1];
        document.getElementById('die2').innerText = diceChars[d2];

        if(p.jail > 0) {
            if(d1 === d2) { p.jail = 0; movePawn(d1+d2); }
            else { p.jail--; showModal("PRISÃO", "Você não tirou duplos.", [{t: "PAGAR M$ 50", c: "#ef4444", f: () => { p.money -= 50; p.jail=0; movePawn(d1+d2); }}, {t: "ESPERAR", c: "#64748b", f: nextTurn}]); }
            return;
        }

        movePawn(d1 + d2);
    }

    async function movePawn(steps) {
        const p = players[turn];
        for(let i=0; i<steps; i++) {
            p.pos = (p.pos + 1) % 40;
            if(p.pos === 0) p.money += 200;
            updatePawns();
            await new Promise(r => setTimeout(r, 150));
        }
        processTile();
    }

    function processTile() {
        const p = players[turn];
        const t = TILES[p.pos];

        if(t.type === "gojail") {
            p.pos = 10; p.jail = 3; updatePawns();
            showModal("POLÍCIA", "Vá para a prisão!", [{t: "OK", c: "#ef4444", f: nextTurn}]);
        } else if(t.p > 0) {
            if(!t.owner) {
                showModal(t.n, `Comprar por M$ ${t.p}?`, [
                    {t: "COMPRAR", c: "#22c55e", f: () => { p.money -= t.p; t.owner = p; p.props.push(p.pos); nextTurn(); }},
                    {t: "PASSAR", c: "#64748b", f: nextTurn}
                ]);
            } else if(t.owner !== p) {
                let rent = t.r[0];
                p.money -= rent; t.owner.money += rent;
                showModal("ALUGUEL", `Pagou M$ ${rent} para ${t.owner.name}`, [{t: "PAGAR", c: "#ef4444", f: nextTurn}]);
            } else nextTurn();
        } else nextTurn();
        updateUI();
    }

    function updatePawns() {
        document.querySelectorAll('.pawn-slot').forEach(s => s.innerHTML = "");
        players.forEach(p => {
            const slot = document.getElementById(`slot-${p.pos}`);
            if(slot) slot.innerHTML += `<span class="pawn-mini">${p.icon}</span>`;
        });
    }

    function updateUI() {
        const hud = document.getElementById('hud');
        hud.innerHTML = players.map(p => `
            <div class="player-chip ${p.id===turn?'active':''}">
                <div style="font-weight:900">${p.icon} ${p.name}</div>
                <div class="money-text">M$ ${p.money}</div>
            </div>`).join('');
        document.getElementById('status').innerText = `VEZ DE: ${players[turn].name.toUpperCase()}`;
    }

    function nextTurn() {
        closeModal();
        turn = (turn + 1) % players.length;
        document.getElementById('roll-btn').disabled = false;
        updateUI();
    }

    function showModal(t, b, btns) {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-body').innerHTML = b;
        const f = document.getElementById('m-footer'); f.innerHTML = "";
        btns.forEach(btn => {
            const bEl = document.createElement('button');
            bEl.className = 'btn'; bEl.style.width = "100%"; bEl.style.marginTop = "8px";
            bEl.style.background = btn.c; bEl.style.color = "white"; bEl.innerText = btn.t; bEl.onclick = btn.f;
            f.appendChild(bEl);
        });
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('modal').style.display = 'none';
    }

    initSetup();
</script>
</body>
</html>
