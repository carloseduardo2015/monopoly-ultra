<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Elite Royale - Full Deck</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00; --gold-dark: #b8860b;
            --primary: #00d2ff; --accent: #3a7bd5;
            --bg: #0a0a0c; --card: #16161a;
            --glass: rgba(255, 255, 255, 0.08);
            --p0: #2ecc71; --p1: #e91e63; --p2: #3498db; --p3: #f1c40f; 
            --p4: #9b59b6; --p5: #e67e22; --p6: #1abc9c; --p7: #dcdde1;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; background: var(--bg); color: white; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0a0a0c 100%);
        }

        /* --- UI --- */
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 28px; padding: 30px; width: 100%; max-width: 450px; text-align: center; }
        .setup-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; max-height: 40vh; overflow-y: auto; }
        .player-config { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); }
        .name-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #444; color: white; text-align: center; margin-top: 8px; }

        #players-bar { display: flex; gap: 12px; width: 100%; padding: 15px; overflow-x: auto; scrollbar-width: none; background: rgba(0,0,0,0.4); }
        .p-card { min-width: 110px; padding: 12px; background: var(--card); border-radius: 20px; text-align: center; border: 2px solid transparent; transition: 0.3s; }
        .p-card.active { border-color: var(--primary); transform: translateY(-5px); }

        /* --- BOARD --- */
        .board-wrapper { position: relative; width: 95vw; height: 95vw; max-width: 450px; max-height: 450px; margin: 10px 0; }
        #board { display: grid; width: 100%; height: 100%; grid-template-columns: 1.3fr repeat(9, 1fr) 1.3fr; grid-template-rows: 1.3fr repeat(9, 1fr) 1.3fr; background: #d1d1d1; border: 5px solid #1a1a1a; border-radius: 8px; }
        .tile { border: 0.5px solid rgba(0,0,0,0.1); background: #fff; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .tile-color { height: 22%; width: 100%; }
        .tile-name { font-size: 5px; font-weight: 900; text-align: center; color: #333; text-transform: uppercase; padding: 1px; }
        .owner-tag { position: absolute; bottom: 0; width: 100%; height: 4px; }
        
        .build-indicator { position: absolute; top: 1px; width: 100%; display: flex; justify-content: center; gap: 1px; }
        .h-house { width: 4px; height: 4px; background: #2ecc71; border-radius: 50%; }
        .h-hotel { width: 10px; height: 4px; background: #e74c3c; border-radius: 2px; }

        /* --- PAWNS --- */
        .pawn { position: absolute; width: 20px; height: 20px; z-index: 100; transition: all 0.4s ease; font-size: 16px; display: flex; align-items: center; justify-content: center; }

        /* --- BUTTONS --- */
        .controls { display: flex; gap: 15px; margin-bottom: 10px; }
        .btn-roll { width: 70px; height: 70px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; font-weight: 900; cursor: pointer; box-shadow: 0 4px 0 #1a5b99; }
        .btn-action { padding: 10px 15px; border-radius: 12px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; font-size: 12px; }

        /* --- MODAL --- */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 6000; backdrop-filter: blur(5px); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #111; padding: 25px; border-radius: 25px; width: 85%; max-width: 340px; display: none; z-index: 6001; text-align: center; }
        .action-btn { padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; margin-top: 8px; }
        
        .card-draw { padding: 20px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; color: white; }
        .luck-card { background: #f39c12; }
        .chest-card { background: #3498db; }

        #toast { position: fixed; bottom: 80px; background: var(--gold); color: black; padding: 10px 20px; border-radius: 50px; font-weight: 800; transform: translateY(150px); transition: 0.4s; z-index: 7000; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="glass-panel">
        <h1 style="margin:0">MONOPOLY <span style="color:var(--gold)">ELITE</span></h1>
        <div style="margin: 15px 0;">
            Jogadores: <input type="number" id="qty" value="2" min="2" max="8" onchange="renderLobby()" style="width:50px">
        </div>
        <div class="setup-grid" id="lobby-grid"></div>
        <button class="action-btn" style="background:var(--gold); color:black" onclick="startGame()">INICIAR</button>
    </div>
</div>

<div id="players-bar"></div>

<div class="board-wrapper">
    <div id="board">
        <div style="grid-column: 4/9; grid-row: 5/8; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;">
            <div id="dice-box" style="display:flex; gap:10px; background:white; padding:10px; border-radius:15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2)">
                <div id="d1" style="font-size:30px; color:#222">⚀</div>
                <div id="d2" style="font-size:30px; color:#222">⚀</div>
            </div>
        </div>
    </div>
    <div id="pawns-layer"></div>
</div>

<div class="controls">
    <button class="btn-action" onclick="showBuildMenu()">CONSTRUIR</button>
    <button class="btn-roll" id="btn-roll" onclick="playTurn()">ROLL</button>
    <button class="btn-action" onclick="openBank()">BANCO</button>
</div>

<div id="toast">Notificação</div>

<div id="modal-overlay"></div>
<div class="modal" id="modal">
    <h2 id="m-title" style="margin-top:0; font-size: 18px;"></h2>
    <div id="m-body"></div>
    <div id="m-footer"></div>
</div>

<script>
    // --- DATA ---
    const TILES = [
        {n: "INÍCIO", c: null, p: 0}, {n: "Sumaré", c: "#955436", p: 60, b: 50}, {n: "COFRE", c: "chest", p: 0},
        {n: "Praça Sé", c: "#955436", p: 60, b: 50}, {n: "IMPOSTO", c: null, p: 0}, {n: "Maracanã", c: "#333", p: 200},
        {n: "25 Março", c: "#87CEEB", p: 100, b: 50}, {n: "SORTE", c: "luck", p: 0}, {n: "S. João", c: "#87CEEB", p: 100, b: 50},
        {n: "Paulista", c: "#87CEEB", p: 120, b: 50}, {n: "CADEIA", c: null, p: 0}, {n: "V. Souto", c: "#D93A96", p: 140, b: 100},
        {n: "CIA LUZ", c: "#ffce00", p: 150}, {n: "Niterói", c: "#D93A96", p: 140, b: 100}, {n: "Atlântica", c: "#D93A96", p: 160, b: 100},
        {n: "CARIOCA", c: "#333", p: 200}, {n: "Av. JK", c: "#F7941D", p: 180, b: 100}, {n: "COFRE", c: "chest", p: 0},
        {n: "Berrini", c: "#F7941D", p: 180, b: 100}, {n: "F. Lima", c: "#F7941D", p: 200, b: 100}, {n: "PARADA", c: null, p: 0},
        {n: "Ipanema", c: "#ED1C24", p: 220, b: 150}, {n: "SORTE", c: "luck", p: 0}, {n: "Leblon", c: "#ED1C24", p: 220, b: 150},
        {n: "Copacabana", c: "#ED1C24", p: 240, b: 150}, {n: "CONSOLAÇÃO", c: "#333", p: 200}, {n: "C. JARDIM", c: "#FFF200", p: 260, b: 150},
        {n: "PACAEMBU", c: "#FFF200", p: 260, b: 150}, {n: "CIA ÁGUA", c: "#ffce00", p: 150}, {n: "IBIRAPUERA", c: "#FFF200", p: 280, b: 150},
        {n: "VÁ PRESO", c: null, p: 0}, {n: "Barra", c: "#1FB25A", p: 300, b: 200}, {n: "JARDIM", c: "#1FB25A", p: 300, b: 200},
        {n: "COFRE", c: "chest", p: 0}, {n: "Lagoa", c: "#1FB25A", p: 320, b: 200}, {n: "REPUBLICA", c: "#333", p: 200},
        {n: "SORTE", c: "luck", p: 0}, {n: "Morumbi", c: "#006AB3", p: 350, b: 200}, {n: "RIQUEZA", c: null, p: 0}, {n: "O. FREIRE", c: "#006AB3", p: 400, b: 200}
    ];

    const LUCK_CARDS = [
        {t: "Avançar até o Início", f: (p) => { p.pos = 0; p.money += 200; }},
        {t: "Erro do banco a seu favor! Receba $200", f: (p) => { p.money += 200; }},
        {t: "Multa por excesso de velocidade: Pague $150", f: (p) => { p.money -= 150; }},
        {t: "Vá para a Cadeia sem passar pelo início", f: (p) => { p.pos = 10; p.jail = 3; }},
        {t: "Dividendos de ações: Receba $50", f: (p) => { p.money += 50; }},
        {t: "Sua apólice de seguro venceu: Receba $100", f: (p) => { p.money += 100; }},
        {t: "Pague imposto escolar de $150", f: (p) => { p.money -= 150; }},
        {t: "Você foi eleito presidente do conselho: Pague $50 a cada jogador", f: (p) => { players.forEach(pl => { if(pl.id !== p.id){ p.money -= 50; pl.money += 50; }}); }},
        {t: "Avançar para a Av. Paulista", f: (p) => { p.pos = 9; }},
        {t: "Avançar para a Av. Oscar Freire", f: (p) => { p.pos = 39; }},
        {t: "Reparos na rua: Pague $40 por casa e $115 por hotel", f: (p) => { /* Simplificado */ p.money -= 100; }}
    ];

    const CHEST_CARDS = [
        {t: "Venda seu estoque: Receba $50", f: (p) => { p.money += 50; }},
        {t: "Reembolso de Imposto de Renda: Receba $20", f: (p) => { p.money += 20; }},
        {t: "Pague despesas hospitalares de $100", f: (p) => { p.money -= 100; }},
        {t: "Pague multa de $50", f: (p) => { p.money -= 50; }},
        {t: "É o seu aniversário! Receba $10 de cada jogador", f: (p) => { players.forEach(pl => { if(pl.id !== p.id){ p.money += 10; pl.money -= 10; }}); }},
        {t: "Receba $100 por serviços prestados", f: (p) => { p.money += 100; }},
        {t: "Herança: Você recebeu $100", f: (p) => { p.money += 100; }},
        {t: "Ganhou concurso de beleza: Receba $10", f: (p) => { p.money += 10; }}
    ];

    const ICONS = ["🚗", "🚀", "🎩", "🦖", "🚢", "🐕", "🍕", "💎"];
    let players = [], turn = 0, doubleCount = 0;

    // --- LOGIC ---
    function renderLobby() {
        const grid = document.getElementById('lobby-grid'), qty = document.getElementById('qty').value;
        grid.innerHTML = ""; players = [];
        for(let i=0; i<qty; i++){
            players.push({ id: i, name: `Jogador ${i+1}`, icon: ICONS[i], money: 1500, pos: 0, jail: 0, debt: 0 });
            grid.innerHTML += `<div class="player-config">${ICONS[i]}<br><input class="name-input" id="n-${i}" value="Jogador ${i+1}"></div>`;
        }
    }

    function startGame() {
        players.forEach((p, i) => p.name = document.getElementById(`n-${i}`).value);
        document.getElementById('setup-screen').style.display = 'none';
        buildBoard();
        createPawns();
        updateUI();
    }

    function buildBoard() {
        const board = document.getElementById('board');
        TILES.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'tile'; div.id = `t-${i}`;
            if(i<=10) { div.style.gridRow=11; div.style.gridColumn=11-i; }
            else if(i<=20) { div.style.gridColumn=1; div.style.gridRow=21-i; }
            else if(i<=30) { div.style.gridRow=1; div.style.gridColumn=i-19; }
            else { div.style.gridColumn=11; div.style.gridRow=i-29; }
            
            div.innerHTML = `
                ${t.c && t.c.startsWith('#') ? `<div class="tile-color" style="background:${t.c}"></div>` : ''}
                <div class="build-indicator" id="build-${i}"></div>
                <div class="tile-name">${t.n}</div>
                <div class="owner-tag" id="owner-${i}"></div>
            `;
            board.appendChild(div);
        });
    }

    function createPawns() {
        players.forEach(p => {
            const el = document.createElement('div'); el.className = 'pawn'; el.id = `pawn-${p.id}`; el.innerText = p.icon;
            document.getElementById('pawns-layer').appendChild(el);
        });
        updatePawns();
    }

    async function playTurn() {
        const p = players[turn];
        if(p.jail > 0) { 
            showModal("CADEIA", "Pagar $50 para sair?", [{t: "PAGAR", c:"#e67e22", f:()=>{p.money-=50; p.jail=0; nextTurn();}}, {t:"ESPERAR", c:"#999", f:()=>{p.jail--; nextTurn();}}]);
            return;
        }

        document.getElementById('btn-roll').disabled = true;
        const r1 = Math.ceil(Math.random()*6), r2 = Math.ceil(Math.random()*6);
        
        // Simular animação dados
        const diceBox = document.getElementById('dice-box');
        diceBox.style.transform = "scale(1.2)";
        setTimeout(() => {
            document.getElementById('d1').innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][r1-1];
            document.getElementById('d2').innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][r2-1];
            diceBox.style.transform = "scale(1)";
            
            if(r1===r2) doubleCount++; else doubleCount = 0;
            if(doubleCount === 3) { p.pos = 10; p.jail = 3; notify("3 DUPLOS: VÁ PRESO!"); nextTurn(); }
            else movePawn(r1+r2);
        }, 500);
    }

    async function movePawn(steps) {
        const p = players[turn];
        for(let i=0; i<steps; i++){
            p.pos = (p.pos + 1) % 40;
            if(p.pos === 0) p.money += 200;
            updatePawns();
            await new Promise(r => setTimeout(r, 200));
        }
        handleLand();
    }

    function handleLand() {
        const p = players[turn];
        const t = TILES[p.pos];

        if(t.c === "luck") drawCard(LUCK_CARDS, "luck");
        else if(t.c === "chest") drawCard(CHEST_CARDS, "chest");
        else if(t.p > 0) {
            if(!t.owner) {
                showModal(t.n, `Comprar por $${t.p}?`, [{t:"COMPRAR", c:"#2ecc71", f:()=>buyProp(p, t)}, {t:"PASSAR", c:"#999", f:nextTurn}]);
            } else if(t.owner !== p) {
                const rent = Math.floor(t.p * 0.15) * ((t.level || 0) + 1);
                p.money -= rent; t.owner.money += rent;
                notify(`PAGOU $${rent} DE ALUGUEL`); nextTurn();
            } else nextTurn();
        } else {
            if(p.pos === 30) { p.pos = 10; p.jail = 3; }
            nextTurn();
        }
    }

    function drawCard(deck, type) {
        const p = players[turn];
        const card = deck[Math.floor(Math.random()*deck.length)];
        const cls = type === "luck" ? "luck-card" : "chest-card";
        const title = type === "luck" ? "SORTE" : "COFRE";
        
        showModal(title, `<div class="card-draw ${cls}">${card.t}</div>`, [{t: "OK", c: "#333", f: () => { card.f(p); updateUI(); updatePawns(); nextTurn(); }}]);
    }

    function buyProp(p, t) {
        if(p.money >= t.p) {
            p.money -= t.p; t.owner = p; t.level = 0;
            document.getElementById(`owner-${p.pos}`).style.background = `var(--p${p.id})`;
            updateUI(); nextTurn();
        } else { alert("Sem saldo!"); }
    }

    function showBuildMenu() {
        const p = players[turn];
        const myProps = TILES.filter(t => t.owner === p && t.b);
        if(!myProps.length) return alert("Você não tem terrenos!");
        
        let html = myProps.map(t => `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #eee; padding:5px">
                <span>${t.n} (${t.level || 0}🏡)</span>
                <button onclick="build(${TILES.indexOf(t)})" style="background:#2ecc71; color:white; border:none; border-radius:5px; padding:5px">+$${t.b}</button>
            </div>
        `).join('');
        showModal("CONSTRUIR", html, [{t: "FECHAR", c: "#333", f: closeModal}]);
    }

    window.build = function(idx) {
        const t = TILES[idx], p = players[turn];
        if(p.money >= t.b && (t.level || 0) < 5) {
            p.money -= t.b;
            t.level = (t.level || 0) + 1;
            const container = document.getElementById(`build-${idx}`);
            if(t.level < 5) container.innerHTML += `<div class="h-house"></div>`;
            else container.innerHTML = `<div class="h-hotel"></div>`;
            updateUI(); showBuildMenu();
        } else if(t.level >= 5) alert("Máximo de construção atingido!");
        else alert("Saldo insuficiente!");
    }

    function openBank() {
        const p = players[turn];
        showModal("BANCO", `Saldo: $${p.money}<br>Dívida: $${p.debt}`, [
            {t: "EMPRÉSTIMO $500", c: "#2ecc71", f: () => { p.money += 500; p.debt += 650; updateUI(); closeModal(); }},
            {t: "QUITAR DÍVIDA", c: "#e67e22", f: () => { if(p.money>=p.debt){p.money-=p.debt; p.debt=0; updateUI(); closeModal();} else alert("Saldo insuficiente!"); }},
            {t: "FECHAR", c: "#333", f: closeModal}
        ]);
    }

    // --- SYSTEM UI ---
    function updateUI() {
        const bar = document.getElementById('players-bar');
        bar.innerHTML = players.map(p => `
            <div class="p-card ${turn === p.id ? 'active' : ''}">
                <div style="font-size:22px">${p.icon}</div>
                <div style="font-size:11px; font-weight:bold">${p.name}</div>
                <div style="color:var(--p0); font-weight:900">$${p.money}</div>
            </div>
        `).join('');
    }

    function updatePawns() {
        players.forEach(p => {
            const t = document.getElementById(`t-${p.pos}`);
            const el = document.getElementById(`pawn-${p.id}`);
            el.style.top = (t.offsetTop + 10 + (p.id*2)) + "px";
            el.style.left = (t.offsetLeft + 10 + (p.id*2)) + "px";
        });
    }

    function notify(msg) {
        const t = document.getElementById('toast'); t.innerText = msg;
        t.style.transform = "translateY(0)";
        setTimeout(() => t.style.transform = "translateY(150px)", 3000);
    }

    function showModal(t, b, btns) {
        document.getElementById('m-title').innerHTML = t;
        document.getElementById('m-body').innerHTML = b;
        const f = document.getElementById('m-footer'); f.innerHTML = "";
        btns.forEach(btn => {
            const el = document.createElement('button'); el.className = "action-btn"; el.innerText = btn.t; el.style.background = btn.c; el.style.color = "white"; el.onclick = btn.f; f.appendChild(el);
        });
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; document.getElementById('modal').style.display = 'none'; }
    function nextTurn() { closeModal(); if(doubleCount === 0) turn = (turn + 1) % players.length; document.getElementById('btn-roll').disabled = false; updateUI(); }

    renderLobby();
</script>
</body>
</html>
