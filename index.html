<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Pro Mobile</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --primary: #00ffa3; --secondary: #00d1ff; --danger: #ff4d4d; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* TABULEIRO MOBILE */
        .board-container { width: 100vw; height: 100vw; max-width: 500px; max-height: 500px; padding: 5px; }
        #board {
            display: grid; width: 100%; height: 100%; background: #cedbd3; border: 4px solid #1e293b;
            grid-template-columns: 1.5fr repeat(9, 1fr) 1.5fr;
            grid-template-rows: 1.5fr repeat(9, 1fr) 1.5fr;
        }

        .tile { border: 0.1px solid rgba(0,0,0,0.2); position: relative; display: flex; flex-direction: column; font-size: 6px; color: #000; text-align: center; font-weight: bold; overflow: hidden; }
        .tile .bar { width: 100%; height: 20%; }
        .tile .content { flex: 1; display: flex; flex-direction: column; justify-content: space-around; padding: 1px; text-transform: uppercase; }
        
        /* CORES DAS PROPRIEDADES */
        .bar.pink { background: #d93a96; } .bar.blue-light { background: #87ceeb; } .bar.brown { background: #955436; }
        .bar.orange { background: #f7941d; } .bar.red { background: #ed1c24; } .bar.yellow { background: #fff200; }
        .bar.green { background: #1fb25a; } .bar.blue-dark { background: #006ab3; }

        .board-center { grid-column: 2/11; grid-row: 2/11; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* UI ELEMENTS */
        .controls { width: 100%; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .player-hub { display: flex; overflow-x: auto; gap: 10px; padding: 5px; width: 100%; }
        .p-card { min-width: 140px; background: var(--panel); padding: 10px; border-radius: 10px; border-left: 4px solid #555; transition: 0.3s; }
        .p-card.active { border-left-color: var(--primary); transform: scale(1.05); }
        
        .btn { border: none; border-radius: 8px; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-roll { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #000; flex: 1; }
        .btn-loan { background: #3b82f6; color: white; }
        
        .pawn { position: absolute; font-size: 14px; z-index: 100; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }
        .house { font-size: 8px; color: #1fb25a; } .hotel { font-size: 8px; color: #ed1c24; }

        /* MODAIS */
        #modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 20px; border-radius: 15px; z-index: 1000; width: 85%; display: none; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; display: none; }
    </style>
</head>
<body>

<div id="overlay"></div>
<div id="modal">
    <h2 id="m-title">Título</h2>
    <p id="m-text">Texto descritivo aqui.</p>
    <div id="m-footer" style="margin-top: 15px;"></div>
</div>

<div class="board-container">
    <div id="board">
        <div class="board-center">
            <h1 style="color:#000; font-size: 1.5rem; transform: rotate(-45deg); opacity: 0.2;">MONOPOLY</h1>
            <div id="dice-val" style="color:#000; font-size: 2rem; font-weight: 900;">🎲</div>
        </div>
    </div>
</div>

<div class="player-hub" id="h-players"></div>

<div class="controls">
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-roll" onclick="playTurn()">Lançar Dados</button>
        <button class="btn btn-loan" onclick="getLoan()">Empréstimo</button>
    </div>
    <div id="log" style="font-size: 10px; background: #000; padding: 8px; height: 60px; overflow-y: auto; border-radius: 5px;">
        Benvindo! Toque em Iniciar para começar.
    </div>
</div>

<script>
// CONFIGURAÇÃO DOS IMÓVEIS (Seguindo a foto do tabuleiro)
const TILES = [
    {n:"Partida", t:"especial"}, {n:"Sumaré", c:"brown", p:60, r:2, h:0}, {n:"Cofre", t:"cofre"}, {n:"Praça da Sé", c:"brown", p:60, r:4, h:0},
    {n:"Imposto", t:"taxa", v:200}, {n:"M. Maracanã", t:"estação", p:200}, {n:"R. 25 Março", c:"blue-light", p:100, r:6, h:0}, {n:"Sorte", t:"sorte"},
    {n:"São João", c:"blue-light", p:100, r:6, h:0}, {n:"Av. Paulista", c:"blue-light", p:120, r:8, h:0}, {n:"Visitante", t:"especial"},
    {n:"Vieira Souto", c:"pink", p:140, r:10, h:0}, {n:"Cia Elétrica", t:"util", p:150}, {n:"Niterói", c:"pink", p:140, r:10, h:0},
    {n:"Atlântica", c:"pink", p:160, r:12, h:0}, {n:"M. Carioca", t:"estação", p:200}, {n:"Av. JK", c:"orange", p:180, r:14, h:0},
    {n:"Cofre", t:"cofre"}, {n:"Berrini", c:"orange", p:180, r:14, h:0}, {n:"Faria Lima", c:"orange", p:200, r:16, h:0},
    {n:"Estaciona", t:"especial"}, {n:"Ipanema", c:"red", p:220, r:18, h:0}, {n:"Sorte", t:"sorte"}, {n:"Leblon", c:"red", p:220, r:18, h:0},
    {n:"Copacabana", c:"red", p:240, r:20, h:0}, {n:"M. Consolação", t:"estação", p:200}, {n:"Cid. Jardim", c:"yellow", p:260, r:22, h:0},
    {n:"Pacaembu", c:"yellow", p:260, r:22, h:0}, {n:"Cia Água", t:"util", p:150}, {n:"Ibirapuera", c:"yellow", p:280, r:24, h:0},
    {n:"Vá p/ Prisão", t:"ir-prisao"}, {n:"Barra", c:"green", p:300, r:26, h:0}, {n:"J. Botânico", c:"green", p:300, r:26, h:0},
    {n:"Cofre", t:"cofre"}, {n:"Lagoa", c:"green", p:320, r:28, h:0}, {n:"M. República", t:"estação", p:200}, {n:"Sorte", t:"sorte"},
    {n:"Morumbi", c:"blue-dark", p:350, r:35, h:0}, {n:"Riqueza", t:"taxa", v:100}, {n:"Oscar Freire", c:"blue-dark", p:400, r:50, h:0}
];

const CARDS_SORTE = ["Receba dividendos de R$50", "Multa por excesso de velocidade: R$15", "Vá para a Partida", "Vá para a Prisão sem passar pela Partida", "Conserto em suas propriedades: R$25 por casa"];
const CARDS_COFRE = ["Erro do banco a seu favor: Receba R$200", "Despesas médicas: Pague R$50", "Venda de ações: Receba R$50", "Receba R$100 por herança", "Pague imposto escolar de R$150"];

let players = [
    {id: 0, name: "K", money: 1500, pos: 0, icon: "🦆", props: [], prison: 0, history: ["Iniciou o jogo"]},
    {id: 1, name: "J", money: 1500, pos: 0, icon: "🏎️", props: [], prison: 0, history: ["Iniciou o jogo"]}
];
let turn = 0;

function createBoard() {
    const b = document.getElementById('board');
    TILES.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'tile';
        div.id = `tile-${i}`;
        
        // Posicionamento GRID (Anti-horário)
        if(i <= 10) { div.style.gridRow = "11"; div.style.gridColumn = 11 - i; }
        else if(i <= 20) { div.style.gridColumn = "1"; div.style.gridRow = 21 - i; }
        else if(i <= 30) { div.style.gridRow = "1"; div.style.gridColumn = i - 19; }
        else { div.style.gridColumn = "11"; div.style.gridRow = i - 29; }

        div.onclick = () => showTileInfo(i);
        div.innerHTML = `
            ${t.c ? `<div class="bar ${t.c}"></div>` : ''}
            <div class="content">${t.n} ${t.p ? `<br>$${t.p}` : ''}<div id="build-${i}"></div></div>
            <div id="pawns-${i}" style="position:absolute; bottom:2px; width:100%; display:flex; justify-content:center;"></div>
        `;
        b.appendChild(div);
    });
}

function updateUI() {
    const container = document.getElementById('h-players');
    container.innerHTML = players.map((p, i) => `
        <div class="p-card ${turn === i ? 'active' : ''}">
            <div style="font-size:20px">${p.icon} ${p.name}</div>
            <div style="color:var(--primary); font-weight:bold">$ ${p.money}</div>
            <div style="font-size:9px; color:#aaa; margin-top:5px">${p.history.slice(-1)}</div>
        </div>
    `).join('');

    players.forEach(p => {
        const zone = document.getElementById(`pawns-${p.pos}`);
        const pawn = document.createElement('span');
        pawn.className = 'pawn';
        pawn.innerText = p.icon;
        zone.appendChild(pawn);
    });
}

async function playTurn() {
    let p = players[turn];
    if(p.prison > 0) {
        p.prison--;
        log(`${p.name} está na prisão (${p.prison} turnos restantes)`);
        nextTurn();
        return;
    }

    const d1 = Math.floor(Math.random() * 6) + 1;
    const d2 = Math.floor(Math.random() * 6) + 1;
    document.getElementById('dice-val').innerText = `${d1+d2}`;
    
    // Animação de movimento
    for(let i=0; i < (d1+d2); i++) {
        p.pos = (p.pos + 1) % 40;
        if(p.pos === 0) { p.money += 200; log(`${p.name} passou pela partida (+200)`); }
        updateUI();
        await new Promise(r => setTimeout(r, 150));
    }
    
    handleLand(p.pos);
}

function handleLand(pos) {
    const tile = TILES[pos];
    const p = players[turn];
    
    if(tile.t === "sorte") drawCard(CARDS_SORTE);
    else if(tile.t === "cofre") drawCard(CARDS_COFRE);
    else if(tile.t === "ir-prisao") { p.pos = 10; p.prison = 3; showModal("PRISÃO", "Você foi preso!"); }
    else if(tile.p && !tile.owner) {
        showModal(tile.n, `Deseja comprar por $${tile.p}?`, `
            <button class="btn btn-roll" onclick="buyProp(${pos})">Comprar</button>
            <button class="btn btn-loan" onclick="closeModal()">Recusar</button>
        `);
    } else if(tile.owner && tile.owner !== p.id) {
        const rent = tile.r + (tile.h * 50);
        p.money -= rent;
        players[tile.owner].money += rent;
        log(`${p.name} pagou $${rent} de aluguel para ${players[tile.owner].name}`);
    }
    nextTurn();
}

function buyProp(pos) {
    const p = players[turn];
    const t = TILES[pos];
    if(p.money >= t.p) {
        p.money -= t.p;
        t.owner = p.id;
        p.props.push(pos);
        document.getElementById(`tile-${pos}`).style.boxShadow = `inset 0 0 10px ${p.id === 0 ? '#00ffa3' : '#00d1ff'}`;
        log(`${p.name} comprou ${t.n}`);
        closeModal();
        updateUI();
    }
}

function drawCard(deck) {
    const card = deck[Math.floor(Math.random() * deck.length)];
    showModal("CARTA", card, `<button class="btn btn-roll" onclick="closeModal()">OK</button>`);
}

function showModal(title, text, footer = '') {
    document.getElementById('m-title').innerText = title;
    document.getElementById('m-text').innerText = text;
    document.getElementById('m-footer').innerHTML = footer || `<button class="btn btn-roll" onclick="closeModal()">OK</button>`;
    document.getElementById('modal').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
}

function getLoan() {
    const p = players[turn];
    p.money += 500;
    p.history.push("Tomou empréstimo de $500");
    log(`${p.name} pegou $500 com o banco.`);
    updateUI();
}

function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML = `<div>> ${msg}</div>` + l.innerHTML;
}

function nextTurn() {
    turn = (turn + 1) % players.length;
    updateUI();
}

createBoard();
updateUI();
</script>
</body>
</html>
