<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Elite Pro - Final Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700; --primary: #00d2ff; --accent: #3a7bd5;
            --bg: #050505; --glass: rgba(255, 255, 255, 0.1);
            --p0: #2ecc71; --p1: #e91e63; --p2: #3498db; --p3: #f1c40f; 
            --p4: #9b59b6; --p5: #e67e22; --p6: #1abc9c; --p7: #ecf0f1;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

        /* LOBBY */
        #setup-screen { position: fixed; inset: 0; background: radial-gradient(circle at top, #1a1a2e, #050505); z-index: 2000; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .setup-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 24px; backdrop-filter: blur(15px); width: 100%; max-width: 400px; text-align: center; }
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; width: 100%; max-width: 800px; margin-top: 20px; overflow-y: auto; }
        .config-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .name-input { width: 100%; background: #111; border: 1px solid #444; color: white; padding: 8px; border-radius: 8px; font-size: 12px; margin-bottom: 5px; outline: none; }

        /* PLAYERS BAR */
        #players-bar { display: flex; gap: 10px; width: 100%; padding: 12px; overflow-x: auto; scrollbar-width: none; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .p-badge { min-width: 100px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 18px; text-align: center; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .p-badge.active { border-color: var(--primary); background: rgba(0, 210, 255, 0.1); transform: scale(1.05); }

        /* BOARD */
        .board-container { position: relative; width: 92vw; height: 92vw; max-width: 420px; max-height: 420px; margin-top: 10px; }
        #board { display: grid; width: 100%; height: 100%; grid-template-columns: 1.3fr repeat(9, 1fr) 1.3fr; grid-template-rows: 1.3fr repeat(9, 1fr) 1.3fr; background: #eee; border: 4px solid #222; border-radius: 10px; }
        
        .tile { border: 0.1px solid rgba(0,0,0,0.1); position: relative; display: flex; flex-direction: column; background: #fff; justify-content: space-between; transition: 0.3s; }
        .tile-header { height: 25%; width: 100%; }
        .tile-name { flex: 1; font-size: 5px; text-transform: uppercase; font-weight: 900; display: flex; align-items: center; justify-content: center; text-align: center; color: #222; padding: 2px; }
        .owner-bar { height: 5px; width: 100%; transition: 0.3s; }

        .build-slots { position: absolute; top: 1px; left: 0; width: 100%; display: flex; justify-content: center; gap: 1px; }
        .house { width: 4px; height: 4px; background: #2ecc71; border-radius: 50%; }
        .hotel { width: 10px; height: 4px; background: #e74c3c; border-radius: 2px; }

        .pawn { position: absolute; font-size: 20px; z-index: 100; transition: all 0.4s ease; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }

        /* UI CONTROLS */
        .action-zone { display: flex; align-items: center; gap: 15px; margin-top: 15px; }
        .btn-main { width: 70px; height: 70px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #1a5b99; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 1px 0 #1a5b99; }
        .btn-secondary { padding: 10px 15px; border-radius: 15px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 11px; font-weight: 700; cursor: pointer; }

        /* ANIMATIONS */
        @keyframes buy-flash { 0% { background: white; } 50% { background: var(--gold); } 100% { background: white; } }
        .flash-buy { animation: buy-flash 0.6s ease-out; }
        .shake { animation: shake 0.3s infinite; }
        @keyframes shake { 0% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } 100% { transform: rotate(-3deg); } }

        /* MODAL */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 3000; backdrop-filter: blur(10px); }
        .modal-ui { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #111; padding: 25px; border-radius: 25px; width: 85%; max-width: 320px; display: none; z-index: 3001; text-align: center; }
        .modal-btn { padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; color: white; width: 100%; margin-top: 8px; }
        
        /* LOG STYLES */
        .log-container { max-height: 180px; overflow-y: auto; background: #f4f4f4; padding: 10px; border-radius: 12px; font-size: 11px; text-align: left; margin: 10px 0; border: 1px solid #ddd; }
        .gain { color: #2ecc71; font-weight: bold; }
        .loss { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-card">
        <h1 style="color:var(--gold); margin:0; font-size: 22px;">MONOPOLY ELITE</h1>
        <p style="font-size: 12px;">Selecione o número de jogadores:</p>
        <input type="number" id="qty" value="2" min="2" max="8" onchange="renderLobby()" style="background:#000; color:#fff; border:1px solid #444; padding:5px; border-radius:5px; width:60px; text-align:center">
    </div>
    <div class="setup-grid" id="lobby-grid"></div>
    <button class="modal-btn" style="background:var(--gold); color:#000; width:200px; margin-top:20px" onclick="initGame()">INICIAR PARTIDA</button>
</div>

<div id="players-bar"></div>

<div class="board-container">
    <div id="board">
        <div style="grid-column: 4/9; grid-row: 5/8; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;">
            <div id="dice-container" style="display:flex; gap:10px; background:#fff; padding:12px; border-radius:15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2)">
                <div class="die" id="die1" style="font-size:30px; color:#222">⚀</div>
                <div class="die" id="die2" style="font-size:30px; color:#222">⚀</div>
            </div>
            <p id="game-status" style="font-size:10px; margin-top:10px; color:#222; font-weight:900; text-transform: uppercase;"></p>
        </div>
    </div>
    <div id="pawns-layer"></div>
</div>

<div class="action-zone">
    <button class="btn-secondary" onclick="manageProperties()">CASAS</button>
    <button class="btn-main" id="roll-btn" onclick="handlePlay()">GO!</button>
    <button class="btn-secondary" onclick="openBank()">BANCO</button>
</div>

<div id="modal-overlay"></div>
<div class="modal-ui" id="modal">
    <h3 id="m-title" style="margin:0; font-size:18px;"></h3>
    <div id="m-body" style="font-size:14px; margin:15px 0; color:#444;"></div>
    <div id="m-footer" style="display:flex; flex-direction:column; gap:5px"></div>
</div>

<script>
    // --- AUDIO SYSTEM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if(type === 'dice') { osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); }
        else if(type === 'buy') { osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); }
        else if(type === 'rent') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); }
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // --- GAME DATA ---
    const TILES = [
        {n: "PARTIDA", c: null, p: 0}, {n: "Sumaré", c: "#955436", p: 60, h: 50}, {n: "Cofre", c: null, p: 0},
        {n: "Praça da Sé", c: "#955436", p: 60, h: 50}, {n: "Imposto", c: null, p: 0}, {n: "Maracanã", c: "#333", p: 200},
        {n: "25 de Março", c: "#87CEEB", p: 100, h: 50}, {n: "Sorte", c: null, p: 0}, {n: "São João", c: "#87CEEB", p: 100, h: 50},
        {n: "Paulista", c: "#87CEEB", p: 120, h: 50}, {n: "Prisão", c: null, p: 0}, {n: "Vieira Souto", c: "#D93A96", p: 140, h: 100},
        {n: "Cia Luz", c: "#ffce00", p: 150}, {n: "Niterói", c: "#D93A96", p: 140, h: 100}, {n: "Atlântica", c: "#D93A96", p: 160, h: 100},
        {n: "Carioca", c: "#333", p: 200}, {n: "Av. JK", c: "#F7941D", p: 180, h: 100}, {n: "Cofre", c: null, p: 0},
        {n: "Berrini", c: "#F7941D", p: 180, h: 100}, {n: "Faria Lima", c: "#F7941D", p: 200, h: 100}, {n: "Parada", c: null, p: 0},
        {n: "Ipanema", c: "#ED1C24", p: 220, h: 150}, {n: "Sorte", c: null, p: 0}, {n: "Leblon", c: "#ED1C24", p: 220, h: 150},
        {n: "Copacabana", c: "#ED1C24", p: 240, h: 150}, {n: "Consolação", c: "#333", p: 200}, {n: "Cid. Jardim", c: "#FFF200", p: 260, h: 150},
        {n: "Pacaembu", c: "#FFF200", p: 260, h: 150}, {n: "Cia Água", c: "#ffce00", p: 150}, {n: "Ibirapuera", c: "#FFF200", p: 280, h: 150},
        {n: "Vá Preso", c: null, p: 0}, {n: "Barra", c: "#1FB25A", p: 300, h: 200}, {n: "J. Botânico", c: "#1FB25A", p: 300, h: 200},
        {n: "Cofre", c: null, p: 0}, {n: "Lagoa", c: "#1FB25A", p: 320, h: 200}, {n: "República", c: "#333", p: 200},
        {n: "Sorte", c: null, p: 0}, {n: "Morumbi", c: "#006AB3", p: 350, h: 200}, {n: "Riqueza", c: null, p: 0}, {n: "Oscar Freire", c: "#006AB3", p: 400, h: 200}
    ];

    const ICONS = ["🚗", "🚀", "🎩", "🦖", "🚢", "🐕", "🍕", "💎"];
    let players = [], turn = 0, doubleCount = 0;

    function renderLobby() {
        const grid = document.getElementById('lobby-grid'), qty = document.getElementById('qty').value;
        grid.innerHTML = ""; players = [];
        for(let i=0; i<qty; i++) {
            players.push({ id: i, name: `Jogador ${i+1}`, icon: ICONS[i], money: 1500, pos: 0, jail: 0, debt: 0, log: ["Partida iniciada"] });
            grid.innerHTML += `<div class="config-item">
                <input class="name-input" id="n-${i}" value="Jogador ${i+1}">
                <div style="font-size:24px">${players[i].icon}</div>
            </div>`;
        }
    }

    function initGame() {
        players.forEach((p, i) => p.name = document.getElementById(`n-${i}`).value);
        document.getElementById('setup-screen').style.display = 'none';
        const b = document.getElementById('board');
        TILES.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'tile'; div.id = `t-${i}`;
            if(i <= 10) { div.style.gridRow = 11; div.style.gridColumn = 11 - i; }
            else if(i <= 20) { div.style.gridColumn = 1; div.style.gridRow = 21 - i; }
            else if(i <= 30) { div.style.gridRow = 1; div.style.gridColumn = i - 19; }
            else { div.style.gridColumn = 11; div.style.gridRow = i - 29; }
            div.innerHTML = `${t.c ? `<div class="tile-header" style="background:${t.c}"><div class="build-slots" id="build-${i}"></div></div>`:''}
                             <div class="tile-name">${t.n}</div><div class="owner-bar" id="owner-${i}"></div>`;
            b.appendChild(div);
        });
        players.forEach(p => {
            const pawn = document.createElement('div'); pawn.className = 'pawn';
            pawn.id = `pawn-${p.id}`; pawn.innerText = p.icon;
            document.getElementById('pawns-layer').appendChild(pawn);
        });
        updateUI();
    }

    function log(p, msg, type) { p.log.unshift(`<span class="${type}">${msg}</span>`); }

    function showHistory(id) {
        const p = players[id];
        let content = p.log.map(l => `<div>• ${l}</div>`).join('');
        showModal(`HISTÓRICO: ${p.name}`, `<div class="log-container">${content}</div>`, [{t: "FECHAR", c: "#333", f: closeModal}]);
    }

    async function handlePlay() {
        const p = players[turn];
        if(p.jail > 0) {
            showModal("PRESO", "Pagar $50 para sair?", [
                {t: "PAGAR", c: "#e67e22", f: () => { p.money -= 50; p.jail = 0; log(p, "Pagou fiança", "loss"); next(); }},
                {t: "ESPERAR", c: "#999", f: () => { p.jail--; next(); }}
            ]); return;
        }
        document.getElementById('roll-btn').disabled = true;
        const d1 = Math.ceil(Math.random() * 6), d2 = Math.ceil(Math.random() * 6);
        document.getElementById('dice-container').classList.add('shake');
        
        let i = 0; const sInt = setInterval(() => { playSound('dice'); if(i++ > 5) clearInterval(sInt); }, 100);

        setTimeout(async () => {
            document.getElementById('die1').innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][d1-1];
            document.getElementById('die2').innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][d2-1];
            document.getElementById('dice-container').classList.remove('shake');
            if(d1===d2) { doubleCount++; document.getElementById('game-status').innerText = "DUPLO! JOGA DE NOVO"; }
            else { doubleCount = 0; document.getElementById('game-status').innerText = ""; }
            if(doubleCount === 3) { p.pos = 10; p.jail = 3; showModal("CADEIA", "3 duplos seguidos!", [{t: "OK", c: "#333", f: next}]); }
            else { await movePawn(d1 + d2); }
        }, 600);
    }

    async function movePawn(s) {
        const p = players[turn];
        for(let i=0; i<s; i++) {
            p.pos = (p.pos + 1) % 40;
            if(p.pos === 0) { p.money += 200; log(p, "Ganhou $200 (Início)", "gain"); }
            updatePawns(); await new Promise(r => setTimeout(r, 200));
        }
        processTile();
    }

    function processTile() {
        const p = players[turn], t = TILES[p.pos];
        if(t.p > 0) {
            if(!t.owner) {
                showModal(t.n, `Comprar por $${t.p}?`, [
                    {t: "COMPRAR", c: "#2ecc71", f: () => {
                        if(p.money >= t.p) {
                            p.money -= t.p; t.owner = p; t.level = 0;
                            document.getElementById(`t-${p.pos}`).classList.add('flash-buy');
                            document.getElementById(`owner-${p.pos}`).style.background = `var(--p${p.id})`;
                            playSound('buy'); log(p, `Comprou ${t.n}`, "loss"); next();
                        } else alert("Sem saldo!");
                    }},
                    {t: "PASSAR", c: "#999", f: next}
                ]);
            } else if(t.owner !== p) {
                let r = Math.floor(t.p * 0.1) * (t.level + 1);
                p.money -= r; t.owner.money += r;
                playSound('rent'); log(p, `Pagou $${r} aluguel`, "loss");
                showModal("ALUGUEL", `Pagou $${r} para ${t.owner.name}`, [{t: "OK", c: "#e91e63", f: next}]);
            } else next();
        } else {
            if(p.pos === 30) { p.pos = 10; p.jail = 3; next(); } else next();
        }
    }

    function openBank() {
        const p = players[turn];
        showModal("BANCO ELITE", `Saldo: $${p.money} | Dívida: $${p.debt}`, [
            {t: "EMPRÉSTIMO $500", c: "#2ecc71", f: () => { p.money += 500; p.debt += 600; log(p, "Pegou $500 emprestado", "gain"); updateUI(); closeModal(); }},
            {t: "QUITAR DÍVIDA", c: "#e67e22", f: () => {
                if(p.money >= p.debt) { p.money -= p.debt; p.debt = 0; updateUI(); closeModal(); } else alert("Saldo insuficiente!");
            }},
            {t: "FECHAR", c: "#333", f: closeModal}
        ]);
    }

    function manageProperties() {
        const p = players[turn]; const props = TILES.filter(t => t.owner === p && t.h);
        if(!props.length) return alert("Sem propriedades!");
        let h = props.map(t => `
            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee">
                <span>${t.n}</span>
                <button onclick="build(${TILES.indexOf(t)})" style="background:#2ecc71; color:white; border:none; padding:5px; border-radius:5px">+$${t.h}</button>
            </div>`).join('');
        showModal("CONSTRUIR", h, [{t: "FECHAR", c: "#333", f: closeModal}]);
    }

    window.build = function(idx) {
        const t = TILES[idx], p = players[turn];
        if(p.money >= t.h && t.level < 5) {
            p.money -= t.h; t.level++;
            const c = document.getElementById(`build-${idx}`);
            if(t.level < 5) c.innerHTML += `<div class="house"></div>`;
            else c.innerHTML = `<div class="hotel"></div>`;
            updateUI(); manageProperties();
        }
    }

    function updateUI() {
        const bar = document.getElementById('players-bar');
        bar.innerHTML = players.map(p => `
            <div class="p-badge ${turn===p.id?'active':''}" onclick="showHistory(${p.id})">
                <div style="font-size:20px">${p.icon}</div>
                <div style="font-size:10px"><b>${p.name}</b></div>
                <div style="color:#2ecc71; font-weight:900">$${p.money}</div>
                ${p.debt > 0 ? `<div style="color:red; font-size:8px">Débito: $${p.debt}</div>` : ''}
            </div>`).join('');
        updatePawns();
    }

    function updatePawns() {
        players.forEach(p => {
            const t = document.getElementById(`t-${p.pos}`), pawn = document.getElementById(`pawn-${p.id}`);
            pawn.style.top = (t.offsetTop + 5 + (p.id*2)) + "px";
            pawn.style.left = (t.offsetLeft + 5 + (p.id*2)) + "px";
        });
    }

    function showModal(t, b, btns) {
        document.getElementById('m-title').innerText = t; document.getElementById('m-body').innerHTML = b;
        const f = document.getElementById('m-footer'); f.innerHTML = "";
        btns.forEach(btn => {
            const el = document.createElement('button'); el.className = "modal-btn"; el.innerText = btn.t; el.style.background = btn.c; el.onclick = btn.f; f.appendChild(el);
        });
        document.getElementById('modal-overlay').style.display = 'block'; document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; document.getElementById('modal').style.display = 'none'; }
    function next() { closeModal(); if(doubleCount === 0) turn = (turn + 1) % players.length; document.getElementById('roll-btn').disabled = false; updateUI(); }

    renderLobby();
</script>
</body>
</html>
