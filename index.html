<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monopoly Ultra Mobile</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
:root{
--gold:#FFD700;
--bg:#0f0f0f;
--glass:rgba(255,255,255,0.08);
}

*{box-sizing:border-box;font-family:Montserrat}

body{
margin:0;
background:radial-gradient(circle,#1a1a2e,#0f0f0f);
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* SETUP */
#setup{
padding:15px;
text-align:center;
}
select,input{
padding:8px;
border-radius:8px;
border:none;
margin:5px;
}

/* PLAYERS */
.players{
display:flex;
flex-wrap:wrap;
gap:6px;
justify-content:center;
}
.player{
background:var(--glass);
padding:6px;
border-radius:10px;
font-size:11px;
text-align:center;
}
.player.active{
border:2px solid var(--gold);
box-shadow:0 0 10px gold;
}

/* BOARD 3D */
.board{
width:95vw;
height:95vw;
max-width:420px;
max-height:420px;
display:grid;
grid-template-columns:repeat(10,1fr);
grid-template-rows:repeat(10,1fr);
background:#cde6d0;
border-radius:15px;
overflow:hidden;
transform:perspective(800px) rotateX(8deg);
box-shadow:0 30px 50px rgba(0,0,0,.6);
}

.tile{
border:1px solid rgba(0,0,0,.1);
font-size:6px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
background:linear-gradient(145deg,#dff5e1,#b9d6bb);
}

.owner{
position:absolute;
bottom:0;
height:4px;
width:100%;
}

/* PAWN */
.pawn{
position:absolute;
font-size:16px;
transition:.3s;
filter:drop-shadow(0 2px 3px black);
}

/* BUTTON */
button{
margin:5px;
padding:10px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#00f2fe,#4facfe);
color:white;
font-weight:bold;
}

/* MODAL */
#modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:15px;
border-radius:15px;
display:none;
z-index:10;
}
</style>
</head>

<body>

<div id="setup">
<h2>Configurar Jogo</h2>

<select id="qtd" onchange="criarInputs()">
<option value="2">2 Jogadores</option>
<option value="3">3 Jogadores</option>
<option value="4">4 Jogadores</option>
<option value="5">5 Jogadores</option>
<option value="6">6 Jogadores</option>
<option value="7">7 Jogadores</option>
<option value="8">8 Jogadores</option>
<option value="9">9 Jogadores</option>
<option value="10">10 Jogadores</option>
</select>

<div id="inputs"></div>

<button onclick="startGame()">Iniciar</button>
</div>

<div class="players" id="players"></div>
<div class="board" id="board"></div>

<div id="dice">🎲</div>
<button onclick="rollDice()">Jogar</button>
<button onclick="bank()">Banco</button>

<div id="modal"></div>

<script>
const icons=["🦆","🚗","🐱","🚀","🍕","👻","🎩","⚽","🍦","💎"];

let players=[];
let turn=0;

/* CRIAR INPUTS */
function criarInputs(){
inputs.innerHTML="";
let qtd=parseInt(qtdSelect.value||qtd.value);
for(let i=0;i<qtd;i++){
inputs.innerHTML+=`
<div>
<input placeholder="Nome jogador ${i+1}" id="nome${i}">
<select id="icon${i}">
${icons.map(i=>`<option>${i}</option>`).join("")}
</select>
</div>`;
}
}
criarInputs();

/* START */
function startGame(){
let qtd=parseInt(document.getElementById("qtd").value);

players=[];
for(let i=0;i<qtd;i++){
players.push({
id:i,
name:document.getElementById("nome"+i).value||("P"+(i+1)),
icon:document.getElementById("icon"+i).value,
money:1500,
pos:0,
inJail:false,
jail:0
});
}

setup.style.display="none";

/* CRIA TABULEIRO */
for(let i=0;i<100;i++){
const t=document.createElement("div");
t.className="tile";
t.id="t"+i;
board.appendChild(t);
}

/* PEÕES */
players.forEach(p=>{
const pawn=document.createElement("div");
pawn.className="pawn";
pawn.id="p"+p.id;
pawn.innerText=p.icon;
document.body.appendChild(pawn);
});

render();
update();
}

/* RENDER */
function render(){
playersDiv.innerHTML="";
players.forEach(p=>{
playersDiv.innerHTML+=`
<div class="player ${turn===p.id?"active":""}">
${p.icon}<br>${p.name}<br>💰${p.money}
</div>`;
});
}

/* DADO */
async function rollDice(){
let p=players[turn];

if(p.inJail){
p.jail++;
if(p.jail>=3){
p.inJail=false;
show("Saiu da prisão");
}else{
show("Preso!");
next();
return;
}
}

let d1=Math.ceil(Math.random()*6);
let d2=Math.ceil(Math.random()*6);

dice.innerText=d1+"+"+d2;

await move(d1+d2);

if(d1===d2){
show("Duplo! joga de novo");
}else next();
}

/* MOVE */
async function move(s){
let p=players[turn];

for(let i=0;i<s;i++){
p.pos=(p.pos+1)%100;
update();
await new Promise(r=>setTimeout(r,120));
}

if(p.pos===30){
p.pos=10;
p.inJail=true;
show("Foi preso!");
}
}

/* BANCO */
function bank(){
let p=players[turn];
p.money+=500;
p.debt=(p.debt||0)+600;
show("Pegou empréstimo +500");
render();
}

/* UPDATE */
function update(){
players.forEach(p=>{
let tile=document.getElementById("t"+p.pos);
let pawn=document.getElementById("p"+p.id);
pawn.style.top=(tile.offsetTop+p.id*2)+"px";
pawn.style.left=(tile.offsetLeft+p.id*2)+"px";
});
render();
}

/* TURN */
function next(){
turn=(turn+1)%players.length;
render();
}

/* MODAL */
function show(t){
modal.innerText=t;
modal.style.display="block";
setTimeout(()=>modal.style.display="none",1200);
}
</script>

</body>
</html>
