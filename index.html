<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Brasil - Ultimate Custom Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00eb84; --bg: #0b0e14; --card: #1c222d; --text: #ffffff; 
            --board-bg: #cee6d5; --edge: #222; --gold: #f1c40f; --danger: #ff4757;
        }
        
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }

        /* --- ANIMAÇÕES --- */
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes shake { 0% { transform: rotate(0); } 50% { transform: rotate(15deg); } 100% { transform: rotate(-15deg); } }

        /* --- SETUP CUSTOMIZÁVEL --- */
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .setup-container { width: 100%; max-width: 600px; background: var(--card); padding: 30px; border-radius: 28px; text-align: center; border: 1px solid #333; }
        .player-config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 400px; overflow-y: auto; margin: 20px 0; padding: 10px; }
        .player-config-card { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #444; }
        .player-config-card input { background: #000; border: 1px solid #555; color: white; padding: 8px; border-radius: 8px; font-size: 12px; }
        .player-config-card select { background: #222; color: white; border: none; padding: 5px; border-radius: 5px; cursor: pointer; }

        /* --- TABULEIRO --- */
        #board-container {
            position: relative; width: 620px; height: 620px; background: var(--board-bg);
            border: 8px solid var(--edge); display: grid;
            grid-template-columns: 1.5fr repeat(9, 1fr) 1.5fr;
            grid-template-rows: 1.5fr repeat(9, 1fr) 1.5fr;
        }
        .tile { border: 0.5px solid rgba(0,0,0,0.1); font-size: 8px; font-weight: 800; color: #000; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; padding: 2px; }
        .bar { width: 100%; height: 14px; border-bottom: 1px solid #000; }
        
        .pawn-grid { position: absolute; bottom: 2px; width: 100%; height: 60%; display: grid; grid-template-columns: repeat(4, 1fr); justify-items: center; align-items: center; }
        .pawn { font-size: 16px; transition: 0.2s; }
        .pawn.moving { animation: jump 0.2s ease; }

        .board-center { grid-column: 2 / 11; grid-row: 2 / 11; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* --- UI JOGO --- */
        .game-layout { display: none; gap: 20px; width: 100%; max-width: 1300px; justify-content: center; }
        .players-sidebar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 480px; }
        .p-card { background: var(--card); padding: 12px; border-radius: 18px; border: 4px solid transparent; transition: 0.3s; }
        .p-card.active { border-color: var(--primary); transform: scale(1.02); }
        .p-history { margin-top: 8px; background: rgba(0,0,0,0.4); height: 70px; overflow-y: auto; font-size: 10px; color: #94a3b8; padding: 5px; border-radius: 8px; }

        .btn { border: none; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--gold); color: #000; padding: 15px 40px; box-shadow: 0 5px 0 #b7950b; }
        .btn-action { background: var(--primary); color: #000; padding: 10px 20px; margin-top: 10px; }
        .btn-loan { background: #4a5568; color: #fff; font-size: 9px; padding: 5px; margin-top: 5px; width: 100%; }

        #overlay-card { position: absolute; width: 220px; background: white; color: black; padding: 15px; border-radius: 15px; border: 4px solid var(--gold); display: none; z-index: 100; text-align: center; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-container">
            <h1 style="color:var(--primary)">MONOPOLY BR</h1>
            <p>Escolha a quantidade de jogadores (2-8):</p>
            <input type="number" id="qty" value="2" min="2" max="8" onchange="gerarConfig()" style="padding:10px; border-radius:10px; width:70px; margin:10px;">
            <div id="config-area" class="player-config-grid"></div>
            <button onclick="iniciarJogo()" class="btn btn-main" style="width:100%">COMEÇAR PARTIDA</button>
        </div>
    </div>

    <div class="game-layout" id="game-ui">
        <div id="board-container">
            <div class="board-center">
                <div id="overlay-card"></div>
                <div id="dice-view" style="font-size:40px; margin-bottom:10px">🎲</div>
                <button id="roll-btn" class="btn btn-main" onclick="rolarDados()">ROLAR DADOS</button>
                <button id="buy-btn" class="btn btn-action" style="display:none" onclick="comprarProp()"></button>
                <p id="turn-msg" style="color:#000; font-weight:900; margin-top:15px"></p>
            </div>
        </div>
        <div class="players-sidebar" id="sidebar"></div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const AVATARES_LISTA = ["🏎️", "🎩", "🐕", "🦖", "🚢", "🐈", "🦆", "🛵", "🚁", "🍕", "💎", "👻"];
        const CORES = ["#ff4757", "#1e90ff", "#2ed573", "#ffa502", "#a29bfe", "#fd79a8", "#fab1a0", "#00cec9"];

        function playSfx(type) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            if(type === 'dice') { o.type = 'square'; o.frequency.setValueAtTime(150, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05); o.start(); o.stop(audioCtx.currentTime+0.05); }
            if(type === 'move') { o.frequency.setValueAtTime(400, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1); o.start(); o.stop(audioCtx.currentTime+0.1); }
            if(type === 'coin') { o.frequency.setValueAtTime(880, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2); o.start(); o.stop(audioCtx.currentTime+0.2); }
        }

        const TABULEIRO = [
            {n:"INÍCIO"}, {n:"SUMARÉ", c:"#955436", p:60}, {n:"COFRE"}, {n:"SÉ", c:"#955436", p:60}, {n:"IMPOSTO"}, {n:"MARACANÃ", p:200}, {n:"25 MARÇO", c:"#aae0fa", p:100}, {n:"SORTE"}, {n:"SÃO JOÃO", c:"#aae0fa", p:100}, {n:"PAULISTA", c:"#aae0fa", p:120},
            {n:"PRISÃO"}, {n:"V. SOUTO", c:"#d93a96", p:140}, {n:"LUZ", p:150}, {n:"NITERÓI", c:"#d93a96", p:140}, {n:"ATLÂNTICA", c:"#d93a96", p:160}, {n:"CARIOCA", p:200}, {n:"J.K.", c:"#f7941d", p:180}, {n:"COFRE"}, {n:"BERRINI", c:"#f7941d", p:180}, {n:"F. LIMA", c:"#f7941d", p:200},
            {n:"LIVRE"}, {n:"IPANEMA", c:"#ed1c24", p:220}, {n:"SORTE"}, {n:"LEBLON", c:"#ed1c24", p:220}, {n:"COPACABANA", c:"#ed1c24", p:240}, {n:"CONSOLAÇÃO", p:200}, {n:"C. JARDIM", c:"#fef200", p:260}, {n:"PACAEMBU", c:"#fef200", p:260}, {n:"ÁGUA", p:150}, {n:"IBIRAPUERA", c:"#fef200", p:280},
            {n:"VÁ PRISÃO"}, {n:"BARRA", c:"#19a05e", p:300}, {n:"BOTÂNICO", c:"#19a05e", p:300}, {n:"COFRE"}, {n:"LAGOA", c:"#19a05e", p:320}, {n:"REPÚBLICA", p:200}, {n:"SORTE"}, {n:"MORUMBI", c:"#0068a7", p:350}, {n:"LUXO"}, {n:"O. FREIRE", c:"#0068a7", p:400}
        ];

        let jogo = { jogadores: [], turno: 0, props: {} };

        function gerarConfig() {
            const n = document.getElementById('qty').value;
            let html = "";
            for(let i=0; i<n; i++) {
                html += `
                <div class="player-config-card">
                    <input type="text" id="name-${i}" value="Jogador ${i+1}">
                    <select id="avatar-${i}">
                        ${AVATARES_LISTA.map(a => `<option value="${a}" ${AVATARES_LISTA.indexOf(a) === i ? 'selected' : ''}>${a}</option>`).join('')}
                    </select>
                </div>`;
            }
            document.getElementById('config-area').innerHTML = html;
        }
        gerarConfig();

        function iniciarJogo() {
            const n = document.getElementById('qty').value;
            for(let i=0; i<n; i++) {
                jogo.jogadores.push({
                    id: i, nome: document.getElementById(`name-${i}`).value,
                    avatar: document.getElementById(`avatar-${i}`).value,
                    saldo: 1500, pos: 0, log: ["Começou"], cor: CORES[i], divida: 0
                });
            }
            document.getElementById('setup-screen').style.display = "none";
            document.getElementById('game-ui').style.display = "flex";
            audioCtx.resume();
            desenharBoard();
            render();
        }

        function desenharBoard() {
            const container = document.getElementById('board-container');
            TABULEIRO.forEach((casa, i) => {
                const el = document.createElement('div'); el.className = 'tile'; el.id = `tile-${i}`;
                let html = `<div id="build-${i}" style="position:absolute; top:12px"></div>`;
                if(casa.c) html += `<div class="bar" style="background:${casa.c}"></div>`;
                html += `<span>${casa.n}</span>${casa.p ? `<b>$${casa.p}</b>` : ''}<div class="pawn-grid" id="pg-${i}"></div>`;
                el.innerHTML = html; container.appendChild(el);
            });
        }

        async function rolarDados() {
            const btn = document.getElementById('roll-btn');
            btn.disabled = true;
            document.getElementById('overlay-card').style.display = "none";
            
            for(let i=0; i<6; i++) { playSfx('dice'); await new Promise(r => setTimeout(r, 100)); }
            
            const total = Math.floor(Math.random()*11)+2;
            document.getElementById('dice-view').innerText = "🎲 " + total;
            
            let j = jogo.jogadores[jogo.turno];
            addLog(j.id, `🎲 Tirou ${total}`);

            for(let s=0; s<total; s++) {
                j.pos = (j.pos + 1) % 40;
                playSfx('move');
                if(j.pos === 0) { j.saldo += 200; playSfx('coin'); addLog(j.id, "💰 +$200 Banco"); }
                render(true); await new Promise(r => setTimeout(r, 200));
            }

            const casa = TABULEIRO[j.pos];
            const prop = jogo.props[j.pos];

            if(casa.n === "SORTE" || casa.n === "COFRE") {
                const sorte = Math.random() > 0.5 ? 150 : -100;
                j.saldo += sorte;
                document.getElementById('overlay-card').innerHTML = `<h3>${casa.n}</h3><p>${sorte > 0 ? 'Recebeu' : 'Pagou'} $${Math.abs(sorte)}</p>`;
                document.getElementById('overlay-card').style.display = "block";
                addLog(j.id, `🃏 ${casa.n}: $${sorte}`);
            } else if(prop && prop.dono !== j.id) {
                let aluguel = Math.floor(casa.p * 0.2) + (prop.nivel * 40);
                j.saldo -= aluguel; jogo.jogadores[prop.dono].saldo += aluguel;
                addLog(j.id, `💸 Pagou $${aluguel} de aluguel`);
            }

            if(casa.p && (!prop || prop.dono === j.id)) {
                const b = document.getElementById('buy-btn');
                b.style.display = "block";
                b.innerText = prop ? "🔨 CONSTRUIR ($100)" : `🏠 COMPRAR ($${casa.p})`;
            }

            btn.innerText = "PASSAR VEZ";
            btn.onclick = () => {
                jogo.turno = (jogo.turno + 1) % jogo.jogadores.length;
                btn.innerText = "ROLAR DADOS"; btn.onclick = rolarDados;
                document.getElementById('buy-btn').style.display = "none";
                render();
            };
            render();
        }

        function comprarProp() {
            let j = jogo.jogadores[jogo.turno];
            let casa = TABULEIRO[j.pos];
            if(!jogo.props[j.pos]) {
                j.saldo -= casa.p; jogo.props[j.pos] = { dono: j.id, nivel: 0 };
            } else {
                j.saldo -= 100; jogo.props[j.pos].nivel++;
            }
            playSfx('coin'); document.getElementById('buy-btn').style.display = "none"; render();
        }

        function pedirLoan(idx) {
            jogo.jogadores[idx].saldo += 500; jogo.jogadores[idx].divida += 600;
            addLog(idx, "🏦 Empréstimo: +$500"); render();
        }

        function addLog(id, m) {
            jogo.jogadores[id].log.unshift(m);
            if(jogo.jogadores[id].log.length > 5) jogo.jogadores[id].log.pop();
        }

        function render(moving = false) {
            document.querySelectorAll('.pawn-grid').forEach(g => g.innerHTML = "");
            jogo.jogadores.forEach((j, i) => {
                const p = document.createElement('div');
                p.className = `pawn ${moving && i === jogo.turno ? 'moving' : ''}`;
                p.innerHTML = j.avatar; document.getElementById(`pg-${j.pos}`).appendChild(p);
            });

            Object.keys(jogo.props).forEach(idx => {
                const pr = jogo.props[idx];
                document.getElementById(`tile-${idx}`).style.boxShadow = `inset 0 0 0 3px ${jogo.jogadores[pr.dono].cor}`;
                document.getElementById(`build-${idx}`).innerText = pr.nivel > 0 ? "🏠".repeat(pr.nivel) : "";
            });

            document.getElementById('sidebar').innerHTML = jogo.jogadores.map((j, i) => `
                <div class="p-card ${jogo.turno === i ? 'active' : ''}">
                    <b>${j.avatar} ${j.nome}</b><br>
                    <span style="color:var(--primary); font-size:18px">$${j.saldo}</span>
                    ${j.divida > 0 ? `<div style="color:var(--gold); font-size:10px">Dívida: $${j.divida}</div>` : ''}
                    <div class="p-history">${j.log.map(l => `<div>• ${l}</div>`).join('')}</div>
                    <button class="btn btn-loan" onclick="pedirLoan(${i})">EMPRÉSTIMO $500</button>
                </div>
            `).join('');
            document.getElementById('turn-msg').innerText = "Vez de: " + jogo.jogadores[jogo.turno].nome;
        }
    </script>
</body>
</html>
