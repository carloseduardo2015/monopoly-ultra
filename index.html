<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Brasil Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14; --card: rgba(255,255,255,0.05);
            --primary: #00ffa3; --secondary: #00d1ff;
            --board-size: 95vmin; /* Ajuste crucial para caber no celular */
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }

        /* CANVAS PARA DINHEIRO VOANDO */
        #money-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }

        /* SETUP SCREEN */
        #setup { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .setup-card { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); }
        .p-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input, select { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 10px; flex: 1; }

        /* GAME LAYOUT */
        .game-area { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        
        /* TABULEIRO RESPONSIVO */
        .board-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 5px; }
        #board {
            display: grid; width: var(--board-size); height: var(--board-size);
            background: #f0f4f2; border: 4px solid #111; border-radius: 5px;
            grid-template-columns: 1.5fr repeat(9, 1fr) 1.5fr;
            grid-template-rows: 1.5fr repeat(9, 1fr) 1.5fr;
        }

        .tile { border: 0.1px solid rgba(0,0,0,0.2); position: relative; color: #111; display: flex; flex-direction: column; cursor: pointer; overflow: hidden; }
        .tile .name { font-size: 1.1vmin; font-weight: 800; text-align: center; padding: 1px; line-height: 1; flex: 1; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .tile .bar { width: 100%; height: 20%; border-bottom: 1px solid rgba(0,0,0,0.1); }
        
        /* PEÕES */
        .pawn-container { position: absolute; inset: 0; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; pointer-events: none; }
        .pawn { font-size: 2.5vmin; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }

        /* CENTRO DO TABULEIRO */
        .center { grid-column: 2/11; grid-row: 2/11; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #dice-box { font-size: 8vmin; margin-bottom: 10px; }
        .btn-roll { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; padding: 12px 30px; border-radius: 50px; font-weight: 800; color: #000; font-size: 14px; box-shadow: 0 5px 15px rgba(0,255,163,0.3); }

        /* HUD INFERIOR */
        .hud { width: 100%; height: 140px; background: #111; display: flex; gap: 10px; padding: 10px; overflow-x: auto; border-top: 2px solid #222; }
        .p-card { min-width: 110px; background: var(--card); border-radius: 15px; padding: 10px; text-align: center; border: 2px solid transparent; flex-shrink: 0; }
        .p-card.active { border-color: var(--primary); background: rgba(0,255,163,0.1); }
        .p-card .money { color: var(--primary); font-weight: 800; font-size: 16px; }

        /* MODAIS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: white; color: #111; width: 100%; max-width: 300px; border-radius: 20px; padding: 20px; text-align: center; }
        .btn-action { width: 100%; padding: 10px; margin-top: 8px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; }

        .house-icon { font-size: 1.2vmin; position: absolute; bottom: 2px; right: 2px; }
    </style>
</head>
<body>

<canvas id="money-canvas"></canvas>

<div id="setup">
    <div class="setup-card">
        <h2 style="text-align:center; margin-bottom:15px">MONOPOLY BR</h2>
        <div id="p-inputs"></div>
        <button class="btn-action" style="background:#444; color:white" onclick="addPlayer()">+ JOGADOR</button>
        <button class="btn-action" style="background:var(--primary)" onclick="startGame()">COMEÇAR</button>
    </div>
</div>

<div class="game-area" id="game-ui">
    <div class="board-wrapper">
        <div id="board">
            <div class="center">
                <div id="dice-box">🎲🎲</div>
                <button id="roll-btn" class="btn-roll" onclick="handleRoll()">LANÇAR</button>
                <div id="turn-msg" style="color:#111; font-size:10px; margin-top:5px; font-weight:800"></div>
            </div>
        </div>
    </div>
    <div class="hud" id="hud"></div>
</div>

<div class="overlay" id="overlay">
    <div class="modal" id="modal">
        <div id="m-body"></div>
        <div id="m-footer"></div>
        <button class="btn-action" style="background:#eee" onclick="closeM()">FECHAR</button>
    </div>
</div>

<script>
const AVATARES = ["🏎️", "🦆", "🎩", "🐕", "🦖", "🛳️", "🚀", "🎸"];
const CORES = ["#ff4757", "#1e90ff", "#2ed573", "#ffa502", "#a29bfe", "#fd79a8", "#54a0ff", "#5f27cd"];

// ORDEM EXATA DA IMAGEM (Sentido Horário)
const TABULEIRO = [
    {n:"PARTIDA", t:"especial"}, {n:"AV. PAULISTA", c:"#aae0fa", p:120, b:50, r:[8,40,100,300,450,600]}, {n:"AV. SÃO JOÃO", c:"#aae0fa", p:100, b:50, r:[6,30,90,270,400,550]},
    {n:"SORTE", t:"carta"}, {n:"RUA 25 MARÇO", c:"#aae0fa", p:100, b:50, r:[6,30,90,270,400,550]}, {n:"MARACANÃ", p:200, t:"estacao"}, 
    {n:"IMPOSTO", p:200, t:"taxa"}, {n:"PRAÇA DA SÉ", c:"#955436", p:60, b:50, r:[4,20,60,180,320,450]}, {n:"COFRE", t:"carta"},
    {n:"AV. SUMARÉ", c:"#955436", p:60, b:50, r:[2,10,30,90,160,250]}, {n:"VISITANTE", t:"especial"},
    {n:"VIEIRA SOUTO", c:"#d93a96", p:140, b:100, r:[10,50,150,450,625,750]}, {n:"CIA ELÉTRICA", p:150, t:"util"}, 
    {n:"NITERÓI", c:"#d93a96", p:140, b:100, r:[10,50,150,450,625,750]}, {n:"ATLÂNTICA", c:"#d93a96", p:160, b:100, r:[12,60,180,500,700,900]}, 
    {n:"EST. CARIOCA", p:200, t:"estacao"}, {n:"AV. JK", c:"#f7941d", p:180, b:100, r:[14,70,200,550,750,950]}, 
    {n:"COFRE", t:"carta"}, {n:"ENG. BERRINI", c:"#f7941d", p:180, b:100, r:[14,70,200,550,750,950]}, 
    {n:"FARIA LIMA", c:"#f7941d", p:200, b:100, r:[16,80,220,600,800,1000]}, {n:"ESTACIONA", t:"especial"},
    {n:"IPANEMA", c:"#ed1c24", p:220, b:150, r:[18,90,250,700,875,1050]}, {n:"SORTE", t:"carta"}, 
    {n:"LEBLON", c:"#ed1c24", p:220, b:150, r:[18,90,250,700,875,1050]}, {n:"COPACABANA", c:"#ed1c24", p:240, b:150, r:[20,100,300,750,925,1100]}, 
    {n:"ESTAÇÃO", p:200, t:"estacao"}, {n:"CID. JARDIM", c:"#fef200", p:260, b:150, r:[22,110,330,800,975,1150]}, 
    {n:"PACAEMBU", c:"#fef200", p:260, b:150, r:[22,110,330,800,975,1150]}, {n:"CIA ÁGUA", p:150, t:"util"}, 
    {n:"IBIRAPUERA", c:"#fef200", p:280, b:150, r:[24,120,360,850,1025,1200]}, {n:"VÁ P/ PRISÃO", t:"preso"}, 
    {n:"BARRA", c:"#19a05e", p:300, b:200, r:[26,130,390,900,1100,1275]}, {n:"J. BOTÂNICO", c:"#19a05e", p:300, b:200, r:[26,130,390,900,1100,1275]}, 
    {n:"COFRE", t:"carta"}, {n:"LAGOA", c:"#19a05e", p:320, b:200, r:[28,150,450,1000,1200,1400]}, 
    {n:"EST. REPÚBLICA", p:200, t:"estacao"}, {n:"SORTE", t:"carta"}, 
    {n:"AV. MORUMBI", c:"#0068a7", p:350, b:200, r:[35,175,500,1100,1300,1500]}, 
    {n:"RIQUEZA", p:100, t:"taxa"}, {n:"OSCAR FREIRE", c:"#0068a7", p:400, b:200, r:[50,200,600,1400,1700,2000]}
];

let g = { players: [], turn: 0, props: {}, doubles: 0 };

// AUDIO
const audio = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(f, d) {
    const o = audio.createOscillator(); const g = audio.createGain();
    o.frequency.value = f; o.type = 'sine'; g.gain.setValueAtTime(0.1, audio.currentTime);
    o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + d);
}

// MONEY CANVAS
const cvs = document.getElementById('money-canvas');
const ctx = cvs.getContext('2d');
let parts = [];
function resize() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
window.onresize = resize; resize();
function spawn() { for(let i=0;i<20;i++) parts.push({x:Math.random()*cvs.width, y:cvs.height, v:Math.random()*5+2}); }
function update() {
    ctx.clearRect(0,0,cvs.width, cvs.height);
    parts = parts.filter(p => p.y > -10);
    parts.forEach(p => { ctx.fillStyle="#00ffa3"; ctx.fillRect(p.x, p.y, 10, 5); p.y -= p.v; });
    requestAnimationFrame(update);
}
update();

function addPlayer() {
    const container = document.getElementById('p-inputs');
    const i = container.children.length; if(i >= 8) return;
    const div = document.createElement('div'); div.className = 'p-row';
    div.innerHTML = `<input id="n-${i}" placeholder="Jogador ${i+1}"><select id="a-${i}">${AVATARES.map(a=>`<option>${a}</option>`).join('')}</select>`;
    container.appendChild(div);
}
addPlayer(); addPlayer();

function startGame() {
    const rows = document.getElementById('p-inputs').children;
    for(let i=0; i<rows.length; i++) {
        g.players.push({ id:i, name: document.getElementById(`n-${i}`).value || `J${i+1}`, 
        avatar: document.getElementById(`a-${i}`).value, cash:1500, pos:0, color:CORES[i], jailed:false });
    }
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'flex';
    render(); updateHUD();
}

function render() {
    const b = document.getElementById('board');
    TABULEIRO.forEach((tile, i) => {
        const el = document.createElement('div'); el.className = 'tile'; el.id = `t-${i}`;
        el.onclick = () => openProperty(i);
        // Mapping Grid para Ordem Circular
        if(i <= 10) el.style.gridRow = "11"; else if(i <= 20) el.style.gridColumn = "1";
        else if(i <= 30) el.style.gridRow = "1"; else el.style.gridColumn = "11";
        if(i > 0 && i < 10) el.style.gridColumn = 11 - i; 
        if(i > 10 && i < 20) el.style.gridRow = 21 - i;
        if(i > 20 && i < 30) el.style.gridColumn = i - 19;
        if(i > 30) el.style.gridRow = i - 29;

        el.innerHTML = `${tile.c?`<div class="bar" style="background:${tile.c}"></div>`:''}
                        <div class="name">${tile.n}</div>
                        <div class="pawn-container" id="pc-${i}"></div>
                        <div id="build-${i}"></div>`;
        b.appendChild(el);
    });
    updatePawns();
}

async function handleRoll() {
    const btn = document.getElementById('roll-btn'); btn.disabled = true;
    let d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
    let p = g.players[g.turn];
    playBeep(200, 0.1);
    document.getElementById('dice-box').innerHTML = `${["⚀","⚁","⚂","⚃","⚄","⚅"][d1-1]} ${["⚀","⚁","⚂","⚃","⚄","⚅"][d2-1]}`;

    if(p.jailed) {
        if(d1 === d2) { p.jailed = false; } else { nextTurn(); return; }
    }

    for(let i=0; i<(d1+d2); i++) {
        p.pos = (p.pos + 1) % 40;
        if(p.pos === 0) { p.cash += 200; playBeep(800, 0.2); spawn(); }
        updatePawns();
        await new Promise(r => setTimeout(r, 150));
    }

    if(p.pos === 30) { p.pos = 10; p.jailed = true; }
    checkTile(p);
    updateHUD();
    btn.disabled = false; btn.innerText = "PASSAR"; btn.onclick = nextTurn;
}

function checkTile(p) {
    const t = TABULEIRO[p.pos], pr = g.props[p.pos];
    if(t.t === "taxa") p.cash -= t.p;
    else if(pr && pr.owner !== g.turn && !pr.mort) {
        let rent = t.r[pr.lvl];
        p.cash -= rent; g.players[pr.owner].cash += rent;
        playBeep(400, 0.2); spawn();
    } else if(t.p && !pr) openProperty(p.pos);
}

function openProperty(i) {
    const t = TABULEIRO[i], pr = g.props[i], p = g.players[g.turn];
    if(!t.p) return;
    let h = `<h3>${t.n}</h3>`, f = "";
    if(!pr) {
        h += `<p>Preço: $${t.p}</p>`;
        if(p.cash >= t.p) f = `<button class="btn-action" style="background:var(--primary)" onclick="buyProp(${i})">COMPRAR</button>`;
    } else if(pr.owner === g.turn) {
        h += `<p>Nível: ${pr.lvl === 5 ? 'HOTEL' : pr.lvl + ' CASAS'}</p>`;
        if(pr.lvl < 5 && t.b) f += `<button class="btn-action" style="background:var(--secondary)" onclick="build(${i})">CONSTRUIR ($${t.b})</button>`;
    }
    document.getElementById('m-body').innerHTML = h;
    document.getElementById('m-footer').innerHTML = f;
    document.getElementById('overlay').style.display = 'flex';
}

function buyProp(i) { g.players[g.turn].cash -= TABULEIRO[i].p; g.props[i] = {owner:g.turn, lvl:0, mort:false}; closeM(); updateHUD(); updatePawns(); }
function build(i) { g.players[g.turn].cash -= TABULEIRO[i].b; g.props[i].lvl++; closeM(); updateHUD(); updatePawns(); playBeep(600, 0.1); }
function closeM() { document.getElementById('overlay').style.display = 'none'; }
function nextTurn() { g.turn = (g.turn + 1) % g.players.length; document.getElementById('roll-btn').innerText = "LANÇAR"; document.getElementById('roll-btn').onclick = handleRoll; updateHUD(); }

function updateHUD() {
    document.getElementById('hud').innerHTML = g.players.map((p,i) => `
        <div class="p-card ${g.turn===i?'active':''}">
            <div style="font-size:24px">${p.avatar}</div>
            <div style="font-size:10px; font-weight:800">${p.name}</div>
            <div class="money">$${p.cash}</div>
            <button onclick="loan(${i})" style="font-size:8px; background:none; border:1px solid #444; color:white; border-radius:5px; padding:2px; margin-top:5px">EMPRÉSTIMO $500</button>
        </div>`).join('');
    document.getElementById('turn-msg').innerText = `VEZ DE: ${g.players[g.turn].name}`;
}

function loan(id) { g.players[id].cash += 500; spawn(); updateHUD(); }

function updatePawns() {
    document.querySelectorAll('.pawn-container, [id^="build-"]').forEach(c => c.innerHTML = "");
    g.players.forEach(p => {
        const span = document.createElement('div'); span.className = 'pawn'; span.innerHTML = p.avatar;
        document.getElementById(`pc-${p.pos}`).appendChild(span);
    });
    Object.keys(g.props).forEach(i => {
        const pr = g.props[i], t = document.getElementById(`t-${i}`);
        t.style.boxShadow = `inset 0 0 0 3px ${g.players[pr.owner].color}`;
        document.getElementById(`build-${i}`).innerHTML = `<span class="house-icon">${pr.lvl === 5 ? "🏨" : "🏠".repeat(pr.lvl)}</span>`;
    });
}
</script>
</body>
</html>
