<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Brasil Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --gold: #fbbf24;
            --board-bg: #bfdbfe; --white: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Setup Screen */
        #setup-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; padding: 20px; align-items: center; justify-content: center;
        }
        .setup-card { background: var(--panel); padding: 25px; border-radius: 24px; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); }
        .player-row { display: flex; gap: 10px; margin-bottom: 12px; }
        input, select { background: #334155; border: 1px solid #475569; color: white; padding: 12px; border-radius: 10px; flex: 1; }

        /* Game Board */
        .game-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .board-container { position: relative; width: 98vw; height: 98vw; max-width: 550px; max-height: 550px; }
        #board { 
            display: grid; width: 100%; height: 100%; 
            grid-template-columns: 1.4fr repeat(9, 1fr) 1.4fr; 
            grid-template-rows: 1.4fr repeat(9, 1fr) 1.4fr; 
            background: #000; gap: 1px; border: 4px solid #000;
        }

        .tile { background: #fff; position: relative; display: flex; flex-direction: column; color: #000; overflow: hidden; }
        .t-color { height: 22%; width: 100%; border-bottom: 1px solid #000; }
        .t-name { font-size: 6px; font-weight: 900; text-align: center; text-transform: uppercase; flex: 1; display: flex; align-items: center; justify-content: center; padding: 2px; }
        .t-price { font-size: 5px; text-align: center; padding-bottom: 2px; }
        .house-container { position: absolute; top: 2px; right: 2px; display: flex; gap: 1px; }
        .house { width: 4px; height: 4px; background: #2ecc71; border-radius: 1px; }
        .hotel { width: 6px; height: 6px; background: #e74c3c; border-radius: 1px; }

        /* Pawns */
        .pawn { 
            position: absolute; width: 18px; height: 18px; z-index: 100; 
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; justify-content: center; font-size: 14px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        /* UI Controls */
        #status-bar { display: flex; gap: 8px; padding: 10px; overflow-x: auto; background: rgba(0,0,0,0.3); }
        .player-tab { min-width: 110px; padding: 10px; background: var(--panel); border-radius: 14px; border: 2px solid transparent; flex-shrink: 0; }
        .player-tab.active { border-color: var(--gold); transform: scale(1.05); }
        .mny { color: #2ecc71; font-weight: 900; font-size: 14px; }

        .controls { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 10px; padding: 15px; background: var(--panel); }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; }
        .btn-roll { background: var(--gold); color: #000; font-size: 18px; box-shadow: 0 4px 0 #b45309; }
        .btn-sec { background: #475569; color: white; font-size: 11px; }

        /* Modals */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 1000; backdrop-filter: blur(5px); }
        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 85%; max-width: 350px; background: white; color: #000; 
            border-radius: 24px; padding: 25px; display: none; z-index: 1001; text-align: center;
        }
        .btn-modal { width: 100%; padding: 14px; margin-top: 8px; border-radius: 10px; border: none; font-weight: 900; color: white; }

        .dice-box { font-size: 40px; margin: 10px; transition: transform 0.2s; }
        .mortgaged { opacity: 0.5; background: #ddd !important; }
        .mortgaged::after { content: "HIPOTECADO"; position: absolute; font-size: 5px; color: red; bottom: 2px; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-card">
        <h1 style="text-align: center; color: var(--gold); margin-top:0;">MONOPOLY BRASIL</h1>
        <div style="margin-bottom: 15px;">
            <label style="font-size: 12px; opacity: 0.8;">Jogadores (2-6):</label>
            <select id="qt-players" onchange="createSetupFields()" style="width:100%; margin-top:5px;">
                <option value="2">2 Jogadores</option>
                <option value="3">3 Jogadores</option>
                <option value="4">4 Jogadores</option>
                <option value="5">5 Jogadores</option>
                <option value="6">6 Jogadores</option>
            </select>
        </div>
        <div id="player-setup-list"></div>
        <button class="btn btn-roll" style="width:100%;" onclick="initGame()">COMEÇAR JOGO</button>
    </div>
</div>

<div id="status-bar"></div>

<div class="game-area">
    <div class="board-container">
        <div id="board">
            <div style="grid-column: 2/11; grid-row: 2/11; background: var(--board-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;">
                <h2 style="color:#000; margin:0; letter-spacing: 2px;">MONOPOLY</h2>
                <div style="display: flex; gap: 20px;">
                    <div id="d1" class="dice-box">⚀</div>
                    <div id="d2" class="dice-box">⚀</div>
                </div>
                <div id="msg-box" style="color:#334155; font-weight:700; font-size:12px; text-align:center; padding: 0 10px;">Vez do Jogador 1</div>
            </div>
        </div>
        <div id="pawns-layer"></div>
    </div>
</div>

<div class="controls">
    <button class="btn btn-sec" onclick="openPropMenu()">IMÓVEIS / HIPOTECA</button>
    <button class="btn btn-roll" id="roll-btn" onclick="executeRoll()">GIRAR</button>
    <button class="btn btn-sec" onclick="showHistory()">HISTÓRICO</button>
</div>

<div id="overlay"></div>
<div class="modal" id="modal">
    <h3 id="m-title" style="margin-top:0"></h3>
    <div id="m-body" style="margin-bottom:20px; font-size: 14px; max-height: 250px; overflow-y: auto;"></div>
    <div id="m-footer"></div>
</div>

<script>
    // --- DATABASE MODO BRASIL ---
    const TILES = [
        {n: "PARTIDA", type: "special"}, {n: "AV. SUMARÉ", type: "prop", g: "marrom", p: 60, r: [2,10,30,90,160,250], h: 50},
        {n: "COFRE", type: "chest"}, {n: "AV. SÃO JOÃO", type: "prop", g: "marrom", p: 60, r: [4,20,60,180,320,450], h: 50},
        {n: "IMP. RENDA", type: "tax", val: 200}, {n: "EST. MARACANÃ", type: "station", p: 200},
        {n: "RUA 25 MARÇO", type: "prop", g: "azulclaro", p: 100, r: [6,30,90,270,400,550], h: 50}, {n: "SORTE", type: "luck"},
        {n: "AV. PAULISTA", type: "prop", g: "azulclaro", p: 100, r: [6,30,90,270,400,550], h: 50}, {n: "AV. V. SOUTO", type: "prop", g: "azulclaro", p: 120, r: [8,40,100,300,450,600], h: 50},
        {n: "PRISÃO", type: "jail"}, {n: "AV. ATLÂNTICA", type: "prop", g: "rosa", p: 140, r: [10,50,150,450,625,750], h: 100},
        {n: "CIA ELÉTRICA", type: "util", p: 150, icon: "💡"}, {n: "AV. NITEROI", type: "prop", g: "rosa", p: 140, r: [10,50,150,450,625,750], h: 100},
        {n: "AV. JK", type: "prop", g: "rosa", p: 160, r: [12,60,180,500,700,900], h: 100}, {n: "EST. CARIOCA", type: "station", p: 200},
        {n: "AV. BERRINI", type: "prop", g: "laranja", p: 180, r: [14,70,200,550,750,950], h: 100}, {n: "COFRE", type: "chest"},
        {n: "AV. F. LIMA", type: "prop", g: "laranja", p: 180, r: [14,70,200,550,750,950], h: 100}, {n: "AV. 9 JULHO", type: "prop", g: "laranja", p: 200, r: [16,80,220,600,800,1000], h: 100},
        {n: "ESTAC. GRÁTIS", type: "special"}, {n: "AV. EUROPA", type: "prop", g: "vermelho", p: 220, r: [18,90,250,700,875,1050], h: 150},
        {n: "SORTE", type: "luck"}, {n: "AV. AUGUSTA", type: "prop", g: "vermelho", p: 220, r: [18,90,250,700,875,1050], h: 150},
        {n: "AV. PACAEMBU", type: "prop", g: "vermelho", p: 240, r: [20,100,300,750,925,1100], h: 150}, {n: "EST. CONSOLAÇÃO", type: "station", p: 200},
        {n: "INTERLAGOS", type: "prop", g: "amarelo", p: 260, r: [22,110,330,800,975,1150], h: 150}, {n: "MORUMBI", type: "prop", g: "amarelo", p: 260, r: [22,110,330,800,975,1150], h: 150},
        {n: "CIA ÁGUA", type: "util", p: 150, icon: "🚰"}, {n: "IBIRAPUERA", type: "prop", g: "amarelo", p: 280, r: [24,120,360,850,1025,1200], h: 150},
        {n: "VÁ PRESO", type: "gojail"}, {n: "B. TIJUCA", type: "prop", g: "verde", p: 300, r: [26,130,390,900,1100,1275], h: 200},
        {n: "JARDIM BOTÂNICO", type: "prop", g: "verde", p: 300, r: [26,130,390,900,1100,1275], h: 200}, {n: "COFRE", type: "chest"},
        {n: "IPANEMA", type: "prop", g: "verde", p: 320, r: [28,150,450,1000,1200,1400], h: 200}, {n: "EST. REPÚBLICA", type: "station", p: 200},
        {n: "SORTE", type: "luck"}, {n: "LEBLON", type: "prop", g: "azul", p: 350, r: [35,175,500,1100,1300,1500], h: 200},
        {n: "TAXA RIQUEZA", type: "tax", val: 100}, {n: "AV. OCEÂNICA", type: "prop", g: "azul", p: 400, r: [50,200,600,1400,1700,2000], h: 200}
    ];

    const COLORS = { marrom: "#955436", azulclaro: "#87CEEB", rosa: "#D93A96", laranja: "#F7941D", vermelho: "#ED1C24", amarelo: "#FFF200", verde: "#1FB25A", azul: "#006AB3" };
    const LUCK_CARDS = [
        {t: "SORTE", m: "Receba M$ 50 de dividendos", v: 50}, {t: "SORTE", m: "Multa por excesso de velocidade: Pague M$ 15", v: -15},
        {t: "SORTE", m: "Sua apólice de seguro venceu: Receba M$ 100", v: 100}, {t: "SORTE", m: "Vá para a Prisão sem passar pela partida", f: "jail"},
        {t: "SORTE", m: "Avance até a Partida", f: "go"}, {t: "SORTE", m: "Pague M$ 50 para cada casa que possuir", f: "repair"}
    ];

    let players = [], turn = 0, doublesCount = 0, isGameOver = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function createSetupFields() {
        const n = document.getElementById('qt-players').value;
        const cont = document.getElementById('player-setup-list');
        const icons = ["🚗","🚀","🎩","🦖","🚢","🐕"];
        cont.innerHTML = "";
        for(let i=0; i<n; i++){
            cont.innerHTML += `<div class="player-row">
                <input type="text" id="p-name-${i}" value="Jogador ${i+1}">
                <select id="p-icon-${i}">${icons.map(ic => `<option>${ic}</option>`).join('')}</select>
            </div>`;
        }
    }

    function initGame() {
        const n = document.getElementById('qt-players').value;
        for(let i=0; i<n; i++){
            players.push({
                id: i, name: document.getElementById(`p-name-${i}`).value, 
                icon: document.getElementById(`p-icon-${i}`).value,
                money: 1500, pos: 0, inJail: 0, props: [], history: []
            });
        }
        document.getElementById('setup-screen').style.display = 'none';
        renderBoard();
        updateUI();
    }

    function renderBoard() {
        const b = document.getElementById('board');
        TILES.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = 'tile'; d.id = `t-${i}`;
            if(i<=10){ d.style.gridRow=11; d.style.gridColumn=11-i; }
            else if(i<=20){ d.style.gridColumn=1; d.style.gridRow=21-i; }
            else if(i<=30){ d.style.gridRow=1; d.style.gridColumn=i-19; }
            else { d.style.gridColumn=11; d.style.gridRow=i-29; }
            
            let html = "";
            if(t.type === 'prop') html += `<div class="t-color" style="background:${COLORS[t.g]}"></div>`;
            html += `<div class="t-name">${t.n}</div>`;
            if(t.p) html += `<div class="t-price">M$ ${t.p}</div>`;
            if(t.icon) html += `<div style="font-size:12px; text-align:center;">${t.icon}</div>`;
            d.innerHTML = html + `<div id="builds-${i}" class="house-container"></div>`;
            b.appendChild(d);
        });

        players.forEach(p => {
            const pawn = document.createElement('div');
            pawn.className = 'pawn'; pawn.id = `pawn-${p.id}`; pawn.innerText = p.icon;
            document.getElementById('pawns-layer').appendChild(pawn);
        });
        updatePawns();
    }

    async function executeRoll() {
        const p = players[turn];
        document.getElementById('roll-btn').disabled = true;
        
        const r1 = Math.ceil(Math.random()*6), r2 = Math.ceil(Math.random()*6);
        document.getElementById('d1').innerText = ['','⚀','⚁','⚂','⚃','⚄','⚅'][r1];
        document.getElementById('d2').innerText = ['','⚀','⚁','⚂','⚃','⚄','⚅'][r2];
        playSound(200, 'square', 0.2);

        if(p.inJail > 0) {
            if(r1 === r2) {
                p.inJail = 0; log(p, "Tirou dados iguais e saiu da prisão!");
            } else {
                p.inJail--;
                if(p.inJail === 0) {
                    p.money -= 50; log(p, "Pagou M$ 50 e saiu da prisão.");
                } else {
                    log(p, `Ainda preso. Faltam ${p.inJail} turnos.`);
                    return nextPlayer();
                }
            }
        }

        if(r1 === r2) doublesCount++; else doublesCount = 0;

        if(doublesCount === 3) {
            p.pos = 10; p.inJail = 3; doublesCount = 0;
            showModal("POLÍCIA!", "Três duplos seguidos! Vá para a prisão.", [{t:"IR PARA CADEIA", c:"#e74c3c", f:nextPlayer}]);
            updatePawns();
            return;
        }

        let total = r1 + r2;
        for(let i=0; i<total; i++) {
            p.pos = (p.pos + 1) % 40;
            if(p.pos === 0) { p.money += 200; playSound(800, 'sine', 0.3); }
            updatePawns();
            playSound(400, 'sine', 0.05);
            await new Promise(r => setTimeout(r, 200));
        }

        handleTile(total);
    }

    function handleTile(diceSum) {
        const p = players[turn];
        const t = TILES[p.pos];

        if(t.type === "gojail") {
            p.pos = 10; p.inJail = 3;
            showModal("PRESO!", "Vá direto para a prisão.", [{t:"OK", c:"#000", f:nextPlayer}]);
        } else if(t.type === "tax") {
            p.money -= t.val;
            showModal(t.n, `Pague M$ ${t.val} de impostos.`, [{t:"PAGAR", c:"#e74c3c", f:nextPlayer}]);
        } else if(t.p > 0) {
            if(!t.owner) {
                showModal(t.n, `Deseja comprar por M$ ${t.p}?`, [
                    {t:"COMPRAR", c:"#2ecc71", f:() => buyProp(p, t)},
                    {t:"PASSAR", c:"#95a5a6", f:nextPlayer}
                ]);
            } else if(t.owner !== p && !t.mortgaged) {
                let rent = calculateRent(t, diceSum);
                p.money -= rent; t.owner.money += rent;
                playSound(150, 'sawtooth', 0.4);
                showModal("ALUGUEL", `Pagou M$ ${rent} para ${t.owner.name}.`, [{t:"OK", c:"#e74c3c", f:nextPlayer}]);
            } else nextPlayer();
        } else if(t.type === "luck" || t.type === "chest") {
            drawCard(p);
        } else nextPlayer();
        
        updateUI();
    }

    function calculateRent(t, dice) {
        if(t.type === "station") {
            const count = t.owner.props.filter(idx => TILES[idx].type === "station").length;
            return [0, 25, 50, 100, 200][count];
        }
        if(t.type === "util") {
            const count = t.owner.props.filter(idx => TILES[idx].type === "util").length;
            return dice * (count === 2 ? 10 : 4);
        }
        return t.r[t.houses || 0];
    }

    function buyProp(p, t) {
        if(p.money >= t.p) {
            p.money -= t.p; t.owner = p; p.props.push(p.pos);
            log(p, `Comprou ${t.n} por M$ ${t.p}`);
            nextPlayer();
        } else alert("Saldo insuficiente!");
    }

    function drawCard(p) {
        const card = LUCK_CARDS[Math.floor(Math.random()*LUCK_CARDS.length)];
        showModal(card.t, card.m, [{t:"OK", c:"#3498db", f:() => {
            if(card.v) p.money += card.v;
            if(card.f === "jail") { p.pos = 10; p.inJail = 3; }
            if(card.f === "go") { p.pos = 0; p.money += 200; }
            nextPlayer();
        }}]);
    }

    function openPropMenu() {
        const p = players[turn];
        let html = `<h4>Seu Saldo: M$ ${p.money}</h4>`;
        p.props.forEach(idx => {
            const t = TILES[idx];
            html += `<div style="border-bottom:1px solid #eee; padding:10px; text-align:left;">
                <b>${t.n}</b> ${t.mortgaged ? '(Hipotecado)' : ''}<br>
                <button onclick="buildHouse(${idx})">Construir (M$ ${t.h})</button>
                <button onclick="toggleMortgage(${idx})">${t.mortgaged ? 'Quitar' : 'Hipotecar'}</button>
            </div>`;
        });
        showModal("MEUS IMÓVEIS", html, [{t:"VOLTAR", c:"#000", f:closeModal}]);
    }

    function buildHouse(idx) {
        const p = players[turn];
        const t = TILES[idx];
        if(!t.houses) t.houses = 0;
        if(t.houses < 5 && p.money >= t.h) {
            p.money -= t.h; t.houses++;
            updateUI(); updateBuilds();
            alert(`Construção realizada em ${t.n}!`);
            closeModal();
        } else alert("Não é possível construir.");
    }

    function toggleMortgage(idx) {
        const p = players[turn];
        const t = TILES[idx];
        const val = t.p / 2;
        if(!t.mortgaged) {
            t.mortgaged = true; p.money += val;
        } else {
            if(p.money >= val * 1.1) {
                t.mortgaged = false; p.money -= (val * 1.1);
            } else return alert("Saldo insuficiente para quitar hipoteca (+10% juros)");
        }
        updateUI(); closeModal();
    }

    function nextPlayer() {
        closeModal();
        if(doublesCount === 0) turn = (turn + 1) % players.length;
        document.getElementById('roll-btn').disabled = false;
        document.getElementById('msg-box').innerText = `Vez de: ${players[turn].name}`;
        updateUI(); updatePawns();
    }

    function updateUI() {
        const bar = document.getElementById('status-bar');
        bar.innerHTML = players.map(p => `
            <div class="player-tab ${turn === p.id ? 'active' : ''}">
                <div style="font-size:18px">${p.icon}</div>
                <div style="font-size:11px; opacity:0.8">${p.name}</div>
                <div class="mny">M$ ${p.money}</div>
            </div>`).join('');
    }

    function updatePawns() {
        players.forEach(p => {
            const t = document.getElementById(`t-${p.pos}`);
            const el = document.getElementById(`pawn-${p.id}`);
            const off = p.id * 4;
            el.style.top = (t.offsetTop + 10 + off) + "px";
            el.style.left = (t.offsetLeft + 10 + off) + "px";
        });
    }

    function updateBuilds() {
        TILES.forEach((t, i) => {
            if(t.houses) {
                const cont = document.getElementById(`builds-${i}`);
                cont.innerHTML = t.houses === 5 ? '<div class="hotel"></div>' : '<div class="house"></div>'.repeat(t.houses);
            }
        });
    }

    function log(p, msg) { p.history.push(msg); }

    function showHistory() {
        const p = players[turn];
        showModal("HISTÓRICO", p.history.length ? p.history.join('<br>') : "Sem registros.", [{t:"FECHAR", c:"#000", f:closeModal}]);
    }

    function showModal(t, b, btns) {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-body').innerHTML = b;
        const foot = document.getElementById('m-footer'); foot.innerHTML = "";
        btns.forEach(btn => {
            const eb = document.createElement('button'); eb.className='btn-modal'; eb.innerText=btn.t;
            eb.style.background=btn.c; eb.onclick=btn.f; foot.appendChild(eb);
        });
        document.getElementById('overlay').style.display='block';
        document.getElementById('modal').style.display='block';
    }

    function closeModal() {
        document.getElementById('overlay').style.display='none';
        document.getElementById('modal').style.display='none';
    }

    createSetupFields();
</script>
</body>
</html>
