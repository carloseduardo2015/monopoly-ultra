<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Premium - Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; --board-bg: #f0f4f7; --accent: #2ecc71;
            --danger: #e74c3c; --p1: #e74c3c; --p2: #3498db;
        }
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        #game-header { display: flex; justify-content: space-around; padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 2px solid #333; }
        .player-box { padding: 10px 15px; border-radius: 15px; border: 2px solid transparent; text-align: center; transition: 0.3s; min-width: 130px; }
        .player-box.active { border-color: var(--accent); background: rgba(46, 204, 113, 0.15); transform: translateY(-3px); }
        .money { font-weight: 900; color: #2ecc71; font-size: 1.1em; display: block; }
        .status-tag { font-size: 0.7em; text-transform: uppercase; color: var(--danger); font-weight: bold; }

        /* TABULEIRO */
        .board-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        #board { 
            display: grid; width: 95vw; height: 95vw; max-width: 500px; max-height: 500px;
            grid-template-columns: 1.4fr repeat(4, 1fr) 1.4fr;
            grid-template-rows: 1.4fr repeat(4, 1fr) 1.4fr;
            background: #222; gap: 4px; padding: 6px; border-radius: 12px;
        }
        .tile { background: var(--board-bg); color: #2c3e50; position: relative; font-size: 8px; font-weight: bold; display: flex; flex-direction: column; transition: 0.2s; border-radius: 4px; border: 2px solid transparent; }
        .tile-color { height: 20%; width: 100%; border-radius: 2px 2px 0 0; }
        .tile-info { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2px; text-transform: uppercase; font-size: 7px; }
        .owner-tag { font-size: 6px; margin-top: 2px; background: rgba(0,0,0,0.1); padding: 1px 3px; border-radius: 3px; }

        /* PEÕES */
        .pawn { 
            position: absolute; width: 22px; height: 22px; border-radius: 50%; z-index: 100;
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; font-size: 14px;
            pointer-events: none;
        }

        /* CONTROLES */
        .controls { padding: 20px; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; gap: 15px; border-top: 1px solid #333; }
        .dice-area { display: flex; gap: 15px; }
        .die { width: 50px; height: 50px; background: white; color: black; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); }
        .btn-roll { 
            background: var(--accent); color: white; border: none; padding: 14px 60px; 
            border-radius: 50px; font-weight: 900; font-size: 1em; cursor: pointer;
            box-shadow: 0 4px 0 #27ae60; transition: 0.1s;
        }
        .btn-roll:active { transform: translateY(2px); box-shadow: 0 2px 0 #27ae60; }
        .btn-roll:disabled { background: #444; box-shadow: 0 4px 0 #222; opacity: 0.6; cursor: not-allowed; }

        /* MODAIS */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal { background: white; color: #333; padding: 30px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-choice { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="game-header">
    <div id="p0-card" class="player-box active">
        <div>JOGADOR 1 🎩</div>
        <span class="money" id="p0-money">M$ 1500</span>
        <div id="p0-status" class="status-tag"></div>
    </div>
    <div id="p1-card" class="player-box">
        <div>JOGADOR 2 🚗</div>
        <span class="money" id="p1-money">M$ 1500</span>
        <div id="p1-status" class="status-tag"></div>
    </div>
</div>

<div class="board-container">
    <div id="board">
        <div style="grid-area: 2/2/6/6; background: #dfe6e9; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
            <div id="status-msg" style="color: #2d3436; font-weight: 900; text-transform: uppercase; text-align:center; font-size: 0.8em">Vez do Jogador 1</div>
        </div>
    </div>
</div>

<div class="controls">
    <div class="dice-area">
        <div id="d1" class="die">?</div>
        <div id="d2" class="die">?</div>
    </div>
    <button class="btn-roll" id="roll-btn" onclick="takeTurn()">JOGAR DADOS</button>
</div>

<div id="overlay">
    <div class="modal" id="modal-box">
        <div id="modal-content"></div>
    </div>
</div>

<script>
    const TILES = [
        { name: "Início", type: "go" },
        { name: "Paulista", group: "blue", price: 60, rent: 15 },
        { name: "Sorte", type: "luck" },
        { name: "Augusta", group: "pink", price: 100, rent: 30 },
        { name: "Luz", type: "station", price: 200, rent: 50 },
        { name: "Prisão", type: "jail" },
        { name: "Oscar Freire", group: "pink", price: 120, rent: 40 },
        { name: "Copacabana", group: "orange", price: 140, rent: 50 },
        { name: "Central", type: "station", price: 200, rent: 50 },
        { name: "Ipanema", group: "orange", price: 160, rent: 60 },
        { name: "Taxa", type: "tax", price: 150 },
        { name: "Vá p/ Prisão", type: "go-jail" }
    ];

    const COLORS = { blue: "#3498db", pink: "#e84393", orange: "#e67e22" };
    let players = [
        { id: 0, pos: 0, money: 1500, color: "#e74c3c", icon: "🎩", jail: 0 },
        { id: 1, pos: 0, money: 1500, color: "#3498db", icon: "🚗", jail: 0 }
    ];
    let turn = 0;
    let isBusy = false;

    // Inicializar Tabuleiro (Grid 6x6 compacta)
    const board = document.getElementById('board');
    TILES.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'tile';
        div.id = `tile-${i}`;
        
        // Posicionamento perimetral dinâmico
        if(i < 4) div.style.gridArea = `6 / ${4-i+1}`; 
        else if(i < 6) div.style.gridArea = `${6-(i-3)} / 1`;
        else if(i < 10) div.style.gridArea = `1 / ${i-5}`;
        else div.style.gridArea = `${i-9+1} / 6`;

        let html = '';
        if(t.group) html += `<div class="tile-color" style="background:${COLORS[t.group]}"></div>`;
        html += `<div class="tile-info"><span>${t.name}</span>`;
        if(t.price) html += `<span style="font-size:7px; opacity:0.7">M$ ${t.price}</span>`;
        html += `<div class="owner-tag" id="owner-${i}"></div></div>`;
        
        div.innerHTML = html;
        board.appendChild(div);
    });

    // Peões
    players.forEach(p => {
        const pawn = document.createElement('div');
        pawn.className = 'pawn';
        pawn.id = `pawn-${p.id}`;
        pawn.style.backgroundColor = p.color;
        pawn.innerText = p.icon;
        document.body.appendChild(pawn);
    });

    function updateUI() {
        players.forEach(p => {
            const tile = document.getElementById(`tile-${p.pos}`);
            const rect = tile.getBoundingClientRect();
            const pElem = document.getElementById(`pawn-${p.id}`);
            // Offset para peões não sobreporem totalmente
            const offset = p.id * 5;
            pElem.style.transform = `translate(${rect.left + 8 + offset}px, ${rect.top + 8 + offset}px)`;
            
            document.getElementById(`p${p.id}-money`).innerText = `M$ ${p.money}`;
            document.getElementById(`p${p.id}-status`).innerText = p.jail > 0 ? `PRESO (${p.jail})` : "";
        });
    }

    async function takeTurn() {
        if(isBusy) return;
        const p = players[turn];
        isBusy = true;
        document.getElementById('roll-btn').disabled = true;

        // Regra de Prisão
        if(p.jail > 0) {
            handleJail(p);
            return;
        }

        // Dados
        let d1 = Math.floor(Math.random()*6)+1;
        let d2 = Math.floor(Math.random()*6)+1;
        document.getElementById('d1').innerText = d1;
        document.getElementById('d2').innerText = d2;

        const move = d1 + d2;
        for(let i=0; i<move; i++) {
            p.pos = (p.pos + 1) % TILES.length;
            if(p.pos === 0) {
                p.money += 200;
                showMsg("Passou pelo início! +M$ 200");
            }
            updateUI();
            await new Promise(r => setTimeout(r, 200));
        }

        evaluateTile(p);
    }

    function evaluateTile(p) {
        const tile = TILES[p.pos];
        const overlay = document.getElementById('overlay');
        const content = document.getElementById('modal-content');

        if(tile.type === "go-jail") {
            p.pos = 5; // Casa da Prisão
            p.jail = 2;
            updateUI();
            showModal(`👮 PRISÃO!`, `Você foi detido por excesso de velocidade. Ficará 2 turnos sem jogar.`, [
                { text: "IR PARA CELA", cb: nextTurn }
            ]);
        } 
        else if(tile.type === "tax") {
            p.money -= tile.price;
            showModal(`💸 IMPOSTO`, `O governo recolheu M$ ${tile.price} dos seus bens.`, [{ text: "PAGAR", cb: nextTurn }]);
        }
        else if(tile.price && tile.owner === undefined) {
            content.innerHTML = `
                <h2 style="margin:0">${tile.name}</h2>
                <p>Valor: <b>M$ ${tile.price}</b><br>Aluguel Base: M$ ${tile.rent}</p>
                <div class="modal-btns">
                    <button class="btn-choice" style="background:var(--accent); color:white" onclick="buyTile(${p.id})">COMPRAR</button>
                    <button class="btn-choice" style="background:#eee" onclick="closeModal()">PASSAR VEZ</button>
                </div>`;
            overlay.style.display = 'flex';
        } else if(tile.owner !== undefined && tile.owner !== p.id) {
            const owner = players[tile.owner];
            p.money -= tile.rent;
            owner.money += tile.rent;
            showModal(`🏠 ALUGUEL`, `Você parou em ${tile.name} e pagou M$ ${tile.rent} para o Jogador ${owner.id + 1}`, [
                { text: "PAGAR", cb: nextTurn }
            ]);
        } else {
            nextTurn();
        }
    }

    function buyTile(pid) {
        const p = players[pid];
        const tile = TILES[p.pos];
        if(p.money >= tile.price) {
            p.money -= tile.price;
            tile.owner = pid;
            const tileElem = document.getElementById(`tile-${p.pos}`);
            tileElem.style.borderColor = p.color;
            document.getElementById(`owner-${p.pos}`).innerText = `P${pid+1}`;
            closeModal();
        } else {
            alert("Saldo insuficiente!");
        }
    }

    function handleJail(p) {
        showModal(`⛓️ NA CADEIA`, `Você ainda tem ${p.jail} turnos de pena. Deseja pagar M$ 50 para sair agora?`, [
            { text: `PAGAR M$ 50`, cb: () => { p.money -= 50; p.jail = 0; closeModal(); } },
            { text: "AGUARDAR", cb: () => { p.jail--; closeModal(); } }
        ]);
    }

    function showModal(title, text, btns) {
        const overlay = document.getElementById('overlay');
        const content = document.getElementById('modal-content');
        content.innerHTML = `<h2 style="margin:0">${title}</h2><p>${text}</p><div class="modal-btns"></div>`;
        const btnArea = content.querySelector('.modal-btns');
        btns.forEach(b => {
            const btn = document.createElement('button');
            btn.className = 'btn-choice';
            btn.style.background = b.text.includes("PAGAR") ? "var(--accent)" : "#eee";
            btn.style.color = b.text.includes("PAGAR") ? "white" : "#333";
            btn.innerText = b.text;
            btn.onclick = b.cb;
            btnArea.appendChild(btn);
        });
        overlay.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        nextTurn();
    }

    function nextTurn() {
        if(players[turn].money < 0) {
            alert(`JOGADOR ${turn + 1} FALIU! Fim de jogo.`);
            location.reload();
            return;
        }
        
        turn = (turn + 1) % players.length;
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.player-box').forEach(b => b.classList.remove('active'));
        document.getElementById(`p${turn}-card`).classList.add('active');
        document.getElementById('status-msg').innerText = `Vez do Jogador ${turn + 1}`;
        document.getElementById('roll-btn').disabled = false;
        isBusy = false;
        updateUI();
    }

    function showMsg(txt) {
        const msg = document.getElementById('status-msg');
        msg.innerText = txt;
        setTimeout(() => { if(!isBusy) msg.innerText = `Vez do Jogador ${turn + 1}`; }, 2000);
    }

    window.onresize = updateUI;
    // Pequeno delay para o navegador calcular o layout antes de posicionar peões
    setTimeout(updateUI, 500);
</script>
</body>
</html>
