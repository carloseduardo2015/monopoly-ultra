<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a; --board-bg: #e8f5e9; --accent: #2ecc71;
            --p1: #e74c3c; --p2: #3498db;
        }
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #game-header { display: flex; justify-content: space-around; padding: 15px; background: rgba(0,0,0,0.5); border-bottom: 2px solid #333; z-index: 10; }
        .player-box { padding: 10px; border-radius: 12px; transition: 0.3s; border: 2px solid transparent; text-align: center; min-width: 120px; }
        .player-box.active { border-color: var(--accent); background: rgba(46, 204, 113, 0.1); transform: translateY(-5px); }
        .money { font-weight: 900; color: #2ecc71; font-size: 1.1em; display: block; }

        .board-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; overflow: hidden; }
        #board { 
            display: grid; width: 95vw; height: 95vw; max-width: 500px; max-height: 500px;
            grid-template-columns: 1.5fr repeat(4, 1fr) 1.5fr;
            grid-template-rows: 1.5fr repeat(4, 1fr) 1.5fr;
            background: #222; gap: 2px; padding: 5px; border-radius: 10px; position: relative;
        }

        .tile { background: var(--board-bg); color: #2c3e50; position: relative; font-size: 8px; font-weight: bold; display: flex; flex-direction: column; }
        .tile-color { height: 15px; width: 100%; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .tile-name { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2px; text-transform: uppercase; font-size: 7px; }

        .pawn { 
            position: absolute; width: 20px; height: 20px; border-radius: 50%; z-index: 100;
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; font-size: 12px;
            pointer-events: none;
        }

        .controls { padding: 15px; background: #111; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .dice-area { display: flex; gap: 10px; }
        .die { width: 45px; height: 45px; background: white; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; }
        
        .btn-roll { 
            background: var(--accent); color: white; border: none; padding: 12px 40px; 
            border-radius: 25px; font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        .btn-roll:disabled { background: #444; cursor: not-allowed; opacity: 0.7; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal { background: white; color: #333; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; animation: pop 0.3s ease-out; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-choice { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-header">
    <div id="p0-card" class="player-box active">
        <div>P1 🎩</div>
        <span class="money" id="p0-money">M$ 1500</span>
    </div>
    <div id="p1-card" class="player-box">
        <div>P2 🚗</div>
        <span class="money" id="p1-money">M$ 1500</span>
    </div>
</div>

<div class="board-container">
    <div id="board">
        <div id="center-logo" style="grid-area: 2/2/6/6; background: #dfe6e9; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;">
            <div id="status-msg" style="color: #636e72; font-weight: 900; text-transform: uppercase; text-align:center; font-size: 10px;">Aguardando...</div>
        </div>
    </div>
</div>

<div class="controls">
    <div class="dice-area">
        <div id="d1" class="die">?</div>
        <div id="d2" class="die">?</div>
    </div>
    <button class="btn-roll" id="roll-btn" onclick="takeTurn()">JOGAR DADOS</button>
</div>

<div id="overlay">
    <div class="modal" id="modal-box">
        <div id="modal-content"></div>
    </div>
</div>

<script>
    // Tabuleiro Reduzido para Performance e Telas Pequenas
    const TILES = [
        { name: "Início", type: "go" },
        { name: "Paulista", group: "blue", price: 100, rent: 50 },
        { name: "Luz", type: "station", price: 200, rent: 100 },
        { name: "Augusta", group: "pink", price: 150, rent: 75 },
        { name: "Sorte", type: "luck" },
        { name: "Cadeia", type: "jail" },
        { name: "Ipanema", group: "orange", price: 200, rent: 100 },
        { name: "Central", type: "station", price: 200, rent: 100 },
        { name: "Leblon", group: "red", price: 250, rent: 150 },
        { name: "Taxa", type: "tax", price: 150 },
        { name: "Jardins", group: "red", price: 300, rent: 200 },
        { name: "Vá p/ Cadeia", type: "go-jail" }
    ];

    const COLORS = { blue: "#3498db", pink: "#e84393", orange: "#e67e22", red: "#d63031" };
    let players = [
        { id: 0, pos: 0, money: 1500, color: "#e74c3c", icon: "🎩" },
        { id: 1, pos: 0, money: 1500, color: "#3498db", icon: "🚗" }
    ];
    let turn = 0;
    let isMoving = false;

    // Gerar Tabuleiro
    const board = document.getElementById('board');
    TILES.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'tile';
        div.id = `tile-${i}`;
        
        // Layout 4x4 Perimetral
        if(i < 4) div.style.gridArea = `6 / ${4-i+1}`; 
        else if(i < 6) div.style.gridArea = `${6-(i-3)} / 1`;
        else if(i < 10) div.style.gridArea = `1 / ${i-5}`;
        else div.style.gridArea = `${i-9+1} / 6`;

        if(t.group) div.innerHTML = `<div class="tile-color" style="background:${COLORS[t.group]}"></div>`;
        div.innerHTML += `<div class="tile-name">${t.name}</div>`;
        board.appendChild(div);
    });

    // Peões
    players.forEach(p => {
        const pawn = document.createElement('div');
        pawn.className = 'pawn';
        pawn.id = `pawn-${p.id}`;
        pawn.style.backgroundColor = p.color;
        pawn.innerText = p.icon;
        document.body.appendChild(pawn);
    });

    function updatePositions() {
        players.forEach(p => {
            const tile = document.getElementById(`tile-${p.pos}`);
            const rect = tile.getBoundingClientRect();
            const pawn = document.getElementById(`pawn-${p.id}`);
            pawn.style.top = `${window.scrollY + rect.top + (p.id * 4) + 5}px`;
            pawn.style.left = `${window.scrollX + rect.left + (p.id * 4) + 5}px`;
        });
        document.getElementById('p0-money').innerText = `M$ ${players[0].money}`;
        document.getElementById('p1-money').innerText = `M$ ${players[1].money}`;
    }

    async function takeTurn() {
        if(isMoving) return;
        isMoving = true;
        const p = players[turn];
        const btn = document.getElementById('roll-btn');
        btn.disabled = true;

        let d1 = Math.floor(Math.random()*6)+1;
        let d2 = Math.floor(Math.random()*6)+1;
        document.getElementById('d1').innerText = d1;
        document.getElementById('d2').innerText = d2;

        const move = d1 + d2;
        for(let i=0; i<move; i++) {
            p.pos = (p.pos + 1) % TILES.length;
            if(p.pos === 0) p.money += 200;
            updatePositions();
            await new Promise(r => setTimeout(r, 250));
        }

        handleTile(p);
    }

    function handleTile(p) {
        const tile = TILES[p.pos];
        const overlay = document.getElementById('overlay');
        const content = document.getElementById('modal-content');

        if(tile.price && !tile.owner) {
            content.innerHTML = `
                <h2 style="margin:0">${tile.name}</h2>
                <p>Comprar por M$ ${tile.price}?</p>
                <div class="modal-btns">
                    <button class="btn-choice" style="background:var(--accent); color:white" onclick="buyTile(${p.id})">SIM</button>
                    <button class="btn-choice" style="background:#eee" onclick="closeModal()">NÃO</button>
                </div>`;
            overlay.style.display = 'flex';
        } else if(tile.owner !== undefined && tile.owner !== p.id) {
            const rent = tile.rent;
            p.money -= rent;
            players[tile.owner].money += rent;
            updatePositions();
            alert(`Pagou M$ ${rent} de aluguel!`);
            checkGameOver() ? null : nextTurn();
        } else {
            nextTurn();
        }
    }

    function buyTile(pid) {
        const p = players[pid];
        const tile = TILES[p.pos];
        if(p.money >= tile.price) {
            p.money -= tile.price;
            tile.owner = pid;
            document.getElementById(`tile-${p.pos}`).style.boxShadow = `inset 0 0 10px ${p.color}`;
            updatePositions();
        } else {
            alert("Dinheiro insuficiente!");
        }
        closeModal();
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        nextTurn();
    }

    function checkGameOver() {
        if(players[0].money < 0 || players[1].money < 0) {
            alert("FIM DE JOGO! Alguém faliu.");
            location.reload();
            return true;
        }
        return false;
    }

    function nextTurn() {
        turn = (turn + 1) % players.length;
        document.querySelectorAll('.player-box').forEach(b => b.classList.remove('active'));
        document.getElementById(`p${turn}-card`).classList.add('active');
        document.getElementById('status-msg').innerText = `Vez do Jogador ${turn + 1}`;
        
        isMoving = false;
        document.getElementById('roll-btn').disabled = false;
    }

    // Inicialização
    window.onload = () => {
        updatePositions();
        window.addEventListener('resize', updatePositions);
    };
</script>
</body>
</html>
