<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Brasil - Ultimate Global Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffa3; --secondary: #00d1ff; --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.06); --danger: #ff4757;
            --gold: #ffcc00; --board-white: #f0f4f2;
            --tile-size: 8.5vmin;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* SETUP */
        #setup { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .setup-box { background: var(--card-bg); padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .p-row { display: flex; gap: 10px; margin-bottom: 12px; animation: slideUp 0.4s ease; }
        
        /* BOARD LAYOUT */
        .main-ui { display: none; flex-direction: column; height: 100vh; position: relative; }
        .viewport { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        
        #board {
            display: grid; width: 94vmin; height: 94vmin; background: var(--board-white);
            border: 6px solid #111; border-radius: 12px;
            grid-template-columns: 1.5fr repeat(9, 1fr) 1.5fr;
            grid-template-rows: 1.5fr repeat(9, 1fr) 1.5fr;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        .tile { border: 0.1px solid rgba(0,0,0,0.1); position: relative; display: flex; flex-direction: column; cursor: pointer; color: #111; transition: 0.2s; }
        .tile:active { transform: scale(0.95); }
        .tile .name { font-size: 1.3vmin; font-weight: 800; text-align: center; padding: 2px; text-transform: uppercase; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .tile .bar { width: 100%; height: 22%; border-bottom: 1px solid rgba(0,0,0,0.1); }
        
        /* PAWNS SYSTEM */
        .pawn-zone { position: absolute; inset: 0; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; pointer-events: none; z-index: 10; padding: 2px; }
        .pawn { font-size: 2.8vmin; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4)); }

        /* CENTER AREA */
        .center-area { grid-column: 2/11; grid-row: 2/11; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #dice-view { font-size: 12vmin; margin-bottom: 10px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); transition: 0.2s; }
        .roll-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; color: #000; cursor: pointer; box-shadow: 0 10px 20px rgba(0,255,163,0.3); text-transform: uppercase; }

        /* HUD */
        .hud { height: 130px; background: #0a0e14; display: flex; gap: 12px; padding: 15px; overflow-x: auto; border-top: 2px solid #1a1f26; }
        .p-card { min-width: 120px; background: var(--card-bg); border-radius: 20px; padding: 12px; text-align: center; border: 2px solid transparent; flex-shrink: 0; transition: 0.3s; }
        .p-card.active { border-color: var(--primary); background: rgba(0,255,163,0.08); transform: translateY(-5px); }
        .p-card .cash { color: var(--primary); font-weight: 800; font-size: 14px; }

        /* MODAIS & CARDS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal { background: white; color: #111; width: 100%; max-width: 340px; border-radius: 30px; padding: 25px; text-align: center; animation: pop 0.4s ease; }
        
        /* MONEY PARTICLES CANVAS */
        #money-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 11000; }

        @keyframes pop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .house { font-size: 1.5vmin; display: inline-block; }
    </style>
</head>
<body>

<canvas id="money-canvas"></canvas>

<div id="setup">
    <div class="setup-box">
        <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">MONOPOLY PRO</h2>
        <div id="p-inputs"></div>
        <button class="roll-btn" style="width:100%; margin-top:10px" onclick="addPRow()">+ ADICIONAR JOGADOR</button>
        <button class="roll-btn" style="width:100%; margin-top:10px; background:white;" onclick="start()">INICIAR PARTIDA</button>
    </div>
</div>

<div class="main-ui" id="main-ui">
    <div class="viewport">
        <div id="board">
            <div class="center-area">
                <div id="dice-view">🎲🎲</div>
                <button class="roll-btn" id="main-btn" onclick="play()">LANÇAR DADOS</button>
                <p id="status-msg" style="color:#333; font-weight:800; margin-top:10px; font-size:12px"></p>
            </div>
        </div>
    </div>
    <div class="hud" id="hud"></div>
</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <div id="m-body"></div>
        <div id="m-footer" style="margin-top:20px"></div>
        <button class="roll-btn" style="background:#eee; margin-top:10px; width:100%" onclick="closeM()">FECHAR</button>
    </div>
</div>

<script>
// --- CONFIGURAÇÃO GLOBAL ---
const AVATARES = ["🏎️", "🎩", "🐕", "🦖", "🛳️", "🦆", "🐧", "🚀", "🎸", "🍕"];
const CORES = ["#ff4757", "#1e90ff", "#2ed573", "#ffa502", "#a29bfe", "#fd79a8", "#feca57", "#54a0ff", "#5f27cd", "#48dbfb"];

const SORTE_COFRE = [
    {t: "Receba Dividendos: +$50", v: 50}, {t: "Multa de Trânsito: -$100", v: -100},
    {t: "Herança Inesperada: +$200", v: 200}, {t: "Reforma em casa: -$150", v: -150},
    {t: "Prêmio de Consolação: +$20", v: 20}, {t: "Vá para a Prisão!", jail: true}
];

const TABULEIRO = [
    {n:"PARTIDA", t:"start"}, {n:"SUMARÉ", c:"#955436", p:60, b:50, r:[2,10,30,90,160,250]}, {n:"COFRE", t:"card"},
    {n:"PRAÇA SÉ", c:"#955436", p:60, b:50, r:[4,20,60,180,320,450]}, {n:"IMPOSTO", p:200, t:"tax"}, 
    {n:"MARACANÃ", p:200, t:"rail"}, {n:"25 MARÇO", c:"#aae0fa", p:100, b:50, r:[6,30,90,270,400,550]}, 
    {n:"SORTE", t:"card"}, {n:"SÃO JOÃO", c:"#aae0fa", p:100, b:50, r:[6,30,90,270,400,550]}, 
    {n:"PAULISTA", c:"#aae0fa", p:120, b:50, r:[8,40,100,300,450,600]}, {n:"PRISÃO", t:"visit"}, 
    {n:"VIEIRA SOUTO", c:"#d93a96", p:140, b:100, r:[10,50,150,450,625,750]}, {n:"CIA LUZ", p:150, t:"util"}, 
    {n:"NITERÓI", c:"#d93a96", p:140, b:100, r:[10,50,150,450,625,750]}, {n:"ATLÂNTICA", c:"#d93a96", p:160, b:100, r:[12,60,180,500,700,900]}, 
    {n:"CARIOCA", p:200, t:"rail"}, {n:"JUSCELINO", c:"#f7941d", p:180, b:100, r:[14,70,200,550,750,950]}, 
    {n:"COFRE", t:"card"}, {n:"BERRINI", c:"#f7941d", p:180, b:100, r:[14,70,200,550,750,950]}, 
    {n:"FARIA LIMA", c:"#f7941d", p:200, b:100, r:[16,80,220,600,800,1000]}, {n:"PARADA", t:"free"}, 
    {n:"IPANEMA", c:"#ed1c24", p:220, b:150, r:[18,90,250,700,875,1050]}, {n:"SORTE", t:"card"}, 
    {n:"LEBLON", c:"#ed1c24", p:220, b:150, r:[18,90,250,700,875,1050]}, {n:"COPACABANA", c:"#ed1c24", p:240, b:150, r:[20,100,300,750,925,1100]}, 
    {n:"PONTE", p:200, t:"rail"}, {n:"CID. JARDIM", c:"#fef200", p:260, b:150, r:[22,110,330,800,975,1150]}, 
    {n:"PACAEMBU", c:"#fef200", p:260, b:150, r:[22,110,330,800,975,1150]}, {n:"CIA ÁGUA", p:150, t:"util"}, 
    {n:"IBIRAPUERA", c:"#fef200", p:280, b:150, r:[24,120,360,850,1025,1200]}, {n:"VÁ PRESO", t:"jail"}, 
    {n:"BARRA", c:"#19a05e", p:300, b:200, r:[26,130,390,900,1100,1275]}, {n:"BOTÂNICO", c:"#19a05e", p:300, b:200, r:[26,130,390,900,1100,1275]}, 
    {n:"COFRE", t:"card"}, {n:"LAGOA", c:"#19a05e", p:320, b:200, r:[28,150,450,1000,1200,1400]}, 
    {n:"TIETÊ", p:200, t:"rail"}, {n:"SORTE", t:"card"}, 
    {n:"MORUMBI", c:"#0068a7", p:350, b:200, r:[35,175,500,1100,1300,1500]}, 
    {n:"TAXA", p:100, t:"tax"}, {n:"OSCAR FREIRE", c:"#0068a7", p:400, b:200, r:[50,200,600,1400,1700,2000]}
];

let game = { players: [], turn: 0, props: {}, doubles: 0 };

// --- ÁUDIO ENGINE ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

// --- DINHEIRO VOANDO (PARTICLES) ---
const canvas = document.getElementById('money-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + 20;
        this.v = Math.random() * 5 + 2;
        this.angle = Math.random() * 6;
    }
    draw() {
        ctx.fillStyle = "#00ffa3";
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillRect(0, 0, 15, 8);
        ctx.restore();
        this.y -= this.v; this.angle += 0.1;
    }
}

function spawnMoney() { for(let i=0; i<30; i++) particles.push(new Particle()); }
function updateParticles() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    particles = particles.filter(p => p.y > -20);
    particles.forEach(p => p.draw());
    requestAnimationFrame(updateParticles);
}
updateParticles();

// --- LÓGICA DO JOGO ---
function addPRow() {
    const container = document.getElementById('p-inputs');
    const i = container.children.length; if(i >= 10) return;
    const div = document.createElement('div'); div.className = 'p-row';
    div.innerHTML = `<input id="name-${i}" placeholder="Nome ${i+1}"><select id="av-${i}">${AVATARES.map(a=>`<option>${a}</option>`).join('')}</select>`;
    container.appendChild(div);
}
addPRow(); addPRow();

function start() {
    const rows = document.getElementById('p-inputs').children;
    for(let i=0; i<rows.length; i++) {
        const name = document.getElementById(`name-${i}`).value || `P${i+1}`;
        const avatar = document.getElementById(`av-${i}`).value;
        game.players.push({ id:i, name, avatar, cash:1500, pos:0, jailed:false, color:CORES[i] });
    }
    document.getElementById('setup').style.display = 'none';
    document.getElementById('main-ui').style.display = 'flex';
    renderBoard(); updateHUD();
}

function renderBoard() {
    const b = document.getElementById('board');
    TABULEIRO.forEach((tile, i) => {
        const el = document.createElement('div'); el.className = 'tile'; el.id = `tile-${i}`;
        el.onclick = () => showProperty(i);
        
        // Grid CSS
        if(i <= 10) el.style.gridRow = "11"; else if(i <= 20) el.style.gridColumn = "1";
        else if(i <= 30) el.style.gridRow = "1"; else el.style.gridColumn = "11";
        if(i > 0 && i < 10) el.style.gridColumn = 11 - i; 
        if(i > 10 && i < 20) el.style.gridRow = 21 - i;
        if(i > 20 && i < 30) el.style.gridColumn = i - 19;
        if(i > 30) el.style.gridRow = i - 29;

        el.innerHTML = `${tile.c?`<div class="bar" style="background:${tile.c}"></div>`:''}
                        <div class="name">${tile.n}</div>
                        <div class="pawn-zone" id="pz-${i}"></div>
                        <div id="build-${i}" style="text-align:center"></div>`;
        b.appendChild(el);
    });
    updateUI();
}

async function play() {
    const btn = document.getElementById('main-btn'); btn.disabled = true;
    let d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
    let p = game.players[game.turn];
    
    // Som de dados
    playSound(200, 'square', 0.1); setTimeout(()=>playSound(150, 'square', 0.1), 100);

    document.getElementById('dice-view').innerHTML = `${["⚀","⚁","⚂","⚃","⚄","⚅"][d1-1]} ${["⚀","⚁","⚂","⚃","⚄","⚅"][d2-1]}`;

    if(p.jailed) {
        if(d1===d2) { p.jailed = false; } 
        else { nextTurn(); return; }
    }

    if(d1===d2 && ++game.doubles === 3) {
        p.pos = 10; p.jailed = true; game.doubles = 0;
    } else {
        if(d1!==d2) game.doubles = 0;
        for(let i=0; i<(d1+d2); i++) {
            p.pos = (p.pos + 1) % 40;
            if(p.pos === 0) { p.cash += 200; playSound(800, 'sine', 0.2); spawnMoney(); }
            updateUI();
            await new Promise(r => setTimeout(r, 120));
        }
        checkTile(p);
    }

    updateHUD();
    btn.disabled = false; btn.innerText = "PASSAR VEZ"; btn.onclick = nextTurn;
}

function checkTile(p) {
    const t = TABULEIRO[p.pos], pr = game.props[p.pos];
    if(t.t === "tax") { p.cash -= t.p; playSound(100, 'sawtooth', 0.3); }
    else if(t.t === "jail") { p.pos = 10; p.jailed = true; }
    else if(t.t === "card") {
        const card = SORTE_COFRE[Math.floor(Math.random()*SORTE_COFRE.length)];
        setTimeout(() => alert(`${t.n}: ${card.t}`), 500);
        if(card.jail) { p.pos = 10; p.jailed = true; } else { p.cash += card.v; if(card.v > 0) spawnMoney(); }
    }
    else if(pr && pr.owner !== game.turn && !pr.mort) {
        let rent = t.r[pr.lvl];
        p.cash -= rent; game.players[pr.owner].cash += rent;
        playSound(400, 'sine', 0.2); spawnMoney();
    } else if(t.p && !pr) showProperty(p.pos);
}

function showProperty(i) {
    const t = TABULEIRO[i], pr = game.props[i], p = game.players[game.turn];
    if(!t.p) return;
    let h = `<h2>${t.n}</h2>`;
    let f = "";

    if(!pr) {
        h += `<p>Preço: <b>$${t.p}</b></p>`;
        if(p.cash >= t.p) f = `<button class="roll-btn" onclick="buy(${i})">COMPRAR</button>`;
    } else if(pr.owner === game.turn) {
        h += `<p>Nível: ${pr.lvl === 5 ? 'HOTEL' : pr.lvl + ' CASAS'}</p>`;
        if(!pr.mort) {
            if(t.b && pr.lvl < 5) f += `<button class="roll-btn" onclick="build(${i})">CONSTRUIR ($${t.b})</button>`;
            f += `<button class="roll-btn" style="background:#444;color:white;margin-top:5px;width:100%" onclick="mortgage(${i})">HIPOTECAR</button>`;
        } else {
            f += `<button class="roll-btn" onclick="unmortgage(${i})">RESGATAR</button>`;
        }
    }
    document.getElementById('m-body').innerHTML = h;
    document.getElementById('m-footer').innerHTML = f;
    document.getElementById('overlay').style.display = 'flex';
}

function buy(i) { game.players[game.turn].cash -= TABULEIRO[i].p; game.props[i] = {owner:game.turn, lvl:0, mort:false}; closeM(); updateUI(); updateHUD(); }
function build(i) { game.players[game.turn].cash -= TABULEIRO[i].b; game.props[i].lvl++; closeM(); updateUI(); updateHUD(); playSound(600, 'sine', 0.1); }
function mortgage(i) { game.players[game.turn].cash += TABULEIRO[i].p/2; game.props[i].mort = true; closeM(); updateUI(); updateHUD(); }
function unmortgage(i) { game.players[game.turn].cash -= (TABULEIRO[i].p/2)*1.1; game.props[i].mort = false; closeM(); updateUI(); updateHUD(); }

function loan(id) { game.players[id].cash += 500; playSound(900, 'sine', 0.2); spawnMoney(); updateHUD(); }

function nextTurn() {
    game.turn = (game.turn + 1) % game.players.length; game.doubles = 0;
    const btn = document.getElementById('main-btn'); btn.innerText = "LANÇAR DADOS"; btn.onclick = play;
    updateHUD();
}

function updateHUD() {
    document.getElementById('hud').innerHTML = game.players.map((p,i) => `
        <div class="p-card ${game.turn===i?'active':''}">
            <div style="font-size:24px">${p.avatar}</div>
            <div style="font-size:10px; font-weight:800">${p.name}</div>
            <div class="cash">$${p.cash}</div>
            <button onclick="loan(${i})" style="font-size:8px; background:none; border:1px solid #444; color:white; border-radius:5px; padding:2px; margin-top:5px">EMPRÉSTIMO $500</button>
        </div>`).join('');
}

function updateUI() {
    document.querySelectorAll('.pawn-zone, [id^="build-"]').forEach(c => c.innerHTML = "");
    game.players.forEach(p => {
        const span = document.createElement('div'); span.className = 'pawn'; span.innerHTML = p.avatar;
        document.getElementById(`pz-${p.pos}`).appendChild(span);
    });
    Object.keys(game.props).forEach(i => {
        const pr = game.props[i], tile = document.getElementById(`tile-${i}`);
        tile.style.boxShadow = `inset 0 0 0 4px ${game.players[pr.owner].color}`;
        if(pr.mort) tile.style.opacity = "0.4";
        else document.getElementById(`build-${i}`).innerHTML = pr.lvl === 5 ? "🏨" : "🏠".repeat(pr.lvl);
    });
}
function closeM() { document.getElementById('overlay').style.display = 'none'; }
</script>
</body>
</html>
