<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Mobile Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --gold: #fbbf24;
            --p0: #2ecc71; --p1: #e91e63; --p2: #3498db; --p3: #f1c40f;
        }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* TELA DE CONFIGURAÇÃO */
        #setup-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; padding: 20px; overflow-y: auto;
        }
        .setup-card { background: var(--panel); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .player-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input, select { background: #334155; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; flex: 1; font-size: 14px; }
        .start-btn { background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 10px; }

        /* BARRA DE STATUS JOGADORES */
        #status-bar { display: flex; gap: 8px; padding: 10px; overflow-x: auto; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.1); scrollbar-width: none; }
        #status-bar::-webkit-scrollbar { display: none; }
        .player-tab { min-width: 90px; padding: 8px; background: var(--panel); border-radius: 12px; text-align: center; border: 2px solid transparent; flex-shrink: 0; }
        .player-tab.active { border-color: var(--gold); transform: scale(1.05); }
        .mny { color: #2ecc71; font-weight: 900; font-size: 13px; }

        /* TABULEIRO */
        .game-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .board-container { position: relative; width: 95vw; height: 95vw; max-width: 450px; max-height: 450px; }
        #board { display: grid; width: 100%; height: 100%; grid-template-columns: 1.3fr repeat(9, 1fr) 1.3fr; grid-template-rows: 1.3fr repeat(9, 1fr) 1.3fr; background: #cbd5e1; border: 4px solid #000; border-radius: 4px; }
        .tile { background: white; border: 0.2px solid rgba(0,0,0,0.2); position: relative; display: flex; flex-direction: column; }
        .t-color { height: 20%; width: 100%; }
        .t-name { font-size: 5px; font-weight: 900; color: #000; text-align: center; text-transform: uppercase; flex: 1; display: flex; align-items: center; justify-content: center; padding: 1px; }

        /* PEÕES */
        .pawn { position: absolute; width: 16px; height: 16px; z-index: 50; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; font-size: 14px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        .controls { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; padding: 15px; background: var(--panel); border-radius: 20px 20px 0 0; }
        .btn-round { aspect-ratio: 1; border-radius: 50%; border: none; background: var(--gold); color: #000; font-weight: 900; font-size: 18px; box-shadow: 0 4px 0 #b45309; cursor: pointer; }
        .btn-rect { border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-weight: 700; cursor: pointer; font-size: 12px; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; backdrop-filter: blur(4px); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; background: white; color: #000; border-radius: 24px; padding: 25px; display: none; z-index: 1001; text-align: center; }
        .action-btn { width: 100%; padding: 15px; margin-top: 8px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1 style="text-align: center; color: var(--gold);">MONOPOLY ELITE</h1>
    <div class="setup-card">
        <label style="display:block; margin-bottom:10px">Quantos jogadores?</label>
        <select id="qt-players" onchange="createFields()">
            <option value="2">2 Jogadores</option>
            <option value="3">3 Jogadores</option>
            <option value="4">4 Jogadores</option>
            <option value="5">5 Jogadores</option>
            <option value="6">6 Jogadores</option>
            <option value="7">7 Jogadores</option>
            <option value="8">8 Jogadores</option>
        </select>
    </div>
    <div id="player-fields"></div>
    <button class="start-btn" onclick="startGame()">COMEÇAR PARTIDA</button>
</div>

<div id="status-bar"></div>

<div class="game-area">
    <div class="board-container">
        <div id="board">
            <div style="grid-column: 2/11; grid-row: 2/11; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #e2e8f0;">
                <h1 style="color:#000; margin:0; font-size: 22px;">MONOPOLY</h1>
                <div id="dice" style="display:flex; gap:10px; margin-top:10px;">
                    <span id="d1" style="font-size:35px; color:#222">⚀</span>
                    <span id="d2" style="font-size:35px; color:#222">⚀</span>
                </div>
            </div>
        </div>
        <div id="pawns"></div>
    </div>
</div>

<div class="controls">
    <button class="btn-rect" onclick="alert('Trocas em breve')">IMÓVEIS</button>
    <button class="btn-round" id="roll-btn" onclick="roll()">GIRAR</button>
    <button class="btn-rect" onclick="alert('Banco acessado')">BANCO</button>
</div>

<div id="overlay"></div>
<div class="modal" id="modal">
    <h3 id="m-title" style="margin-top:0"></h3>
    <div id="m-body" style="margin-bottom:15px"></div>
    <div id="m-footer"></div>
</div>

<script>
    // --- SISTEMA DE SOM (WEB AUDIO) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSnd(f, type, d) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + d);
    }

    const COLORS = {
        marrom: "#955436", azul_claro: "#87CEEB", rosa: "#D93A96", laranja: "#F7941D",
        vermelho: "#ED1C24", amarelo: "#FFF200", verde: "#1FB25A", azul_escuro: "#006AB3"
    };

    const TILES = [
        {n: "PARTIDA", g: null}, {n: "AV. SUMARÉ", g: "marrom", p: 60}, {n: "COFRE", g: "chest"},
        {n: "PRAÇA DA SÉ", g: "marrom", p: 60}, {n: "IMP. RENDA", g: null}, {n: "EST. MARACANÃ", g: "train", p: 200},
        {n: "RUA 25 MARÇO", g: "azul_claro", p: 100}, {n: "SORTE", g: "luck"}, {n: "AV. SÃO JOÃO", g: "azul_claro", p: 100},
        {n: "AV. PAULISTA", g: "azul_claro", p: 120}, {n: "PRISÃO", g: null}, {n: "AV. V. SOUTO", g: "rosa", p: 140},
        {n: "CIA LUZ", g: "util", p: 150}, {n: "AV. NITERÓI", g: "rosa", p: 140}, {n: "AV. ATLÂNTICA", g: "rosa", p: 160},
        {n: "EST. CARIOCA", g: "train", p: 200}, {n: "AV. JK", g: "laranja", p: 180}, {n: "COFRE", g: "chest"},
        {n: "AV. BERRINI", g: "laranja", p: 180}, {n: "AV. F. LIMA", g: "laranja", p: 200}, {n: "ESTAC. GRÁTIS", g: null},
        {n: "IPANEMA", g: "vermelho", p: 220}, {n: "SORTE", g: "luck"}, {n: "LEBLON", g: "vermelho", p: 220},
        {n: "COPACABANA", g: "vermelho", p: 240}, {n: "EST. CONSOLAÇÃO", g: "train", p: 200}, {n: "AV. C. JARDIM", g: "amarelo", p: 260},
        {n: "AV. PACAEMBU", g: "amarelo", p: 260}, {n: "CIA ÁGUA", g: "util", p: 150}, {n: "IBIRAPUERA", g: "amarelo", p: 280},
        {n: "VÁ PRESO", g: null}, {n: "B. TIJUCA", g: "verde", p: 300}, {n: "JARDIM BOTÂNICO", g: "verde", p: 300},
        {n: "COFRE", g: "chest"}, {n: "LAGOA R. FREITAS", g: "verde", p: 320}, {n: "EST. REPÚBLICA", g: "train", p: 200},
        {n: "SORTE", g: "luck"}, {n: "AV. MORUMBI", g: "azul_escuro", p: 350}, {n: "TAXA RIQUEZA", g: null}, {n: "RUA O. FREIRE", g: "azul_escuro", p: 400}
    ];

    const avatares = ["🚗", "🚀", "🎩", "🦖", "🚢", "🐕", "🍕", "💎"];
    let players = [], turn = 0;

    function createFields() {
        const n = document.getElementById('qt-players').value;
        const container = document.getElementById('player-fields');
        container.innerHTML = "";
        for(let i=0; i<n; i++) {
            container.innerHTML += `<div class="player-row">
                <input type="text" id="n-${i}" value="Jogador ${i+1}">
                <select id="a-${i}">${avatares.map(a => `<option>${a}</option>`).join('')}</select>
            </div>`;
        }
    }

    function startGame() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const n = document.getElementById('qt-players').value;
        players = [];
        for(let i=0; i<n; i++) {
            players.push({id: i, name: document.getElementById(`n-${i}`).value, icon: document.getElementById(`a-${i}`).value, money: 1500, pos: 0});
        }
        document.getElementById('setup-screen').style.display='none';
        init();
    }

    function init() {
        const b = document.getElementById('board');
        TILES.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = 'tile'; d.id = `t-${i}`;
            if(i<=10){ d.style.gridRow=11; d.style.gridColumn=11-i; }
            else if(i<=20){ d.style.gridColumn=1; d.style.gridRow=21-i; }
            else if(i<=30){ d.style.gridRow=1; d.style.gridColumn=i-19; }
            else { d.style.gridColumn=11; d.style.gridRow=i-29; }
            const color = COLORS[t.g] || (t.g==='luck'?'#f39c12':(t.g==='chest'?'#3498db':'transparent'));
            d.innerHTML = `<div class="t-color" style="background:${color}"></div><div class="t-name">${t.n}</div>`;
            b.appendChild(d);
        });
        players.forEach(p => {
            const el = document.createElement('div'); el.className='pawn'; el.id=`p-${p.id}`; el.innerText=p.icon;
            document.getElementById('pawns').appendChild(el);
        });
        updateUI(); updatePawns();
    }

    async function roll() {
        const p = players[turn];
        document.getElementById('roll-btn').disabled = true;
        playSnd(200, 'square', 0.1);
        const d1 = Math.ceil(Math.random()*6), d2 = Math.ceil(Math.random()*6);
        document.getElementById('d1').innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][d1-1];
        document.getElementById('d2').innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][d2-1];
        
        for(let i=0; i<(d1+d2); i++) {
            p.pos = (p.pos + 1) % 40;
            if(p.pos === 0) { p.money += 200; playSnd(800, 'sine', 0.3); }
            playSnd(400, 'sine', 0.05);
            updatePawns(); await new Promise(r => setTimeout(r, 200));
        }
        handleTile();
    }

    function handleTile() {
        const p = players[turn], t = TILES[p.pos];
        if(t.p > 0) {
            if(!t.owner) {
                showModal(t.n, `${p.name}, comprar por $${t.p}?`, [
                    {t:"COMPRAR", c:"#2ecc71", f:()=>{ p.money-=t.p; t.owner=p; playSnd(1000, 'sine', 0.2); next(); }},
                    {t:"PASSAR", c:"#94a3b8", f:next}
                ]);
            } else if(t.owner !== p) {
                const rent = Math.floor(t.p * 0.15);
                p.money -= rent; t.owner.money += rent;
                playSnd(150, 'sawtooth', 0.3);
                showModal("ALUGUEL", `Pagou $${rent} para ${t.owner.name}`, [{t:"OK", c:"#e91e63", f:next}]);
            } else next();
        } else next();
    }

    function updateUI() {
        const bar = document.getElementById('status-bar');
        bar.innerHTML = players.map(p => `
            <div class="player-tab ${turn===p.id?'active':''}">
                <div style="font-size:16px">${p.icon}</div>
                <div style="font-size:10px; opacity:0.8">${p.name}</div>
                <div class="mny">$${p.money}</div>
            </div>`).join('');
    }

    function updatePawns() {
        players.forEach(p => {
            const t = document.getElementById(`t-${p.pos}`);
            const el = document.getElementById(`p-${p.id}`);
            const offX = (p.id % 3) * 10;
            const offY = Math.floor(p.id / 3) * 10;
            el.style.top = (t.offsetTop + 2 + offY) + "px";
            el.style.left = (t.offsetLeft + 2 + offX) + "px";
        });
    }

    function showModal(t, b, btns) {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-body').innerText = b;
        const foot = document.getElementById('m-footer'); foot.innerHTML = "";
        btns.forEach(btn => {
            const eb = document.createElement('button'); eb.className='action-btn'; eb.innerText=btn.t;
            eb.style.background=btn.c; eb.style.color="white"; eb.onclick=btn.f; foot.appendChild(eb);
        });
        document.getElementById('overlay').style.display='block';
        document.getElementById('modal').style.display='block';
    }

    function next() {
        document.getElementById('overlay').style.display='none';
        document.getElementById('modal').style.display='none';
        turn = (turn + 1) % players.length;
        document.getElementById('roll-btn').disabled = false;
        updateUI();
    }

    createFields();
</script>
</body>
</html>
